<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segment Tree // Neon Nexus</title>
    <style>
        :root {
            --bg: #050505;
            --neon-1: #00f3ff;
            --neon-2: #ff00ff;
            --glass: rgba(255, 255, 255, 0.05);
            --font-main: 'Rajdhani', 'Segoe UI', sans-serif;
            --font-code: 'Fira Code', monospace;
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: auto 1fr;
        }
        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--neon-1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            z-index: 10;
        }
        h1 {
            color: var(--neon-1);
            text-shadow: 0 0 10px var(--neon-1);
            margin: 0;
            font-family: var(--font-code);
            text-transform: uppercase;
            font-size: 1.5rem;
        }
        .back-btn {
            color: var(--neon-2);
            text-decoration: none;
            border: 1px solid var(--neon-2);
            padding: 0.5rem 1rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: var(--neon-2);
            color: #000;
            box-shadow: 0 0 10px var(--neon-2);
        }
        .workspace {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100%;
            overflow: hidden;
        }
        aside {
            background: var(--glass);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            backdrop-filter: blur(10px);
            z-index: 5;
        }
        .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { color: var(--neon-1); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; }
        input {
            background: rgba(0,0,0,0.3); border: 1px solid #333; color: #fff;
            padding: 0.8rem; font-family: var(--font-code); font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-1); box-shadow: 0 0 5px rgba(0, 243, 255, 0.2); }
        button {
            background: transparent; border: 1px solid var(--neon-1); color: var(--neon-1);
            padding: 0.8rem; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s;
            font-family: var(--font-main);
        }
        button:hover { background: var(--neon-1); color: #000; box-shadow: 0 0 15px var(--neon-1); }
        button.secondary { border-color: var(--neon-2); color: var(--neon-2); }
        button.secondary:hover { background: var(--neon-2); box-shadow: 0 0 15px var(--neon-2); }
        .log-panel {
            flex-grow: 1; background: #000; border: 1px solid #333; padding: 0.5rem;
            font-family: var(--font-code); font-size: 0.8rem; color: #aaa; overflow-y: auto; max-height: 300px;
        }
        .log-entry { margin-bottom: 0.25rem; border-bottom: 1px solid #111; padding-bottom: 0.25rem; }
        .log-entry.success { color: #0f0; }
        .log-entry.info { color: var(--neon-1); }
        .log-entry.error { color: #f00; }
        main {
            position: relative;
            background-color: #0a0a0f;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden;
            cursor: grab;
        }
        main:active { cursor: grabbing; }
        canvas { display: block; }
    </style>
</head>
<body>

<header>
    <h1>Segment Tree (Sum)</h1>
    <a href="index.html" class="back-btn">Back to Nexus</a>
</header>

<div class="workspace">
    <aside>
        <div class="control-group">
            <label>Init Array (comma sep)</label>
            <input type="text" id="initArr" value="1, 3, 5, 7, 9, 11">
            <button onclick="handleBuild()">Build Tree</button>
        </div>
        
        <div class="control-group">
            <label>Update (Index, Value)</label>
            <div style="display:flex; gap:0.5rem;">
                <input type="number" id="updateIdx" placeholder="Idx">
                <input type="number" id="updateVal" placeholder="Val">
            </div>
            <button onclick="handleUpdate()">Update</button>
        </div>
        
        <div class="control-group">
            <label>Query Range (L, R)</label>
            <div style="display:flex; gap:0.5rem;">
                <input type="number" id="queryL" placeholder="L">
                <input type="number" id="queryR" placeholder="R">
            </div>
            <button class="secondary" onclick="handleQuery()">Query Sum</button>
        </div>

        <div class="log-panel" id="logPanel">
            <div class="log-entry info">System ready. Range Sum Query.</div>
        </div>
    </aside>

    <main id="canvasContainer">
        <canvas id="canvas"></canvas>
    </main>
</div>

<script>
    const logPanel = document.getElementById('logPanel');
    function log(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        div.innerText = `> ${msg}`;
        logPanel.prepend(div);
        if (logPanel.children.length > 50) logPanel.lastChild.remove();
    }

    class SegmentNode {
        constructor(start, end) {
            this.start = start;
            this.end = end;
            this.total = 0;
            this.left = null;
            this.right = null;
            this.x = 0;
            this.y = 0;
        }
    }

    class SegmentTree {
        constructor(arr) {
            this.root = this.build(arr, 0, arr.length - 1);
        }

        build(arr, start, end) {
            let node = new SegmentNode(start, end);
            if (start === end) {
                node.total = arr[start];
            } else {
                let mid = Math.floor((start + end) / 2);
                node.left = this.build(arr, start, mid);
                node.right = this.build(arr, mid + 1, end);
                node.total = node.left.total + node.right.total;
            }
            return node;
        }

        update(index, val) {
            this.updateNode(this.root, index, val);
        }

        updateNode(node, index, val) {
            if (node.start === node.end) {
                node.total = val;
                return;
            }
            let mid = Math.floor((node.start + node.end) / 2);
            if (index <= mid) {
                this.updateNode(node.left, index, val);
            } else {
                this.updateNode(node.right, index, val);
            }
            node.total = node.left.total + node.right.total;
        }

        query(l, r) {
            return this.queryNode(this.root, l, r);
        }

        queryNode(node, l, r) {
            if (node.end < l || node.start > r) return 0;
            if (l <= node.start && node.end <= r) return node.total;
            return this.queryNode(node.left, l, r) + this.queryNode(node.right, l, r);
        }
    }

    // --- Visualization ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let tree = null;
    
    // Viewport
    let cameraOffset = { x: 0, y: 50 };
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let initialCamera = { x: 0, y: 0 };

    function resizeCanvas() {
        canvas.width = document.getElementById('canvasContainer').offsetWidth;
        canvas.height = document.getElementById('canvasContainer').offsetHeight;
        cameraOffset.x = canvas.width / 2;
        if(tree) draw();
    }
    window.addEventListener('resize', resizeCanvas);

    function assignCoords(node, x, y, offset) {
        if (!node) return;
        node.x = x;
        node.y = y;
        assignCoords(node.left, x - offset, y + 80, offset / 2);
        assignCoords(node.right, x + offset, y + 80, offset / 2);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (tree && tree.root) {
            assignCoords(tree.root, cameraOffset.x, cameraOffset.y, 250);
            drawNode(tree.root);
        }
    }

    function drawNode(node) {
        if (!node) return;

        ctx.strokeStyle = '#00f3ff';
        ctx.lineWidth = 2;

        if (node.left) {
            ctx.beginPath();
            ctx.moveTo(node.x, node.y);
            ctx.lineTo(node.left.x, node.left.y);
            ctx.stroke();
            drawNode(node.left);
        }
        if (node.right) {
            ctx.beginPath();
            ctx.moveTo(node.x, node.y);
            ctx.lineTo(node.right.x, node.right.y);
            ctx.stroke();
            drawNode(node.right);
        }

        // Rectangular nodes for segments often look better
        const w = 60;
        const h = 40;
        
        ctx.fillStyle = '#050505';
        ctx.fillRect(node.x - w/2, node.y - h/2, w, h);
        ctx.strokeStyle = '#ff00ff';
        ctx.strokeRect(node.x - w/2, node.y - h/2, w, h);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px "Fira Code"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.total, node.x, node.y);
        
        // Range label
        ctx.fillStyle = '#aaa';
        ctx.font = '10px Arial';
        ctx.fillText(`[${node.start},${node.end}]`, node.x, node.y - 25);
    }

    function handleBuild() {
        const valStr = document.getElementById('initArr').value;
        const arr = valStr.split(',').map(Number).filter(n => !isNaN(n));
        if (arr.length === 0) return;
        
        tree = new SegmentTree(arr);
        log(`Built tree with size ${arr.length}`, 'success');
        draw();
    }

    function handleUpdate() {
        if (!tree) return;
        const idx = parseInt(document.getElementById('updateIdx').value);
        const val = parseInt(document.getElementById('updateVal').value);
        if (isNaN(idx) || isNaN(val)) return;
        
        tree.update(idx, val);
        log(`Updated index ${idx} to ${val}`, 'info');
        draw();
    }

    function handleQuery() {
        if (!tree) return;
        const l = parseInt(document.getElementById('queryL').value);
        const r = parseInt(document.getElementById('queryR').value);
        if (isNaN(l) || isNaN(r)) return;
        
        const sum = tree.query(l, r);
        log(`Sum [${l}, ${r}] = ${sum}`, 'success');
    }

    const container = document.getElementById('canvasContainer');
    container.addEventListener('mousedown', e => {
        isDragging = true;
        dragStart = { x: e.clientX, y: e.clientY };
        initialCamera = { ...cameraOffset };
        container.style.cursor = 'grabbing';
    });
    
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const dx = e.clientX - dragStart.x;
        const dy = e.clientY - dragStart.y;
        cameraOffset.x = initialCamera.x + dx;
        cameraOffset.y = initialCamera.y + dy;
        draw();
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        container.style.cursor = 'grab';
    });

    handleBuild();

</script>
</body>
</html>
