<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCD & LCM Kalkulator</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        .results {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #eef2f7;
            border-radius: 6px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .value {
            font-weight: bold;
            color: var(--primary-color);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>GCD & LCM Iskalnik</h2>

        <div class="input-group">
            <label for="num1">Prvo število (a):</label>
            <input type="number" id="num1" placeholder="Vnesi število" min="1">
        </div>

        <div class="input-group">
            <label for="num2">Drugo število (b):</label>
            <input type="number" id="num2" placeholder="Vnesi število" min="1">
        </div>

        <button onclick="calculate()">Izračunaj</button>

        <div id="resultBox" class="results" style="display: none;">
            <div class="result-item">
                <span>Največji skupni delitelj (GCD):</span>
                <span id="gcdResult" class="value">0</span>
            </div>
            <div class="result-item">
                <span>Najmanjši skupni večkratnik (LCM):</span>
                <span id="lcmResult" class="value">0</span>
            </div>
        </div>
    </div>

    <script>
        /**
         * Logika algoritmov
         */
        const mathUtils = {
            // Evklidov algoritem za GCD
            // Formula: gcd(a, b) = gcd(b, a % b)
            getGCD: function(a, b) {
                a = Math.abs(a);
                b = Math.abs(b);
                while (b) {
                    a %= b;
                    [a, b] = [b, a];
                }
                return a;
            },

            // Izračun LCM s pomočjo GCD
            // Formula: lcm(a, b) = |a * b| / gcd(a, b)
            getLCM: function(a, b) {
                if (a === 0 || b === 0) return 0;
                return Math.abs(a * b) / this.getGCD(a, b);
            }
        };

        /**
         * DOM Manipulacija
         */
        function calculate() {
            const n1 = parseInt(document.getElementById('num1').value);
            const n2 = parseInt(document.getElementById('num2').value);

            if (isNaN(n1) || isNaN(n2)) {
                alert("Prosim, vnesite dve veljavni števili.");
                return;
            }

            // Izračun
            const gcd = mathUtils.getGCD(n1, n2);
            const lcm = mathUtils.getLCM(n1, n2);

            // Prikaz rezultatov v DOM
            document.getElementById('gcdResult').innerText = gcd;
            document.getElementById('lcmResult').innerText = lcm;
            document.getElementById('resultBox').style.display = 'block';
        }
    </script>

</body>

</html>
