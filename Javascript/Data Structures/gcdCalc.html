<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCD za decimalna števila</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #333; margin-top: 0; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5srem; font-weight: bold; color: #555; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            background-color: #e9ecef;
            font-weight: bold;
            text-align: center;
            color: #333;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GCD Kalkulator</h2>
    <div class="input-group">
        <label for="num1">Prvo število:</label>
        <input type="number" id="num1" step="any" placeholder="npr. 1.2">
    </div>
    <div class="input-group">
        <label for="num2">Drugo število:</label>
        <input type="number" id="num2" step="any" placeholder="npr. 0.36">
    </div>
    <button onclick="calculate()">Izračunaj GCD</button>

    <div id="result">Vnesite števili in pritisnite gumb.</div>
</div>

<script>
    /**
     * Izračuna GCD dveh decimalnih števil z uporabo
     * Evklidovega algoritma in določene natančnosti.
     */
    function floatGCD(a, b) {
        // Uporabimo absolutne vrednosti
        a = Math.abs(a);
        b = Math.abs(b);

        // Definiramo mejo natančnosti (epsilon)
        const EPSILON = 0.0000001;

        while (b > EPSILON) {
            let temp = b;
            b = a % b;
            a = temp;
        }
        
        // Zaokrožimo na 7 decimalnih mest, da se izognemo JS float napakam
        return parseFloat(a.toFixed(7));
    }

    function calculate() {
        const n1 = parseFloat(document.getElementById('num1').value);
        const n2 = parseFloat(document.getElementById('num2').value);
        const resultDiv = document.getElementById('result');

        if (isNaN(n1) || isNaN(n2)) {
            resultDiv.style.color = "red";
            resultDiv.innerText = "Prosim, vnesite veljavni števili.";
            return;
        }

        const gcd = floatGCD(n1, n2);
        
        resultDiv.style.color = "#333";
        resultDiv.innerText = `GCD (${n1}, ${n2}) = ${gcd}`;
    }
</script>

</body>
</html>
