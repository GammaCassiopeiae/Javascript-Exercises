<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Največja podmnožica z GCD</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
        }

        h2 { margin-top: 0; color: var(--primary); }
        
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .result-card {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .subset-tag {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            margin: 4px;
            font-size: 0.9rem;
        }

        .info { font-size: 0.85rem; color: #64748b; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Največja podmnožica z GCD > 1</h2>
    <p class="info">Vnesite cela števila, ločena z vejico (npr. 12, 4, 18, 6, 9):</p>
    
    <div class="input-section">
        <input type="text" id="numsInput" placeholder="Vnesite števila...">
        <button onclick="findLargestSubset()">Izračunaj</button>
    </div>

    <div id="output" style="display: none;">
        <div class="result-card">
            <div id="gcdValue" style="font-weight: bold; margin-bottom: 10px;"></div>
            <div id="subsetContainer"></div>
            <p id="subsetSize" style="margin-top: 10px; font-size: 0.9rem;"></p>
        </div>
    </div>
</div>

<script>
    /**
     * Funkcija za iskanje vseh deliteljev števila
     */
    function getDivisors(n) {
        const divisors = new Set();
        for (let i = 1; i <= Math.sqrt(n); i++) {
            if (n % i === 0) {
                if (i > 1) divisors.add(i);
                if (n / i > 1) divisors.add(n / i);
            }
        }
        return Array.from(divisors);
    }

    /**
     * Glavna logika:
     * Za vsako število poiščemo delitelje in štejemo njihovo pojavitev.
     * Tisti delitelj (GCD), ki se pojavi največkrat, tvori največjo podmnožico.
     */
    function findLargestSubset() {
        const inputStr = document.getElementById('numsInput').value;
        const nums = inputStr.split(',')
                             .map(n => parseInt(n.trim()))
                             .filter(n => !isNaN(n));

        if (nums.length === 0) return;

        const divisorCounts = {}; // { delitelj: [števila, ki so deljiva] }

        nums.forEach(num => {
            const divisors = getDivisors(num);
            divisors.forEach(d => {
                if (!divisorCounts[d]) divisorCounts[d] = [];
                divisorCounts[d].push(num);
            });
        });

        let maxCount = 0;
        let bestGCD = 1;
        let bestSubset = [];

        // Poiščemo delitelj z najdaljšim seznamom pripadajočih števil
        for (const d in divisorCounts) {
            if (divisorCounts[d].length > maxCount) {
                maxCount = divisorCounts[d].length;
                bestGCD = d;
                bestSubset = divisorCounts[d];
            }
        }

        displayResult(bestGCD, bestSubset, nums.length);
    }

    function displayResult(gcd, subset, total) {
        const outputDiv = document.getElementById('output');
        const gcdValue = document.getElementById('gcdValue');
        const subsetContainer = document.getElementById('subsetContainer');
        const subsetSize = document.getElementById('subsetSize');

        outputDiv.style.display = 'block';

        if (subset.length === 0) {
            gcdValue.innerText = "Ni skupnega delitelja > 1";
            subsetContainer.innerHTML = "";
            subsetSize.innerText = "";
            return;
        }

        gcdValue.innerText = `Skupni delitelj (GCD): ${gcd}`;
        subsetSize.innerText = `Velikost podmnožice: ${subset.length} od ${total} števil`;
        
        subsetContainer.innerHTML = subset
            .map(n => `<span class="subset-tag">${n}</span>`)
            .join('');
    }
</script>

</body>
</html>
