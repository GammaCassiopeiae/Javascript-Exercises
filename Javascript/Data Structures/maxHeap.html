<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <title>Max-Heap Vizualizacija</title>
    <style>
        :root {
            --bg: #0f172a;
            --node: #3b82f6;
            --text: #f1f5f9;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .controls {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: none;
            width: 60px;
            text-align: center;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }

        .btn-add {
            background: #10b981;
        }

        .btn-extract {
            background: #ef4444;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .heap-visual {
            position: relative;
            width: 800px;
            height: 400px;
            border: 1px solid #334155;
            border-radius: 15px;
            background: #1e293b;
        }

        .node {
            position: absolute;
            width: 45px;
            height: 45px;
            background: var(--node);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.5s ease;
            border: 2px solid white;
            z-index: 2;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .node.swapping {
            background: var(--accent);
            transform: scale(1.2);
        }

        .line {
            position: absolute;
            background: #475569;
            height: 2px;
            transform-origin: left center;
            z-index: 1;
            transition: opacity 0.3s;
        }

        .array-view {
            display: flex;
            gap: 5px;
            margin-top: 20px;
            font-family: monospace;
        }

        .array-cell {
            padding: 5px 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <h1>Maksi Kopica (Max-Heap)</h1>

    <div class="controls">
        <input type="number" id="heapVal" value="50">
        <button class="btn-add" onclick="addToHeap()">Insert (Vstavi)</button>
        <button class="btn-extract" onclick="extractMax()">Extract Max (Odstrani vrh)</button>
        <button onclick="window.location.reload()" style="background:#64748b">Reset</button>
    </div>

    <div class="heap-visual" id="heapDisplay"></div>
    <div class="array-view" id="arrayDisplay"></div>

    <script>
        let heap = [];
        const display = document.getElementById('heapDisplay');
        const arrayDisplay = document.getElementById('arrayDisplay');

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        function getPos(index) {
            const level = Math.floor(Math.log2(index + 1));
            const posInLevel = index - (Math.pow(2, level) - 1);
            const numInLevel = Math.pow(2, level);
            const xStep = 800 / (numInLevel + 1);
            return {
                x: xStep * (posInLevel + 1),
                y: 60 + level * 80
            };
        }

        async function render() {
            display.innerHTML = '';
            arrayDisplay.innerHTML = 'Polje: ';

            heap.forEach((val, i) => {
                // Risanje vozlišča
                const pos = getPos(i);
                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${i}`;
                node.innerText = val;
                node.style.left = `${pos.x - 22}px`;
                node.style.top = `${pos.y - 22}px`;
                display.appendChild(node);

                // Risanje polja
                const cell = document.createElement('div');
                cell.className = 'array-cell';
                cell.innerText = val;
                arrayDisplay.appendChild(cell);

                // Risanje povezave do starša
                if (i > 0) {
                    const parentIdx = Math.floor((i - 1) / 2);
                    const pPos = getPos(parentIdx);
                    drawLine(pPos.x, pPos.y, pos.x, pos.y);
                }
            });
        }

        function drawLine(x1, y1, x2, y2) {
            const line = document.createElement('div');
            line.className = 'line';
            const len = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            line.style.width = `${len}px`;
            line.style.left = `${x1}px`;
            line.style.top = `${y1}px`;
            line.style.transform = `rotate(${angle}deg)`;
            display.appendChild(line);
        }

        async function addToHeap() {
            const val = parseInt(document.getElementById('heapVal').value);
            heap.push(val);
            await render();

            let i = heap.length - 1;
            while (i > 0) {
                let p = Math.floor((i - 1) / 2);
                if (heap[i] <= heap[p]) break;

                document.getElementById(`node-${i}`).classList.add('swapping');
                document.getElementById(`node-${p}`).classList.add('swapping');
                await sleep(600);

                [heap[i], heap[p]] = [heap[p], heap[i]];
                await render();
                i = p;
            }
            await render();
        }

        async function extractMax() {
            if (heap.length === 0) return;
            if (heap.length === 1) {
                heap.pop();
                render();
                return;
            }

            heap[0] = heap.pop();
            await render();

            let i = 0;
            while (true) {
                let left = 2 * i + 1;
                let right = 2 * i + 2;
                let largest = i;

                if (left < heap.length && heap[left] > heap[largest]) largest = left;
                if (right < heap.length && heap[right] > heap[largest]) largest = right;
                if (largest === i) break;

                document.getElementById(`node-${i}`).classList.add('swapping');
                document.getElementById(`node-${largest}`).classList.add('swapping');
                await sleep(600);

                [heap[i], heap[largest]] = [heap[largest], heap[i]];
                await render();
                i = largest;
            }
        }
    </script>
</body>

</html>
