<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliquotovo Zaporedje</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #10b981;
            --bg: #f3f4f6;
            --text: #1f2937;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .result-area {
            margin-top: 1.5rem;
            border-top: 2px solid #f3f4f6;
            padding-top: 1.5rem;
        }

        .sequence-flow {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .step {
            background: #ede9fe;
            color: #5b21b6;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .arrow {
            color: #9ca3af;
            font-weight: bold;
        }

        .info-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            background: #f0fdf4;
            border: 1px solid #dcfce7;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            background: var(--secondary);
            color: white;
            margin-left: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Aliquotovo Zaporedje</h1>
        <p style="font-size: 0.9rem; color: #6b7280; margin-bottom: 1.5rem;">
            Vnesite število, da vidite vsoto njegovih pravih deliteljev v zaporedju.
        </p>

        <div class="input-group">
            <input type="number" id="startNum" placeholder="Vnesite število (npr. 12, 28, 220)" min="1">
            <button onclick="startCalculation()">Generiraj</button>
        </div>

        <div id="resultDisplay" class="result-area" style="display: none;">
            <div id="sequenceContainer" class="sequence-flow"></div>
            <div id="statusInfo" class="info-box"></div>
        </div>
    </div>

    <script>
        /**
         * Izračuna vsoto pravih deliteljev (Proper Divisors)
         * npr. za 12: 1 + 2 + 3 + 4 + 6 = 16
         */
        function sumProperDivisors(n) {
            if (n <= 1) return 0;
            let sum = 1;
            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) {
                    sum += i;
                    let other = n / i;
                    if (other !== i) sum += other;
                }
            }
            return sum;
        }

        function startCalculation() {
            const input = document.getElementById('startNum');
            const container = document.getElementById('sequenceContainer');
            const info = document.getElementById('statusInfo');
            const display = document.getElementById('resultDisplay');

            let current = parseInt(input.value);
            if (isNaN(current) || current < 1) return;

            display.style.display = 'block';
            container.innerHTML = '';

            let sequence = [current];
            let visited = new Set([current]);
            let terminationReason = "";

            // Generiranje zaporedja (omejitev na 50 korakov za varnost)
            while (current > 1 && sequence.length < 50) {
                let next = sumProperDivisors(current);

                if (next === 0) {
                    sequence.push(0);
                    terminationReason = "Zaporedje se je končalo pri 0.";
                    break;
                }

                if (next === current) {
                    sequence.push(next);
                    terminationReason = `Število ${current} je <b>popolno število</b> (ponavlja se v neskončnost).`;
                    break;
                }

                if (visited.has(next)) {
                    sequence.push(next);
                    terminationReason = `Zaporedje je vstopilo v <b>cikel</b> pri številu ${next}.`;
                    break;
                }

                sequence.push(next);
                visited.add(next);
                current = next;

                if (sequence.length === 50) {
                    terminationReason = "Dosežena omejitev 50 členov (zaporedje morda raste v neskončnost).";
                }
            }

            if (current === 1) terminationReason = "Zaporedje se je končalo pri 1 (praštevilo v zadnjem koraku).";

            // Izris v DOM
            sequence.forEach((num, index) => {
                const span = document.createElement('span');
                span.className = 'step';
                span.innerText = num;
                container.appendChild(span);

                if (index < sequence.length - 1) {
                    const arrow = document.createElement('span');
                    arrow.className = 'arrow';
                    arrow.innerHTML = ' &rarr; ';
                    container.appendChild(arrow);
                }
            });

            info.innerHTML = `<strong>Rezultat:</strong> ${terminationReason}`;
        }
    </script>

</body>

</html>
