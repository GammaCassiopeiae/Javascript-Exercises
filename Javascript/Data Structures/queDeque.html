<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Deque DS Vizualizacija</title>
    <style>
        :root { --primary: #0984e3; --secondary: #00b894; --accent: #6c5ce7; --danger: #d63031; }
        body { font-family: 'Segoe UI', sans-serif; background: #dfe6e9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .deque-container {
            display: flex; gap: 10px; min-width: 600px; height: 100px; border: 3px dashed #636e72;
            border-radius: 15px; padding: 15px; background: white; align-items: center;
            justify-content: center; position: relative; margin: 40px 0; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .element {
            width: 50px; height: 50px; background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center; border-radius: 8px;
            font-weight: bold; position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        .label { position: absolute; top: -25px; font-size: 0.8rem; color: #636e72; font-weight: bold; text-transform: uppercase; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .side-controls { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        
        input { padding: 8px; border: 2px solid #dfe6e9; border-radius: 6px; width: 50px; text-align: center; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; color: white; font-weight: bold; width: 140px; transition: 0.2s; }
        
        .btn-add { background: var(--secondary); }
        .btn-remove { background: var(--danger); }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        #status { margin-top: 20px; font-weight: bold; color: #2d3436; }
    </style>
</head>
<body>

    <h1>Dvosmerna vrsta (Deque)</h1>
    <div id="status">Dodajte elemente na levi ali desni strani</div>

    <div class="deque-container" id="deque">
        <div class="label" style="left: 10px;">Front (Spredaj)</div>
        <div class="label" style="right: 10px;">Rear (Zadaj)</div>
    </div>

    <div class="controls">
        <div class="side-controls">
            <strong>Leva stran (Front)</strong>
            <input type="number" id="valLeft" value="1">
            <button class="btn-add" onclick="pushFront()">Add Front</button>
            <button class="btn-remove" onclick="popFront()">Remove Front</button>
        </div>
        
        <div class="side-controls">
            <strong>Desna stran (Rear)</strong>
            <input type="number" id="valRight" value="99">
            <button class="btn-add" onclick="pushBack()">Add Rear</button>
            <button class="btn-remove" onclick="popBack()">Remove Rear</button>
        </div>
    </div>

    <script>
        const dequeEl = document.getElementById('deque');
        const statusEl = document.getElementById('status');
        const maxLimit = 10;

        function createEl(val) {
            const div = document.createElement('div');
            div.className = 'element';
            div.innerText = val;
            return div;
        }

        function checkLimit() {
            if (dequeEl.children.length - 2 >= maxLimit) {
                statusEl.innerText = "Napaka: Vrsta je polna!";
                return false;
            }
            return true;
        }

        function pushFront() {
            if (!checkLimit()) return;
            const val = document.getElementById('valLeft').value;
            const el = createEl(val);
            // Vstavimo za prvo labelo (ki je index 0)
            dequeEl.insertBefore(el, dequeEl.children[1]);
            statusEl.innerText = `Dodan ${val} na začetek.`;
        }

        function pushBack() {
            if (!checkLimit()) return;
            const val = document.getElementById('valRight').value;
            const el = createEl(val);
            // Vstavimo pred zadnjo labelo
            dequeEl.insertBefore(el, dequeEl.children[dequeEl.children.length - 1]);
            statusEl.innerText = `Dodan ${val} na konec.`;
        }

        function popFront() {
            if (dequeEl.children.length <= 2) {
                statusEl.innerText = "Vrsta je prazna!";
                return;
            }
            const target = dequeEl.children[1];
            target.style.transform = "translateY(-50px) scale(0)";
            setTimeout(() => target.remove(), 400);
            statusEl.innerText = "Odstranjen element z začetka.";
        }

        function popBack() {
            if (dequeEl.children.length <= 2) {
                statusEl.innerText = "Vrsta je prazna!";
                return;
            }
            const target = dequeEl.children[dequeEl.children.length - 2];
            target.style.transform = "translateY(50px) scale(0)";
            setTimeout(() => target.remove(), 400);
            statusEl.innerText = "Odstranjen element s konca.";
        }
    </script>
</body>
</html>
