<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vsota zaporedja 2, 22, 222...</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
        }

        h1 { color: var(--primary); font-size: 1.5rem; margin-top: 0; }
        
        .formula {
            background: #eff6ff;
            padding: 1rem;
            border-radius: 8px;
            font-style: italic;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover { background: #1d4ed8; }

        .result-box {
            margin-top: 1rem;
            padding: 1.5rem;
            background: #f1f5f9;
            border-radius: 8px;
            display: none;
        }

        .term-list {
            font-family: monospace;
            word-break: break-all;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            max-height: 150px;
            overflow-y: auto;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 10px;
        }

        .total {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e293b;
            word-break: break-all;
        }

        .label { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Vsota zaporedja ponavljajočih števk</h1>
    
    <div class="formula">
        S<sub>n</sub> = 2 + 22 + 222 + ... + 22...2 (n-krat)
    </div>

    <div class="input-group">
        <input type="number" id="steps" value="5" min="1" max="500" placeholder="Število členov (n)">
        <button onclick="calculateSum()">Izračunaj</button>
    </div>

    <div id="resultArea" class="result-box">
        <span class="label">Členi zaporedja:</span>
        <div id="terms" class="term-list"></div>
        
        <span class="label">Skupna vsota (BigInt):</span>
        <div id="totalSum" class="total"></div>
    </div>
</div>

<script>
    /**
     * Izračuna vsoto zaporedja 2, 22, 222... do n-tega člena.
     * Uporabljamo BigInt za obdelavo poljubno dolgih števil.
     */
    function calculateSum() {
        const n = parseInt(document.getElementById('steps').value);
        const resultArea = document.getElementById('resultArea');
        const termsDiv = document.getElementById('terms');
        const totalDiv = document.getElementById('totalSum');

        if (isNaN(n) || n < 1) return;

        let currentTerm = "";
        let sum = BigInt(0);
        let allTerms = [];

        // Algoritem za generiranje členov in seštevanje
        for (let i = 1; i <= n; i++) {
            // Ustvarimo niz iz '2'-k i-krat
            currentTerm = "2".repeat(i);
            let termAsBigInt = BigInt(currentTerm);
            
            sum += termAsBigInt;
            
            // Shranimo za prikaz (omejimo prikaz na prvih 50 členov za hitrost DOM-a)
            if (i <= 50) allTerms.push(currentTerm);
        }

        // Prikaz v DOM
        resultArea.style.display = 'block';
        termsDiv.innerText = allTerms.join(" + ") + (n > 50 ? " ... + [zadnji člen]" : "");
        totalDiv.innerText = sum.toString();
    }

    // Začetni izračun
    calculateSum();
</script>

</body>
</html>
