<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Stack (Sklad) Vizualizacija</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #a29bfe;
            --danger: #ff7675;
            --bg: #f0f2f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .stack-container {
            width: 200px;
            height: 400px;
            border: 4px solid #2d3436;
            border-top: none;
            border-radius: 0 0 15px 15px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            padding: 10px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .stack-element {
            width: 90%;
            height: 45px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            animation: pushAnim 0.4s ease-out;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stack-element.popping {
            animation: popAnim 0.4s ease-in forwards;
        }

        @keyframes pushAnim {
            from { transform: translateY(-500px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes popAnim {
            to { transform: translateY(-500px); opacity: 0; }
        }

        .controls { margin-top: 30px; display: flex; gap: 10px; align-items: center; }
        input { padding: 10px; border: 2px solid #ddd; border-radius: 8px; width: 60px; text-align: center; font-size: 1rem; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-push { background: var(--primary); }
        .btn-pop { background: var(--danger); }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:disabled { background: #b2bec3; cursor: not-allowed; }

        #status { margin-top: 15px; font-weight: bold; color: #2d3436; height: 1.5em; }
    </style>
</head>
<body>

    <h1>Vizualizacija Sklada (Stack)</h1>
    <div id="status">Dodajte element na sklad (Push)</div>

    <div class="stack-container" id="stack"></div>

    <div class="controls">
        <input type="number" id="inputValue" value="10">
        <button class="btn-push" onclick="push()">Push (Vstavi)</button>
        <button class="btn-pop" onclick="pop()">Pop (Odstrani)</button>
    </div>

    <script>
        const stackContainer = document.getElementById('stack');
        const statusText = document.getElementById('status');
        const inputField = document.getElementById('inputValue');
        const maxStackSize = 7;
        let stackData = [];

        function push() {
            if (stackData.length >= maxStackSize) {
                statusText.innerText = "Sklad je poln! (Stack Overflow)";
                statusText.style.color = "var(--danger)";
                return;
            }

            const val = inputField.value;
            stackData.push(val);
            
            const element = document.createElement('div');
            element.className = 'stack-element';
            element.innerText = val;
            stackContainer.appendChild(element);

            statusText.innerText = `Vstavljeno: ${val}`;
            statusText.style.color = "#2d3436";
            
            // Priprava za naslednji vnos
            inputField.value = Math.floor(Math.random() * 90) + 10;
        }

        async function pop() {
            if (stackData.length === 0) {
                statusText.innerText = "Sklad je prazen! (Stack Underflow)";
                statusText.style.color = "var(--danger)";
                return;
            }

            const elements = document.getElementsByClassName('stack-element');
            const topElement = elements[elements.length - 1];
            
            topElement.classList.add('popping');
            const removedVal = stackData.pop();
            statusText.innerText = `Odstranjeno: ${removedVal}`;
            statusText.style.color = "var(--danger)";

            // Počakamo na animacijo, preden odstranimo iz DOM-a
            setTimeout(() => {
                topElement.remove();
            }, 400);
        }
    </script>
</body>
</html>
