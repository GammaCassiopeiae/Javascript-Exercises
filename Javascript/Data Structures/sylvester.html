<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylvestrovo Zaporedje</title>
    <style>
        :root {
            --primary: #6d28d9;
            --bg: #fafafa;
            --card: #ffffff;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
        }

        h1 { color: var(--primary); margin-top: 0; }

        .formula {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 8px;
            font-family: serif;
            font-style: italic;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 2rem;
            align-items: center;
        }

        input {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 80px;
            font-size: 1rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th { background-color: #f9fafb; color: #4b5563; }

        .big-num {
            font-family: 'Courier New', monospace;
            word-break: break-all;
            color: #111827;
            font-size: 0.9rem;
        }

        .warning {
            color: #b91c1c;
            font-size: 0.85rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sylvestrovo Zaporedje</h1>
    
    <div class="formula">
        a<sub>0</sub> = 2 <br>
        a<sub>n</sub> = a<sub>n-1</sub><sup>2</sup> - a<sub>n-1</sub> + 1
    </div>

    <div class="controls">
        <label for="steps">Število členov:</label>
        <input type="number" id="steps" value="6" min="1" max="10">
        <button onclick="generateSylvester()">Generiraj</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">n</th>
                    <th>Vrednost a<sub>n</sub></th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <p class="warning">
        * Zaradi dvojno eksponentne rasti število števk hitro naraste. Pri n=10 ima število že več sto števk.
    </p>
</div>

<script>
    /**
     * Izračuna Sylvestrovo zaporedje z uporabo BigInt podatkovne strukture.
     * BigInt je nujen, saj vrednosti hitro presežejo Number.MAX_SAFE_INTEGER.
     */
    function calculateSylvester(n) {
        let sequence = [];
        if (n <= 0) return sequence;

        let current = 2n; // a0 = 2
        sequence.push(current);

        for (let i = 1; i < n; i++) {
            // Formula: a_n = a_{n-1}^2 - a_{n-1} + 1
            current = (current * current) - current + 1n;
            sequence.push(current);
        }
        return sequence;
    }

    function generateSylvester() {
        const n = parseInt(document.getElementById('steps').value);
        const tbody = document.getElementById('resultBody');
        
        // Omejitev za stabilnost brskalnika pri prikazu
        if (isNaN(n) || n < 1) return;
        if (n > 12) {
            alert("Vrednosti nad n=12 so prevelike za učinkovit prikaz v brskalniku.");
            return;
        }

        const sequence = calculateSylvester(n);
        tbody.innerHTML = '';

        sequence.forEach((val, index) => {
            const row = document.createElement('tr');
            
            const cellIndex = document.createElement('td');
            cellIndex.innerText = index;
            
            const cellVal = document.createElement('td');
            cellVal.className = 'big-num';
            cellVal.innerText = val.toString();

            row.appendChild(cellIndex);
            row.appendChild(cellVal);
            tbody.appendChild(row);
        });
    }

    // Začetni izračun
    generateSylvester();
</script>

</body>
</html>
