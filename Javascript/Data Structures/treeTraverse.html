<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Tree Traversal Vizualizacija</title>
    <style>
        :root { --bg: #f8fafc; --node-bg: #fff; --primary: #6366f1; --visited: #10b981; --current: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; color: #1e293b; }
        
        .tree-canvas { position: relative; width: 600px; height: 350px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        
        .node { 
            position: absolute; width: 40px; height: 40px; background: var(--node-bg); border: 2px solid var(--primary); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;
            z-index: 10; transition: all 0.4s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .node.current { background: var(--current); border-color: white; transform: scale(1.2); box-shadow: 0 0 15px var(--current); }
        .node.visited { background: var(--visited); border-color: white; color: white; }

        .line { position: absolute; background: #cbd5e1; height: 2px; transform-origin: left center; z-index: 1; }
        
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: 0.2s; background: #475569; }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-2px); }
        .btn-run { background: var(--primary); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        .output { margin-top: 20px; font-family: monospace; font-size: 1.2rem; background: #1e293b; color: #34d399; padding: 10px 20px; border-radius: 8px; min-width: 300px; text-align: center; }
    </style>
</head>
<body>

    <h1>Prehajanje binarnega drevesa</h1>
    
    <div class="tree-canvas" id="canvas"></div>

    <div class="controls">
        <button class="btn-run" id="btnPre" onclick="run('pre')">Pre-order</button>
        <button class="btn-run" id="btnIn" onclick="run('in')">In-order</button>
        <button class="btn-run" id="btnPost" onclick="run('post')">Post-order</button>
        <button onclick="window.location.reload()" style="background: #ef4444;">Reset</button>
    </div>

    <div class="output" id="output">Rezultat: [ ]</div>

    <script>
        const canvas = document.getElementById('canvas');
        const output = document.getElementById('output');

        // Struktura vozlišč (id, x, y, levo_id, desno_id)
        const tree = {
            1: { val: 'A', x: 300, y: 50,  left: 2, right: 3 },
            2: { val: 'B', x: 150, y: 130, left: 4, right: 5 },
            3: { val: 'C', x: 450, y: 130, left: 6, right: 7 },
            4: { val: 'D', x: 80,  y: 210, left: null, right: null },
            5: { val: 'E', x: 220, y: 210, left: null, right: null },
            6: { val: 'F', x: 380, y: 210, left: null, right: null },
            7: { val: 'G', x: 520, y: 210, left: null, right: null }
        };

        function init() {
            for (let id in tree) {
                const node = tree[id];
                const div = document.createElement('div');
                div.className = 'node';
                div.id = `node-${id}`;
                div.innerText = node.val;
                div.style.left = `${node.x - 20}px`;
                div.style.top = `${node.y - 20}px`;
                canvas.appendChild(div);

                if (node.left) drawLine(node.x, node.y, tree[node.left].x, tree[node.left].y);
                if (node.right) drawLine(node.x, node.y, tree[node.right].x, tree[node.right].y);
            }
        }

        function drawLine(x1, y1, x2, y2) {
            const line = document.createElement('div');
            line.className = 'line';
            const len = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
            const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
            line.style.width = `${len}px`;
            line.style.left = `${x1}px`;
            line.style.top = `${y1}px`;
            line.style.transform = `rotate(${angle}deg)`;
            canvas.appendChild(line);
        }

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));
        let result = [];

        async function visit(id) {
            const el = document.getElementById(`node-${id}`);
            el.classList.add('current');
            await sleep(600);
            el.classList.replace('current', 'visited');
            result.push(tree[id].val);
            output.innerText = `Rezultat: [ ${result.join(', ')} ]`;
            await sleep(400);
        }

        // DFS Traversal algoritmi
        async function traverse(id, mode) {
            if (!id) return;

            if (mode === 'pre') await visit(id);
            await traverse(tree[id].left, mode);
            if (mode === 'in') await visit(id);
            await traverse(tree[id].right, mode);
            if (mode === 'post') await visit(id);
        }

        async function run(mode) {
            document.querySelectorAll('.btn-run').forEach(b => b.disabled = true);
            result = [];
            document.querySelectorAll('.node').forEach(n => n.className = 'node');
            output.innerText = "Tečem...";
            await traverse(1, mode);
            document.querySelectorAll('.btn-run').forEach(b => b.disabled = false);
        }

        init();
    </script>
</body>
</html>
