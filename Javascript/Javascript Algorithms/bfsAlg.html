<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>BFS Vizualizacija</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .tree-container { position: relative; width: 600px; height: 400px; margin-top: 20px; border: 2px solid #1e293b; border-radius: 15px; background: #1e293b; overflow: hidden; }
        .node { 
            position: absolute; width: 42px; height: 42px; background: #334155; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            transition: all 0.5s ease; border: 3px solid #3b82f6; z-index: 2;
        }
        /* Stanja vizualizacije */
        .node.in-queue { background: #1e40af; border-color: #60a5fa; transform: scale(1.1); } /* Čaka v vrsti */
        .node.visiting { background: #f59e0b; color: #000; transform: scale(1.3); box-shadow: 0 0 20px #f59e0b; } /* Trenutno obdelujemo */
        .node.visited { background: #10b981; border-color: #ecfdf5; } /* Obiskano */
        
        .line { position: absolute; background: #475569; height: 2px; transform-origin: left center; z-index: 1; opacity: 0.6; }
        .controls { margin-top: 30px; display: flex; gap: 15px; align-items: center; }
        button { padding: 12px 24px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        #status { font-size: 1.1rem; color: #94a3b8; min-height: 1.5em; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Iskanje v širino (BFS)</h1>
    <div id="status">Pritisnite gumb za začetek raziskovanja po nivojih</div>
    
    <div class="tree-container" id="tree"></div>

    <div class="controls">
        <button id="startBtn" onclick="startBFS()">Zaženi BFS</button>
        <button onclick="window.location.reload()" style="background: #64748b;">Ponastavi</button>
    </div>

    <script>
        const treeContainer = document.getElementById('tree');
        const statusText = document.getElementById('status');

        // Struktura drevesa (identična prejšnjemu DFS primeru za lažjo primerjavo)
        const nodes = [
            { id: 1, x: 300, y: 50, children: [2, 3] },
            { id: 2, x: 150, y: 150, children: [4, 5] },
            { id: 3, x: 450, y: 150, children: [6, 7] },
            { id: 4, x: 75,  y: 250, children: [] },
            { id: 5, x: 225, y: 250, children: [] },
            { id: 6, x: 375, y: 250, children: [] },
            { id: 7, x: 525, y: 250, children: [] }
        ];

        const nodeMap = {};

        function initTree() {
            nodes.forEach(node => {
                const div = document.createElement('div');
                div.className = 'node';
                div.id = `node-${node.id}`;
                div.innerText = node.id;
                div.style.left = `${node.x - 21}px`;
                div.style.top = `${node.y - 21}px`;
                treeContainer.appendChild(div);
                nodeMap[node.id] = node;

                node.children.forEach(childId => {
                    const child = nodes.find(n => n.id === childId);
                    drawLine(node.x, node.y, child.x, child.y);
                });
            });
        }

        function drawLine(x1, y1, x2, y2) {
            const line = document.createElement('div');
            line.className = 'line';
            const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            line.style.width = `${length}px`;
            line.style.left = `${x1}px`;
            line.style.top = `${y1}px`;
            line.style.transform = `rotate(${angle}deg)`;
            treeContainer.appendChild(line);
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        async function bfs(startId) {
            let queue = [startId];
            let visited = new Set();
            
            // Označi začetni element v vrsti
            document.getElementById(`node-${startId}`).classList.add('in-queue');

            while (queue.length > 0) {
                let currentId = queue.shift(); // Vzemi prvega iz vrste (FIFO)
                let nodeDiv = document.getElementById(`node-${currentId}`);
                
                statusText.innerText = `Obdelujem vozlišče: ${currentId}`;
                nodeDiv.classList.replace('in-queue', 'visiting');
                await sleep(800);

                nodeDiv.classList.replace('visiting', 'visited');
                visited.add(currentId);

                // Dodaj otroke v vrsto
                for (let childId of nodeMap[currentId].children) {
                    if (!visited.has(childId)) {
                        let childDiv = document.getElementById(`node-${childId}`);
                        childDiv.classList.add('in-queue');
                        queue.push(childId);
                        statusText.innerText = `Dodajam vozlišče ${childId} v vrsto...`;
                        await sleep(400);
                    }
                }
            }
            statusText.innerText = "BFS prehajanje po nivojih je zaključeno!";
        }

        function startBFS() {
            document.getElementById('startBtn').disabled = true;
            bfs(1);
        }

        initTree();
    </script>
</body>
</html>
