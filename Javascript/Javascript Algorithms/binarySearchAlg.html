<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <title>Binary Search Vizualizacija</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0f172a;
            color: #f1f5f9;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 8px;
            margin: 30px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .box {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #334155;
            border-radius: 6px;
            font-weight: bold;
            border: 2px solid transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Vizualna stanja */
        .box.active-range {
            background: #1e40af;
            border-color: #3b82f6;
        }

        /* Območje, kjer iščemo */
        .box.mid {
            background: #f59e0b;
            color: #000;
            transform: scale(1.15);
            z-index: 10;
        }

        /* Sredinski element */
        .box.found {
            background: #10b981;
            color: white;
            transform: scale(1.2);
            box-shadow: 0 0 15px #10b981;
        }

        .box.discarded {
            opacity: 0.2;
            transform: scale(0.9);
        }

        /* Izključeno območje */

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #1e293b;
            padding: 15px 25px;
            border-radius: 30px;
        }

        input {
            padding: 8px;
            border-radius: 5px;
            border: none;
            width: 60px;
            text-align: center;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        #status {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #94a3b8;
            height: 1.5em;
        }
    </style>
</head>

<body>

    <h1>Binarno Iskanje (Binary Search)</h1>
    <div id="status">Seznam je avtomatsko urejen.</div>

    <div class="container" id="arrayContainer"></div>

    <div class="controls">
        <label>Išči:</label>
        <input type="number" id="targetInput" value="50">
        <button id="searchBtn" onclick="startSearch()">Išči z razpolavljanjem</button>
        <button onclick="window.location.reload()">Ponastavi</button>
    </div>

    <script>
        const container = document.getElementById('arrayContainer');
        const statusText = document.getElementById('status');

        // Generiramo 15 urejenih števil
        const data = Array.from({
            length: 15
        }, () => Math.floor(Math.random() * 90) + 10).sort((a, b) => a - b);
        const boxes = [];

        function createArray() {
            data.forEach((value, index) => {
                const box = document.createElement('div');
                box.classList.add('box');
                box.innerText = value;
                container.appendChild(box);
                boxes.push(box);
            });
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        async function binarySearch() {
            const target = parseInt(document.getElementById('targetInput').value);
            let low = 0;
            let high = boxes.length - 1;
            let found = false;

            while (low <= high) {
                // Označi aktivno območje iskanja
                boxes.forEach((box, idx) => {
                    box.className = 'box'; // Ponastavi
                    if (idx < low || idx > high) box.classList.add('discarded');
                    else box.classList.add('active-range');
                });

                let mid = Math.floor((low + high) / 2);
                await sleep(600);

                // Označi sredinski element (pivot)
                boxes[mid].classList.remove('active-range');
                boxes[mid].classList.add('mid');
                statusText.innerText = `Preverjam sredino: ${boxes[mid].innerText}`;
                await sleep(800);

                const midVal = parseInt(boxes[mid].innerText);

                if (midVal === target) {
                    boxes[mid].classList.remove('mid');
                    boxes[mid].classList.add('found');
                    statusText.innerText = `Najdeno! Število ${target} je na indeksu ${mid}.`;
                    found = true;
                    break;
                } else if (midVal < target) {
                    statusText.innerText = `${midVal} je manjše od ${target}. Iščem v desni polovici.`;
                    low = mid + 1;
                } else {
                    statusText.innerText = `${midVal} je večje od ${target}. Iščem v levi polovici.`;
                    high = mid - 1;
                }
                await sleep(600);
            }

            if (!found) {
                boxes.forEach(box => box.classList.add('discarded'));
                statusText.innerText = `Število ${target} ne obstaja v seznamu.`;
            }
        }

        function startSearch() {
            document.getElementById('searchBtn').disabled = true;
            binarySearch().then(() => {
                document.getElementById('searchBtn').disabled = false;
            });
        }

        createArray();
    </script>
</body>

</html>
