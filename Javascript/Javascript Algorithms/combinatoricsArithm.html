<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Combinatorics & Arithmetic</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1>Combinatorics & Arithmetic</h1>

    <div class="box">
        <h3>Factorial / nCr / nPr</h3>
        n: <input type="number" id="nVal"> r: <input type="number" id="rVal">
        <button onclick="calcComb()">Calculate All</button>
        <p id="combRes"></p>
    </div>

    <div class="box">
        <h3>Fast Exponentiation (a^b mod m)</h3>
        base: <input type="number" id="expBase">
        exp: <input type="number" id="expPow">
        mod: <input type="number" id="expMod" value="1000000007">
        <button onclick="runExp()">Power</button>
        <p id="expRes"></p>
    </div>

    <script>
        const fact = (n) => n <= 1 ? 1n : BigInt(n) * fact(n - 1);

        function calcComb() {
            const n = parseInt(document.getElementById('nVal').value);
            const r = parseInt(document.getElementById('rVal').value);
            if (r > n) return alert("r cannot be greater than n");

            const nFact = fact(n);
            const rFact = fact(r);
            const nrFact = fact(n - r);

            const nPr = nFact / nrFact;
            const nCr = nPr / rFact;

            document.getElementById('combRes').innerHTML =
                `n!: ${nFact}<br>nPr: ${nPr}<br>nCr: ${nCr}`;
        }

        function fastExp(base, exp, mod) {
            let res = 1n;
            base = BigInt(base) % BigInt(mod);
            exp = BigInt(exp);
            while (exp > 0n) {
                if (exp % 2n === 1n) res = (res * base) % BigInt(mod);
                base = (base * base) % BigInt(mod);
                exp = exp / 2n;
            }
            return res;
        }

        function runExp() {
            const b = document.getElementById('expBase').value;
            const e = document.getElementById('expPow').value;
            const m = document.getElementById('expMod').value;
            document.getElementById('expRes').innerText = `Result: ${fastExp(b, e, m)}`;
        }
    </script>
</body>

</html>
