<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Programming Vizualizacija</title>
    <style>
        :root { --bg: #0d1117; --primary: #58a6ff; --accent: #7ee787; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        canvas { background: #161b22; border: 2px solid #30363d; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; display: flex; gap: 10px; align-items: center; background: #21262d; padding: 15px 25px; border-radius: 12px; }
        input { background: #0d1117; border: 1px solid #30363d; color: var(--primary); padding: 8px; border-radius: 6px; width: 60px; text-align: center; font-weight: bold; }
        button { background: #238636; border: none; padding: 10px 20px; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        button:hover:not(:disabled) { background: #2ea043; }
        button:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
        #status { font-family: monospace; font-size: 1.1rem; color: var(--accent); margin-bottom: 15px; height: 1.5em; }
    </style>
</head>
<body>

    <h1>Fibonacci: Dinamično Programiranje</h1>
    <div id="status">Vnesite n-to število (max 20) in zaženite DP</div>
    
    <canvas id="dpCanvas" width="800" height="300"></canvas>
    
    <div class="controls">
        <label>n = </label>
        <input type="number" id="fibInput" value="10" min="2" max="20">
        <button id="startBtn">Izračunaj z Memoizacijo</button>
        <button id="resetBtn" style="background: #30363d;">Ponastavi</button>
    </div>

    <script>
        /**
         * VIZUALIZACIJA DINAMIČNEGA PROGRAMIRANJA (Fibonacci + Memoizacija)
         */
        const canvas = document.getElementById('dpCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fibInput = document.getElementById('fibInput');

        let memo = [];
        let n = 0;
        const CELL_SIZE = 60;
        const START_X = 50;
        const START_Y = 150;

        function init() {
            n = parseInt(fibInput.value);
            memo = new Array(n + 1).fill(null);
            draw();
            startBtn.disabled = false;
            statusEl.innerText = `Pripravljen za izračun Fib(${n})`;
            statusEl.style.color = "var(--primary)";
        }

        // Risanje DP tabele na Canvas (DOM API)
        function draw(activeIndex = -1) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i <= n; i++) {
                const x = START_X + i * (CELL_SIZE + 10);
                const y = START_Y;

                // Ozadje celice
                ctx.strokeStyle = i === activeIndex ? "var(--accent)" : "#30363d";
                ctx.lineWidth = i === activeIndex ? 3 : 1;
                ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);

                // Indeks zgoraj
                ctx.fillStyle = "#8b949e";
                ctx.font = "12px Arial";
                ctx.textAlign = "center";
                ctx.fillText(`i=${i}`, x + CELL_SIZE/2, y - 10);

                // Vrednost v celici (DP rezultat)
                if (memo[i] !== null) {
                    ctx.fillStyle = "var(--accent)";
                    ctx.font = "bold 16px monospace";
                    ctx.fillText(memo[i], x + CELL_SIZE/2, y + CELL_SIZE/1.7);
                    
                    // Puščica (vizualizacija odvisnosti f(i) = f(i-1) + f(i-2))
                    if (i > 1 && activeIndex === i) {
                        drawDependency(i);
                    }
                }
            }
        }

        function drawDependency(i) {
            ctx.strokeStyle = "rgba(126, 231, 135, 0.4)";
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            // Lok od f(i-1) do f(i)
            ctx.arc(START_X + (i-0.5)*70, START_Y, 35, Math.PI, 0);
            // Lok od f(i-2) do f(i)
            ctx.arc(START_X + (i-1)*70, START_Y, 70, Math.PI, 0);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        // DP Algoritem (Bottom-up pristop)
        async function solveFib() {
            startBtn.disabled = true;
            resetBtn.disabled = true;

            // Bazna primera
            memo[0] = 0;
            statusEl.innerText = "Bazni primer: Fib(0) = 0";
            draw(0);
            await sleep(800);

            memo[1] = 1;
            statusEl.innerText = "Bazni primer: Fib(1) = 1";
            draw(1);
            await sleep(800);

            // Iterativno polnjenje tabele (DP)
            for (let i = 2; i <= n; i++) {
                statusEl.innerText = `Računam Fib(${i}) = Fib(${i-1}) + Fib(${i-2})`;
                statusEl.style.color = "var(--accent)";
                
                // DP Logika: Vrednost vzamemo neposredno iz tabele (O(1))
                memo[i] = memo[i - 1] + memo[i - 2];
                
                draw(i);
                await sleep(1000);
            }

            statusEl.innerText = `Končano! Fib(${n}) = ${memo[n]}`;
            resetBtn.disabled = false;
        }

        // Event Listenerji
        startBtn.addEventListener('click', solveFib);
        resetBtn.addEventListener('click', init);

        // Prvi zagon
        init();
    </script>
</body>
</html>
