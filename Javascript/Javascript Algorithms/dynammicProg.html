<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <title>Dynamic Programming - Knapsack</title>
    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
        }

        .grid-table {
            display: grid;
            overflow-x: auto;
            margin-top: 20px;
            border: 1px solid #ddd;
        }

        .cell {
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 0.5px solid #eee;
            font-size: 0.8rem;
        }

        .header {
            background: #e2e8f0;
            font-weight: bold;
        }

        .target {
            background: #dcfce7;
            font-weight: bold;
            color: #166534;
        }

        .inputs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100px;
        }

        button {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>0/1 Knapsack (Dinamično programiranje)</h2>
        <div class="inputs">
            <label>Vrednosti: <input type="text" id="values" value="6,10,12"></label>
            <label>Teže: <input type="text" id="weights" value="1,2,3"></label>
            <label>Kapaciteta: <input type="number" id="capacity" value="5"></label>
            <button onclick="solveKnapsack()">Izračunaj DP</button>
        </div>

        <div id="status"></div>
        <div id="tableContainer" class="grid-table"></div>
    </div>

    <script>
        function solveKnapsack() {
            const val = document.getElementById('values').value.split(',').map(Number);
            const wt = document.getElementById('weights').value.split(',').map(Number);
            const W = parseInt(document.getElementById('capacity').value);
            const n = val.length;

            // DP matrika: (n+1) vrstic x (W+1) stolpcev
            let dp = Array.from({
                length: n + 1
            }, () => Array(W + 1).fill(0));

            // Polnjenje DP tabele
            for (let i = 1; i <= n; i++) {
                for (let w = 0; w <= W; w++) {
                    if (wt[i - 1] <= w) {
                        // Izberemo max med: (vzamemo predmet) ALI (ne vzamemo predmeta)
                        dp[i][w] = Math.max(val[i - 1] + dp[i - 1][w - wt[i - 1]], dp[i - 1][w]);
                    } else {
                        dp[i][w] = dp[i - 1][w];
                    }
                }
            }

            renderTable(dp, W, n, wt);
            document.getElementById('status').innerHTML = `<strong>Max vrednost: ${dp[n][W]}</strong>`;
        }

        function renderTable(dp, W, n, wt) {
            const container = document.getElementById('tableContainer');
            container.style.gridTemplateColumns = `repeat(${W + 2}, 1fr)`;
            container.innerHTML = '';

            // Glava tabele (kapacitete)
            container.appendChild(createCell("w →", "header"));
            for (let w = 0; w <= W; w++) container.appendChild(createCell(w, "header"));

            // Vrstice tabele
            for (let i = 0; i <= n; i++) {
                const itemLabel = i === 0 ? "Ø" : `P${i}(w:${wt[i-1]})`;
                container.appendChild(createCell(itemLabel, "header"));
                for (let w = 0; w <= W; w++) {
                    const isTarget = (i === n && w === W);
                    container.appendChild(createCell(dp[i][w], isTarget ? "target" : ""));
                }
            }
        }

        function createCell(text, className) {
            const div = document.createElement('div');
            div.className = `cell ${className}`;
            div.textContent = text;
            return div;
        }

        // Začetni izračun
        solveKnapsack();
    </script>

</body>

</html>
