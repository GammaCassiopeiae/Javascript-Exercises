<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Gnome Sort Vizualizacija</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; }
        .container { display: flex; align-items: flex-end; height: 300px; gap: 5px; margin: 30px; padding: 15px; background: #222; border-radius: 8px; border-bottom: 4px solid #444; }
        .bar { width: 25px; background-color: #555; transition: height 0.1s, background-color 0.1s; border-radius: 2px 2px 0 0; }
        .bar.current { background-color: #f1c40f; } /* Palček (gnome), ki trenutno preverja */
        .bar.compare { background-color: #e67e22; } /* Element za primerjavo */
        .bar.sorted { background-color: #2ecc71; } /* Urejeni del (vizualno) */
        .controls { display: flex; gap: 10px; }
        button { padding: 12px 24px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>Gnome Sort Vizualizacija</h1>
    <div class="container" id="chart"></div>
    
    <div class="controls">
        <button id="startBtn" onclick="startSort()">Zaženi palčka</button>
        <button onclick="window.location.reload()">Ponastavi</button>
    </div>

    <script>
        const container = document.getElementById('chart');
        const data = [120, 45, 180, 90, 250, 30, 210, 75, 140, 100, 190, 50];
        const bars = [];

        function createBars() {
            data.forEach(value => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value}px`;
                container.appendChild(bar);
                bars.push(bar);
            });
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        async function gnomeSort() {
            let index = 0;
            let n = bars.length;

            while (index < n) {
                // Vizualna označba trenutnega položaja
                bars[index].classList.add('current');
                if (index > 0) bars[index - 1].classList.add('compare');

                await sleep(100);

                if (index === 0) {
                    index++;
                } else {
                    const h1 = parseInt(bars[index].style.height);
                    const h2 = parseInt(bars[index - 1].style.height);

                    if (h1 >= h2) {
                        index++;
                    } else {
                        // Zamenjava vrednosti (vizualna zamenjava)
                        bars[index].style.height = `${h2}px`;
                        bars[index - 1].style.height = `${h1}px`;
                        index--;
                    }
                }

                // Počisti barve za naslednji korak
                bars.forEach(b => {
                    b.classList.remove('current');
                    b.classList.remove('compare');
                });
            }
            
            // Označi vse kot urejeno na koncu
            bars.forEach(b => b.classList.add('sorted'));
        }

        function startSort() {
            document.getElementById('startBtn').disabled = true;
            gnomeSort();
        }

        createBars();
    </script>
</body>
</html>
