<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <title>Hashing Vizualizator</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #f9fafb;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
        }

        button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .hash-table {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .bucket {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f3f4f6;
            padding: 8px 0;
        }

        .index {
            width: 40px;
            font-weight: bold;
            color: #6b7280;
            border-right: 2px solid var(--primary);
            margin-right: 15px;
        }

        .nodes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .node {
            background: #ede9fe;
            color: #5b21b6;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-family: monospace;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .formula {
            font-size: 0.85rem;
            color: #666;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Hash Tabelna Vizualizacija</h2>
        <div class="controls">
            <input type="text" id="keyInput" placeholder="Vnesi besedilo ali število...">
            <button onclick="addToHash()">Vstavi</button>
        </div>

        <div class="hash-table" id="hashTable"></div>

        <p class="formula">Funkcija: <code>hash(key) = sum(charCodes) % 10</code></p>
    </div>

    <script>
        const TABLE_SIZE = 10;
        // Iniciacija tabele (polje seznamov)
        let hashTable = Array.from({
            length: TABLE_SIZE
        }, () => []);

        function simpleHash(key) {
            // Preprosta hash funkcija: vsota kod znakov modulo velikost tabele
            const sum = key.toString().split('')
                .reduce((acc, char) => acc + char.charCodeAt(0), 0);
            return sum % TABLE_SIZE;
        }

        function renderTable() {
            const container = document.getElementById('hashTable');
            container.innerHTML = '';

            hashTable.forEach((bucket, i) => {
                const bucketDiv = document.createElement('div');
                bucketDiv.className = 'bucket';

                const indexDiv = document.createElement('div');
                indexDiv.className = 'index';
                indexDiv.textContent = i;

                const nodesDiv = document.createElement('div');
                nodesDiv.className = 'nodes';

                bucket.forEach(value => {
                    const nodeDiv = document.createElement('div');
                    nodeDiv.className = 'node';
                    nodeDiv.textContent = value;
                    nodesDiv.appendChild(nodeDiv);
                });

                bucketDiv.appendChild(indexDiv);
                bucketDiv.appendChild(nodesDiv);
                container.appendChild(bucketDiv);
            });
        }

        function addToHash() {
            const input = document.getElementById('keyInput');
            const value = input.value.trim();

            if (value) {
                const index = simpleHash(value);
                // Dodajanje v vedro (bucket) - reševanje trkov s chaining-om
                hashTable[index].push(value);

                renderTable();
                input.value = '';
                input.focus();
            }
        }

        // Začetni izris
        renderTable();
    </script>

</body>

</html>
