<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Linear Search Vizualizacija</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f8f9fa; color: #333; }
        .container { display: flex; gap: 8px; margin: 30px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .box { 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            background: #e0e0e0; border-radius: 6px; font-weight: bold; font-size: 1.1rem;
            transition: all 0.3s ease; border: 2px solid transparent;
        }
        .box.checking { background: #3498db; color: white; transform: translateY(-10px); border-color: #2980b9; }
        .box.found { background: #2ecc71; color: white; transform: scale(1.1); border-color: #27ae60; }
        .box.not-found { opacity: 0.5; background: #bdc3c7; }
        
        .controls { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 60px; text-align: center; font-size: 1rem; }
        button { padding: 10px 20px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:disabled { background: #95a5a6; }
        #status { margin-top: 20px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <h1>Linear Search Vizualizacija</h1>
    <div id="status">Vnesite število in kliknite Iskanje</div>
    
    <div class="container" id="arrayContainer"></div>

    <div class="controls">
        <label for="targetInput">Išči število:</label>
        <input type="number" id="targetInput" value="42">
        <button id="searchBtn" onclick="startSearch()">Iskanje</button>
        <button onclick="window.location.reload()">Ponastavi</button>
    </div>

    <script>
        const container = document.getElementById('arrayContainer');
        const statusText = document.getElementById('status');
        const data = Array.from({length: 12}, () => Math.floor(Math.random() * 90) + 10);
        const boxes = [];

        function createArray() {
            data.forEach(value => {
                const box = document.createElement('div');
                box.classList.add('box');
                box.innerText = value;
                container.appendChild(box);
                boxes.push(box);
            });
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        async function linearSearch() {
            const target = parseInt(document.getElementById('targetInput').value);
            let found = false;

            statusText.innerText = `Iščem število ${target}...`;
            
            for (let i = 0; i < boxes.length; i++) {
                // Označi trenutno polje, ki se pregleduje
                boxes[i].classList.add('checking');
                await sleep(500);

                if (parseInt(boxes[i].innerText) === target) {
                    boxes[i].classList.remove('checking');
                    boxes[i].classList.add('found');
                    statusText.innerText = `Najdeno! Število ${target} je na indeksu ${i}.`;
                    found = true;
                    break;
                }

                boxes[i].classList.remove('checking');
                boxes[i].classList.add('not-found');
            }

            if (!found) {
                statusText.innerText = `Število ${target} ni bilo najdeno v seznamu.`;
            }
        }

        function startSearch() {
            // Počisti prejšnje iskanje
            boxes.forEach(box => {
                box.className = 'box';
            });
            document.getElementById('searchBtn').disabled = true;
            linearSearch().then(() => {
                document.getElementById('searchBtn').disabled = false;
            });
        }

        createArray();
    </script>
</body>
</html>
