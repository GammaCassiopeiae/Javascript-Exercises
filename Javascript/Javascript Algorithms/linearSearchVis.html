<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Linear Search Vizualizacija</title>
    <style>
        :root { --bg: #111827; --primary: #3b82f6; --target: #f59e0b; --found: #10b981; --text: #f3f4f6; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        canvas { background: #1f2937; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; display: flex; gap: 10px; align-items: center; background: #374151; padding: 15px; border-radius: 50px; }
        input { background: #111827; border: 1px solid #4b5563; color: white; padding: 8px 12px; border-radius: 20px; width: 60px; text-align: center; }
        button { background: var(--primary); border: none; padding: 10px 20px; color: white; font-weight: bold; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        button:hover:not(:disabled) { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { background: #4b5563; cursor: not-allowed; }
        .status { margin-bottom: 10px; font-family: monospace; font-size: 1.1rem; color: var(--target); }
    </style>
</head>
<body>

    <h1>Linear Search</h1>
    <div class="status" id="status">Vnesite število in kliknite Išči</div>
    <canvas id="searchCanvas" width="800" height="350"></canvas>
    
    <div class="controls">
        <button id="resetBtn">Novo polje</button>
        <input type="number" id="targetInput" value="50">
        <button id="searchBtn">Išči število</button>
    </div>

    <script>
        const canvas = document.getElementById('searchCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const targetInput = document.getElementById('targetInput');

        const COUNT = 40;
        const BAR_WIDTH = canvas.width / COUNT;
        let array = [];

        // Inicializacija naključnih podatkov prek DOM API
        function init() {
            array = Array.from({ length: COUNT }, () => Math.floor(Math.random() * 90) + 10);
            draw();
            searchBtn.disabled = false;
            statusEl.innerText = "Pripravljen na iskanje";
            statusEl.style.color = "#f59e0b";
        }

        // Risanje na Canvas
        function draw(currentIndex = -1, foundIndex = -1) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            array.forEach((val, i) => {
                ctx.fillStyle = "#3b82f6"; // Osnovna modra
                
                if (i === currentIndex) ctx.fillStyle = "#ef4444"; // Trenutno preverjanje (rdeča)
                if (i === foundIndex) ctx.fillStyle = "#10b981";   // Najdeno (zelena)
                
                const barHeight = (val / 100) * (canvas.height - 60);
                const x = i * BAR_WIDTH;
                const y = canvas.height - barHeight - 30;

                ctx.fillRect(x + 2, y, BAR_WIDTH - 4, barHeight);
                
                // Izpis vrednosti pod stolpcem
                ctx.fillStyle = "white";
                ctx.font = "10px Arial";
                ctx.textAlign = "center";
                ctx.fillText(val, x + BAR_WIDTH / 2, canvas.height - 10);
            });
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        // Algoritem Linear Search z vizualizacijo
        async function linearSearch() {
            const target = parseInt(targetInput.value);
            if (isNaN(target)) return;

            searchBtn.disabled = true;
            resetBtn.disabled = true;
            let found = false;

            for (let i = 0; i < array.length; i++) {
                statusEl.innerText = `Preverjam indeks ${i}: je ${array[i]} == ${target}?`;
                draw(i);
                await sleep(150);

                if (array[i] === target) {
                    statusEl.innerText = `NAJDENO! Število ${target} je na indeksu ${i}.`;
                    statusEl.style.color = "#10b981";
                    draw(-1, i);
                    found = true;
                    break;
                }
            }

            if (!found) {
                statusEl.innerText = `Število ${target} ni bilo najdeno v polju.`;
                statusEl.style.color = "#ef4444";
                draw();
            }

            searchBtn.disabled = false;
            resetBtn.disabled = false;
        }

        // Event listenerji
        searchBtn.addEventListener('click', linearSearch);
        resetBtn.addEventListener('click', init);

        // Prvi zagon
        init();
    </script>
</body>
</html>
