<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <title>Matrix Sort Vizualizacija</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --text: #00ff41;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        canvas {
            border: 2px solid #222;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            background: #000;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        button {
            background: transparent;
            border: 1px solid var(--text);
            color: var(--text);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover:not(:disabled) {
            background: var(--text);
            color: #000;
            box-shadow: 0 0 10px var(--text);
        }

        button:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }

        h1 {
            text-shadow: 0 0 10px var(--text);
            font-size: 1.5rem;
        }
    </style>
</head>

<body>

    <h1>MATRIX_SORT_VISUALIZER</h1>
    <canvas id="matrixCanvas" width="500" height="500"></canvas>

    <div class="controls">
        <button id="resetBtn">Generiraj matriko</button>
        <button id="sortBtn">Zaženi urejanje</button>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const sortBtn = document.getElementById('sortBtn');
        const resetBtn = document.getElementById('resetBtn');

        const ROWS = 20;
        const COLS = 20;
        const CELL_SIZE = canvas.width / COLS;
        let matrix = [];

        // Inicializacija matrike z naključnimi vrednostmi (0-255 za barvo)
        function initMatrix() {
            matrix = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push(Math.floor(Math.random() * 256));
                }
                matrix.push(row);
            }
            drawMatrix();
            sortBtn.disabled = false;
        }

        // Risanje matrike na Canvas (DOM API)
        function drawMatrix(activeR = -1, activeC = -1) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const val = matrix[r][c];

                    // Barva celice glede na vrednost (Matrix Green stil)
                    ctx.fillStyle = `rgb(0, ${val}, 0)`;

                    // Poudarek trenutne celice, ki se primerja
                    if (r === activeR && c === activeC) {
                        ctx.fillStyle = "#fff";
                    }

                    ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);

                    // Izpis številke v celici (neobvezno, za detajle)
                    if (ROWS <= 15) {
                        ctx.fillStyle = val > 128 ? "#000" : "#00ff41";
                        ctx.font = "10px monospace";
                        ctx.fillText(val, c * CELL_SIZE + 5, r * CELL_SIZE + 15);
                    }
                }
            }
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        // Algoritem urejanja matrike (Bubble Sort transformacija)
        async function sortMatrix() {
            sortBtn.disabled = true;
            resetBtn.disabled = true;

            let totalElements = ROWS * COLS;

            for (let i = 0; i < totalElements; i++) {
                for (let j = 0; j < totalElements - i - 1; j++) {
                    // Pretvorba linearnega indeksa v 2D koordinate
                    let r1 = Math.floor(j / COLS);
                    let c1 = j % COLS;
                    let r2 = Math.floor((j + 1) / COLS);
                    let c2 = (j + 1) % COLS;

                    if (matrix[r1][c1] > matrix[r2][c2]) {
                        // Menjava vrednosti
                        let temp = matrix[r1][c1];
                        matrix[r1][c1] = matrix[r2][c2];
                        matrix[r2][c2] = temp;
                    }

                    // Vizualizacija vsakih nekaj korakov za boljšo zmogljivost
                    if (j % 5 === 0) {
                        drawMatrix(r1, c1);
                        await sleep(1);
                    }
                }
            }

            drawMatrix();
            resetBtn.disabled = false;
        }

        // Event Listenerji
        sortBtn.addEventListener('click', sortMatrix);
        resetBtn.addEventListener('click', initMatrix);

        // Začetni zagon
        initMatrix();
    </script>
</body>

</html>
