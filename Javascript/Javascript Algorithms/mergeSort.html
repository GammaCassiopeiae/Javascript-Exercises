<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Merge Sort Vizualizacija</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; }
        .container { display: flex; align-items: flex-end; height: 320px; gap: 4px; margin: 20px; padding: 20px; background: #eee; border-radius: 8px; }
        .bar { width: 20px; background-color: #7f8c8d; transition: background-color 0.2s; border-radius: 2px; }
        .bar.active { background-color: #e67e22; } /* Območje, ki se trenutno zliva */
        .bar.merging { background-color: #9b59b6; } /* Element, ki se prepisuje */
        .bar.sorted { background-color: #2ecc71; } /* Končno urejeno */
        button { padding: 12px 24px; cursor: pointer; background: #8e44ad; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:disabled { background: #bdc3c7; }
    </style>
</head>
<body>

    <h1>Merge Sort Vizualizacija</h1>
    <div class="container" id="chart"></div>
    <div>
        <button id="startBtn" onclick="startSort()">Zaženi Merge Sort</button>
        <button onclick="window.location.reload()">Ponastavi</button>
    </div>

    <script>
        const container = document.getElementById('chart');
        // Generiramo 30 naključnih stolpcev
        const data = Array.from({length: 30}, () => Math.floor(Math.random() * 250) + 20);
        const bars = [];

        function createBars() {
            data.forEach(value => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value}px`;
                container.appendChild(bar);
                bars.push(bar);
            });
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        async function merge(start, mid, end) {
            let leftArray = [];
            let rightArray = [];
            
            for (let i = start; i <= mid; i++) leftArray.push(bars[i].style.height);
            for (let i = mid + 1; i <= end; i++) rightArray.push(bars[i].style.height);

            let i = 0, j = 0, k = start;

            // Označimo aktivno območje zlivanja
            for (let x = start; x <= end; x++) bars[x].classList.add('active');

            while (i < leftArray.length && j < rightArray.length) {
                await sleep(50);
                if (parseInt(leftArray[i]) <= parseInt(rightArray[j])) {
                    bars[k].style.height = leftArray[i];
                    i++;
                } else {
                    bars[k].style.height = rightArray[j];
                    j++;
                }
                bars[k].classList.add('merging');
                k++;
            }

            while (i < leftArray.length) {
                await sleep(50);
                bars[k].style.height = leftArray[i];
                bars[k].classList.add('merging');
                i++;
                k++;
            }

            while (j < rightArray.length) {
                await sleep(50);
                bars[k].style.height = rightArray[j];
                bars[k].classList.add('merging');
                j++;
                k++;
            }

            // Počistimo barve po zlivanju
            for (let x = start; x <= end; x++) {
                bars[x].classList.remove('active', 'merging');
                if (start === 0 && end === bars.length - 1) bars[x].classList.add('sorted');
            }
        }

        async function mergeSort(start, end) {
            if (start >= end) return;
            
            const mid = Math.floor((start + end) / 2);
            await mergeSort(start, mid);
            await mergeSort(mid + 1, end);
            await merge(start, mid, end);
        }

        async function startSort() {
            document.getElementById('startBtn').disabled = true;
            await mergeSort(0, bars.length - 1);
            // Na koncu vse označimo kot urejeno za vizualni učinek
            bars.forEach(b => b.classList.add('sorted'));
        }

        createBars();
    </script>
</body>
</html>
