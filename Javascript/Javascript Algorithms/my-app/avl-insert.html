<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Tree - Insertion</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        #treeCanvas {
            width: 100%;
            height: 500px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .log-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            border-left: 2px solid var(--neon-primary);
            padding-left: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">AVL Tree - Insertion</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container">
            <canvas id="treeCanvas"></canvas>
        </div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Insert Node</h3>
                <div class="input-group">
                    <input type="number" id="insertInput" placeholder="Value" min="1" max="999">
                    <button class="btn" onclick="insertNode()">Insert</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Tree Info</h3>
                <div class="info-box">
                    <p>Nodes: <span id="nodeCount">0</span></p>
                    <p>Height: <span id="treeHeight">0</span></p>
                    <p>Rotations: <span id="rotationCount">0</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearTree()" style="width: 100%; margin-bottom: 0.5rem;">Clear Tree</button>
                <button class="btn" onclick="generateRandom()" style="width: 100%;">Random Tree</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Operation Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class AVLNode {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.height = 1;
            }
        }
        class AVLTree {
            constructor() {
                this.root = null;
                this.rotationCount = 0;
            }
            getHeight(node) {
                return node ? node.height : 0;
            }
            getBalance(node) {
                return node ? this.getHeight(node.left) - this.getHeight(node.right) : 0;
            }
            updateHeight(node) {
                if (node) {
                    node.height = 1 + Math.max(this.getHeight(node.left), this.getHeight(node.right));
                }
            }
            rotateRight(y, type = '') {
                this.rotationCount++;
                log(`Right rotation at ${y.value} (${type})`);
                const x = y.left;
                const T2 = x.right;
                x.right = y;
                y.left = T2;
                this.updateHeight(y);
                this.updateHeight(x);
                return x;
            }
            rotateLeft(x, type = '') {
                this.rotationCount++;
                log(`Left rotation at ${x.value} (${type})`);
                const y = x.right;
                const T2 = y.left;
                y.left = x;
                x.right = T2;
                this.updateHeight(x);
                this.updateHeight(y);
                return y;
            }
            insert(value) {
                log(`Inserting ${value}...`);
                this.root = this.insertRec(this.root, value);
                log(`Tree balanced.`);
            }
            insertRec(node, value) {
                if (!node) {
                    log(`  Created new node: ${value}`);
                    return new AVLNode(value);
                }
                if (value < node.value) {
                    node.left = this.insertRec(node.left, value);
                } else if (value > node.value) {
                    node.right = this.insertRec(node.right, value);
                } else {
                    log(`  ${value} already exists`);
                    return node;
                }
                this.updateHeight(node);
                const balance = this.getBalance(node);
                if (balance > 1 && value < node.left.value) {
                    log(`  Left-Left case at ${node.value}`);
                    return this.rotateRight(node, 'LL');
                }
                if (balance < -1 && value > node.right.value) {
                    log(`  Right-Right case at ${node.value}`);
                    return this.rotateLeft(node, 'RR');
                }
                if (balance > 1 && value > node.left.value) {
                    log(`  Left-Right case at ${node.value}`);
                    node.left = this.rotateLeft(node.left, 'LR1');
                    return this.rotateRight(node, 'LR2');
                }
                if (balance < -1 && value < node.right.value) {
                    log(`  Right-Left case at ${node.value}`);
                    node.right = this.rotateRight(node.right, 'RL1');
                    return this.rotateLeft(node, 'RL2');
                }
                return node;
            }
            getNodeCount() {
                return this.countRec(this.root);
            }
            countRec(node) {
                if (!node) return 0;
                return 1 + this.countRec(node.left) + this.countRec(node.right);
            }
        }
        const tree = new AVLTree();

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (tree.root) {
                drawNode(tree.root, canvas.width / 2, 50, canvas.width / 4);
            }
            updateInfo();
        }

        function drawNode(node, x, y, offset) {
            if (!node) return;
            if (node.left) {
                ctx.beginPath();
                ctx.moveTo(x, y + 20);
                ctx.lineTo(x - offset, y + 70);
                ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                drawNode(node.left, x - offset, y + 70, offset / 2);
            }
            if (node.right) {
                ctx.beginPath();
                ctx.moveTo(x, y + 20);
                ctx.lineTo(x + offset, y + 70);
                ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                drawNode(node.right, x + offset, y + 70, offset / 2);
            }
            const balance = tree.getBalance(node);
            const isUnbalanced = Math.abs(balance) > 1;
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fillStyle = isUnbalanced ? 'rgba(255, 0, 255, 0.3)' : 'rgba(0, 243, 255, 0.3)';
            ctx.fill();
            ctx.strokeStyle = isUnbalanced ? '#ff00ff' : '#00f3ff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowColor = isUnbalanced ? '#ff00ff' : '#00f3ff';
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.value, x, y);
            ctx.fillStyle = isUnbalanced ? '#ff00ff' : 'rgba(255, 255, 255, 0.7)';
            ctx.font = '10px system-ui';
            ctx.fillText(`H:${node.height}`, x, y + 35);
        }

        function updateInfo() {
            document.getElementById('nodeCount').textContent = tree.getNodeCount();
            document.getElementById('treeHeight').textContent = tree.getHeight(tree.root);
            document.getElementById('rotationCount').textContent = tree.rotationCount;
        }

        function log(msg) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 20) logBox.removeChild(logBox.lastChild);
        }

        function insertNode() {
            const input = document.getElementById('insertInput');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                tree.insert(value);
                input.value = '';
                drawTree();
            }
        }

        function clearTree() {
            tree.root = null;
            tree.rotationCount = 0;
            document.getElementById('logBox').innerHTML = '';
            log('Tree cleared');
            drawTree();
        }

        function generateRandom() {
            clearTree();
            for (let i = 0; i < 7; i++) {
                tree.insert(Math.floor(Math.random() * 100) + 1);
            }
            drawTree();
        }
        document.getElementById('insertInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') insertNode();
        });
        drawTree();
    </script>
</body>

</html>
