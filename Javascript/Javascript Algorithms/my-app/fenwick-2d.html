<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Binary Indexed Tree</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
        }

        #gridCanvas {
            max-width: 100%;
            height: auto;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 60px;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .log-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            border-left: 2px solid var(--neon-secondary);
            padding-left: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">2D Binary Indexed Tree</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container">
            <canvas id="gridCanvas" width="400" height="400"></canvas>
        </div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Update Cell</h3>
                <div class="input-group">
                    <input type="number" id="rowInput" placeholder="Row (1-8)" min="1" max="8">
                    <input type="number" id="colInput" placeholder="Col (1-8)" min="1" max="8">
                    <input type="number" id="valInput" placeholder="Delta" min="-10" max="10">
                    <button class="btn" onclick="updateCell()">Update</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">2D Prefix Sum</h3>
                <div class="input-group">
                    <input type="number" id="qRowInput" placeholder="Row (1-8)" min="1" max="8">
                    <input type="number" id="qColInput" placeholder="Col (1-8)" min="1" max="8">
                    <button class="btn" onclick="query2D()">Query</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Grid Size: <span id="gridSize">8×8</span></p>
                    <p>Last Result: <span id="lastResult">-</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="randomize()" style="width: 100%;">Random Grid</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const SIZE = 8;
        let grid = [],
            bit = [];
        let highlightedCells = new Set();
        class BIT2D {
            constructor(n, m) {
                this.n = n;
                this.m = m;
                this.bit = Array.from({
                    length: n + 1
                }, () => Array(m + 1).fill(0));
            }
            update(x, y, delta) {
                log(`Update (${x},${y}) += ${delta}`);
                const path = [];
                for (let i = x; i <= this.n; i += i & (-i)) {
                    for (let j = y; j <= this.m; j += j & (-j)) {
                        this.bit[i][j] += delta;
                        path.push(`(${i},${j})`);
                    }
                }
                log(`  Path: ${path.join(' → ')}`);
            }
            query(x, y) {
                log(`Query prefix sum up to (${x},${y})`);
                let sum = 0;
                const path = [];
                for (let i = x; i > 0; i -= i & (-i)) {
                    for (let j = y; j > 0; j -= j & (-j)) {
                        sum += this.bit[i][j];
                        path.push(`(${i},${j})`);
                    }
                }
                log(`  Path: ${path.join(' → ')}`);
                log(`  Sum = ${sum}`);
                return sum;
            }
        }
        let bit2d;

        function init() {
            grid = Array.from({
                length: SIZE
            }, () => Array(SIZE).fill(0));
            bit2d = new BIT2D(SIZE, SIZE);
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    grid[i][j] = Math.floor(Math.random() * 5) + 1;
                    bit2d.update(i + 1, j + 1, grid[i][j]);
                }
            }
        }

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cellSize = Math.min(canvas.width, canvas.height) / SIZE;
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    const x = j * cellSize;
                    const y = i * cellSize;
                    const isHighlighted = highlightedCells.has(`${i+1},${j+1}`);
                    ctx.beginPath();
                    ctx.rect(x + 2, y + 2, cellSize - 4, cellSize - 4);
                    ctx.fillStyle = isHighlighted ? 'rgba(255, 255, 0, 0.4)' : 'rgba(0, 243, 255, 0.15)';
                    ctx.fill();
                    ctx.strokeStyle = isHighlighted ? '#ffff00' : '#00f3ff';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = isHighlighted ? '#ffff00' : '#00f3ff';
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(grid[i][j], x + cellSize / 2, y + cellSize / 2);
                    ctx.fillStyle = '#ff00ff';
                    ctx.font = '9px system-ui';
                    ctx.fillText(`${i+1},${j+1}`, x + cellSize / 2, y + cellSize - 12);
                }
            }
        }

        function log(msg) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 10) logBox.removeChild(logBox.lastChild);
        }

        function updateCell() {
            const row = parseInt(document.getElementById('rowInput').value);
            const col = parseInt(document.getElementById('colInput').value);
            const val = parseInt(document.getElementById('valInput').value);
            if (!isNaN(row) && !isNaN(col) && !isNaN(val) && row >= 1 && row <= SIZE && col >= 1 && col <= SIZE) {
                highlightedCells.clear();
                for (let i = row; i <= SIZE; i += i & (-i)) {
                    for (let j = col; j <= SIZE; j += j & (-j)) {
                        highlightedCells.add(`${i},${j}`);
                    }
                }
                bit2d.update(row, col, val);
                grid[row - 1][col - 1] += val;
                drawGrid();
            }
        }

        function query2D() {
            const row = parseInt(document.getElementById('qRowInput').value);
            const col = parseInt(document.getElementById('qColInput').value);
            if (!isNaN(row) && !isNaN(col) && row >= 1 && row <= SIZE && col >= 1 && col <= SIZE) {
                highlightedCells.clear();
                for (let i = row; i > 0; i -= i & (-i)) {
                    for (let j = col; j > 0; j -= j & (-j)) {
                        highlightedCells.add(`${i},${j}`);
                    }
                }
                const result = bit2d.query(row, col);
                document.getElementById('lastResult').textContent = `Sum(1,1 to ${row},${col}) = ${result}`;
                drawGrid();
            }
        }

        function randomize() {
            init();
            highlightedCells.clear();
            document.getElementById('logBox').innerHTML = '';
            document.getElementById('lastResult').textContent = '-';
            drawGrid();
        }
        init();
        drawGrid();
    </script>
</body>

</html>
