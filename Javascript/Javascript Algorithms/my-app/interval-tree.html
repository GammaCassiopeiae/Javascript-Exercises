<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interval Tree</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        #treeCanvas {
            width: 100%;
            height: 350px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            min-width: 60px;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .interval-item {
            padding: 0.5rem;
            margin: 0.3rem 0;
            background: rgba(255, 0, 255, 0.1);
            border-left: 3px solid var(--neon-secondary);
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">Interval Tree</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div>
            <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
            <div class="controls" style="margin-top: 1rem;">
                <h3 class="controls__title">Intervals</h3>
                <div id="intervalsList"></div>
            </div>
        </div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Add Interval</h3>
                <div class="input-group">
                    <input type="number" id="lowInput" placeholder="Low" min="0" max="100">
                    <input type="number" id="highInput" placeholder="High" min="0" max="100">
                    <button class="btn" onclick="addInterval()">Add</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Query Overlap</h3>
                <div class="input-group">
                    <input type="number" id="qLowInput" placeholder="Low" min="0" max="100">
                    <input type="number" id="qHighInput" placeholder="High" min="0" max="100">
                    <button class="btn" onclick="queryOverlap()">Query</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Intervals: <span id="intervalCount">0</span></p>
                    <p>Overlapping: <span id="overlapCount">-</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearIntervals()" style="width: 100%; margin-bottom: 0.5rem;">Clear</button>
                <button class="btn" onclick="randomIntervals()" style="width: 100%;">Random Intervals</button>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 350;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class IntervalNode {
            constructor(low, high) {
                this.low = low;
                this.high = high;
                this.max = high;
                this.left = null;
                this.right = null;
            }
        }
        class IntervalTree {
            constructor() {
                this.root = null;
                this.intervals = [];
            }
            insert(low, high) {
                this.intervals.push({
                    low,
                    high
                });
                this.root = this.insertRec(this.root, low, high);
            }
            insertRec(node, low, high) {
                if (!node) return new IntervalNode(low, high);
                if (low < node.low) node.left = this.insertRec(node.left, low, high);
                else node.right = this.insertRec(node.right, low, high);
                node.max = Math.max(node.high, Math.max(node.left?.max || 0, node.right?.max || 0));
                return node;
            }
            query(low, high) {
                return this.queryRec(this.root, low, high);
            }
            queryRec(node, low, high) {
                if (!node) return [];
                const result = [];
                if (node.low <= high && low <= node.high) result.push({
                    low: node.low,
                    high: node.high
                });
                if (node.left && node.left.max >= low) result.push(...this.queryRec(node.left, low, high));
                if (node.right && low <= node.high) result.push(...this.queryRec(node.right, low, high));
                return result;
            }
        }
        const tree = new IntervalTree();
        let queryResults = [];

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const padding = 40;
            const drawWidth = canvas.width - padding * 2;
            tree.intervals.forEach((interval, i) => {
                const y = 30 + i * 35;
                const x1 = padding + (interval.low / 100) * drawWidth;
                const x2 = padding + (interval.high / 100) * drawWidth;
                const isOverlapping = queryResults.some(r => r.low === interval.low && r.high === interval.high);
                ctx.beginPath();
                ctx.moveTo(x1, y);
                ctx.lineTo(x2, y);
                ctx.strokeStyle = isOverlapping ? '#ffff00' : '#00f3ff';
                ctx.lineWidth = isOverlapping ? 4 : 3;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(x1, y, 6, 0, Math.PI * 2);
                ctx.arc(x2, y, 6, 0, Math.PI * 2);
                ctx.fillStyle = isOverlapping ? '#ffff00' : '#ff00ff';
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = '12px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(`[${interval.low},${interval.high}]`, (x1 + x2) / 2, y - 12);
            });
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '10px system-ui';
            for (let i = 0; i <= 100; i += 20) {
                const x = padding + (i / 100) * drawWidth;
                ctx.fillText(i, x, canvas.height - 10);
            }
        }

        function updateIntervalsList() {
            const container = document.getElementById('intervalsList');
            if (tree.intervals.length === 0) {
                container.innerHTML = '<p style="color: rgba(255,255,255,0.5)">No intervals</p>';
                return;
            }
            container.innerHTML = tree.intervals.map((iv, i) => `
                <div class="interval-item">[${iv.low}, ${iv.high}]</div>
            `).join('');
        }

        function updateInfo() {
            document.getElementById('intervalCount').textContent = tree.intervals.length;
            document.getElementById('overlapCount').textContent = queryResults.length || '-';
        }

        function addInterval() {
            const low = parseInt(document.getElementById('lowInput').value);
            const high = parseInt(document.getElementById('highInput').value);
            if (!isNaN(low) && !isNaN(high) && low <= high) {
                tree.insert(low, high);
                queryResults = [];
                drawTree();
                updateIntervalsList();
                updateInfo();
            }
        }

        function queryOverlap() {
            const low = parseInt(document.getElementById('qLowInput').value);
            const high = parseInt(document.getElementById('qHighInput').value);
            if (!isNaN(low) && !isNaN(high)) {
                queryResults = tree.query(low, high);
                drawTree();
                updateInfo();
            }
        }

        function clearIntervals() {
            tree.root = null;
            tree.intervals = [];
            queryResults = [];
            drawTree();
            updateIntervalsList();
            updateInfo();
        }

        function randomIntervals() {
            clearIntervals();
            for (let i = 0; i < 6; i++) {
                const low = Math.floor(Math.random() * 60);
                const high = low + Math.floor(Math.random() * 40) + 10;
                tree.insert(low, Math.min(high, 100));
            }
            drawTree();
            updateIntervalsList();
            updateInfo();
        }
        randomIntervals();
    </script>
</body>

</html>
