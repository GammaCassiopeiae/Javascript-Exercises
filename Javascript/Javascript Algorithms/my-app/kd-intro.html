<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D Tree - Introduction</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        #treeCanvas {
            width: 100%;
            height: 500px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            min-width: 60px;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .log-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            border-left: 2px solid var(--neon-secondary);
            padding-left: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">K-D Tree - Introduction</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Add Point</h3>
                <div class="input-group">
                    <input type="number" id="xInput" placeholder="X (0-100)" min="0" max="100">
                    <input type="number" id="yInput" placeholder="Y (0-100)" min="0" max="100">
                    <button class="btn" onclick="addPoint()">Add</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Nearest Neighbor</h3>
                <div class="input-group">
                    <input type="number" id="qxInput" placeholder="X" min="0" max="100">
                    <input type="number" id="qyInput" placeholder="Y" min="0" max="100">
                    <button class="btn" onclick="findNearest()">Find</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Points: <span id="pointCount">0</span></p>
                    <p>Depth: <span id="treeDepth">0</span></p>
                    <p>Nearest: <span id="nearestResult">-</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearPoints()" style="width: 100%; margin-bottom: 0.5rem;">Clear</button>
                <button class="btn" onclick="randomPoints()" style="width: 100%;">Random Points</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class KDNode {
            constructor(point, axis, depth) {
                this.point = point;
                this.axis = axis;
                this.depth = depth;
                this.left = null;
                this.right = null;
            }
        }
        class KDTree {
            constructor(k = 2) {
                this.k = k;
                this.root = null;
                this.points = [];
            }
            insert(point) {
                this.points.push(point);
                this.root = this.insertRec(this.root, point, 0);
            }
            insertRec(node, point, depth) {
                if (!node) return new KDNode(point, depth % this.k, depth);
                const axis = depth % this.k;
                if (point[axis] < node.point[axis]) {
                    node.left = this.insertRec(node.left, point, depth + 1);
                } else {
                    node.right = this.insertRec(node.right, point, depth + 1);
                }
                return node;
            }
            nearest(target) {
                return this.nearestRec(this.root, target, this.root, 0);
            }
            nearestRec(node, target, best, depth) {
                if (!node) return best;
                const axis = depth % this.k;
                if (this.dist(node.point, target) < this.dist(best.point, target)) best = node;
                const next = target[axis] < node.point[axis] ? node.left : node.right;
                const other = target[axis] < node.point[axis] ? node.right : node.left;
                best = this.nearestRec(next, target, best, depth + 1);
                if (this.dist(best.point, target) > Math.abs(target[axis] - node.point[axis])) {
                    best = this.nearestRec(other, target, best, depth + 1);
                }
                return best;
            }
            dist(p1, p2) {
                return Math.sqrt(p1.reduce((sum, val, i) => sum + Math.pow(val - p2[i], 2), 0));
            }
            getMaxDepth() {
                return this.depthRec(this.root);
            }
            depthRec(node) {
                if (!node) return 0;
                return 1 + Math.max(this.depthRec(node.left), this.depthRec(node.right));
            }
        }
        const tree = new KDTree(2);
        let queryPoint = null;
        let nearestNode = null;

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.3)';
            ctx.lineWidth = 1;
            drawRegions(tree.root, 0, canvas.width, 0, canvas.height);
            drawNodes(tree.root);
            if (queryPoint) {
                ctx.beginPath();
                ctx.arc(queryPoint[0] * canvas.width / 100, (100 - queryPoint[1]) * canvas.height / 100, 8, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 0, 0.5)';
                ctx.fill();
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            if (nearestNode) {
                const x = nearestNode.point[0] * canvas.width / 100;
                const y = (100 - nearestNode.point[1]) * canvas.height / 100;
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            updateInfo();
        }

        function drawRegions(node, x1, x2, y1, y2) {
            if (!node) return;
            const axis = node.axis;
            const val = node.point[axis] * (axis === 0 ? canvas.width : canvas.height) / 100;
            if (axis === 0) {
                ctx.beginPath();
                ctx.moveTo(val, y1);
                ctx.lineTo(val, y2);
                ctx.stroke();
                drawRegions(node.left, x1, val, y1, y2);
                drawRegions(node.right, val, x2, y1, y2);
            } else {
                const y = (100 - node.point[1]) * canvas.height / 100;
                ctx.beginPath();
                ctx.moveTo(x1, y);
                ctx.lineTo(x2, y);
                ctx.stroke();
                drawRegions(node.left, x1, x2, y, y2);
                drawRegions(node.right, x1, x2, y1, y);
            }
        }

        function drawNodes(node) {
            if (!node) return;
            const x = node.point[0] * canvas.width / 100;
            const y = (100 - node.point[1]) * canvas.height / 100;
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#00f3ff';
            ctx.fill();
            ctx.strokeStyle = '#00f3ff';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#00f3ff';
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
            drawNodes(node.left);
            drawNodes(node.right);
        }

        function updateInfo() {
            document.getElementById('pointCount').textContent = tree.points.length;
            document.getElementById('treeDepth').textContent = tree.getMaxDepth();
        }

        function log(msg) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 10) logBox.removeChild(logBox.lastChild);
        }

        function addPoint() {
            const x = parseInt(document.getElementById('xInput').value);
            const y = parseInt(document.getElementById('yInput').value);
            if (!isNaN(x) && !isNaN(y) && x >= 0 && x <= 100 && y >= 0 && y <= 100) {
                tree.insert([x, y]);
                log(`Added point (${x}, ${y})`);
                drawTree();
            }
        }

        function findNearest() {
            const x = parseInt(document.getElementById('qxInput').value);
            const y = parseInt(document.getElementById('qyInput').value);
            if (!isNaN(x) && !isNaN(y) && x >= 0 && x <= 100 && y >= 0 && y <= 100 && tree.points.length > 0) {
                queryPoint = [x, y];
                nearestNode = tree.nearest([x, y]);
                const dist = tree.dist([x, y], nearestNode.point).toFixed(2);
                document.getElementById('nearestResult').textContent = `(${nearestNode.point[0]}, ${nearestNode.point[1]}) d=${dist}`;
                log(`Nearest to (${x},${y}): (${nearestNode.point})`);
                drawTree();
            }
        }

        function clearPoints() {
            tree.root = null;
            tree.points = [];
            queryPoint = null;
            nearestNode = null;
            document.getElementById('logBox').innerHTML = '';
            document.getElementById('nearestResult').textContent = '-';
            log('Cleared all points');
            drawTree();
        }

        function randomPoints() {
            clearPoints();
            for (let i = 0; i < 15; i++) {
                tree.insert([Math.floor(Math.random() * 100), Math.floor(Math.random() * 100)]);
            }
            log('Added 15 random points');
            drawTree();
        }
        drawTree();
    </script>
</body>

</html>
