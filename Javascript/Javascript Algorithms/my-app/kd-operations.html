<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-D Tree - Operations</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        #treeCanvas {
            width: 100%;
            height: 500px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            min-width: 60px;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .log-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            border-left: 2px solid var(--neon-secondary);
            padding-left: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">K-D Tree - Operations</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Add Point</h3>
                <div class="input-group">
                    <input type="number" id="xInput" placeholder="X" min="0" max="100">
                    <input type="number" id="yInput" placeholder="Y" min="0" max="100">
                    <button class="btn" onclick="addPoint()">Add</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Delete Point</h3>
                <div class="input-group">
                    <input type="number" id="dxInput" placeholder="X" min="0" max="100">
                    <input type="number" id="dyInput" placeholder="Y" min="0" max="100">
                    <button class="btn" onclick="deletePoint()">Delete</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Range Search</h3>
                <div class="input-group">
                    <input type="number" id="x1Input" placeholder="X1" min="0" max="100">
                    <input type="number" id="y1Input" placeholder="Y1" min="0" max="100">
                    <input type="number" id="x2Input" placeholder="X2" min="0" max="100">
                    <input type="number" id="y2Input" placeholder="Y2" min="0" max="100">
                    <button class="btn" onclick="rangeSearch()">Search</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Points: <span id="pointCount">0</span></p>
                    <p>In Range: <span id="rangeCount">-</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="randomPoints()" style="width: 100%;">Random Points</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class KDNode {
            constructor(point, axis, depth) {
                this.point = point;
                this.axis = axis;
                this.depth = depth;
                this.left = null;
                this.right = null;
            }
        }
        class KDTree {
            constructor(k = 2) {
                this.k = k;
                this.root = null;
                this.points = [];
            }
            insert(point) {
                this.points.push(point);
                this.root = this.insertRec(this.root, point, 0);
            }
            insertRec(node, point, depth) {
                if (!node) return new KDNode(point, depth % this.k, depth);
                const axis = depth % this.k;
                if (point[axis] < node.point[axis]) node.left = this.insertRec(node.left, point, depth + 1);
                else node.right = this.insertRec(node.right, point, depth + 1);
                return node;
            }
            delete(point) {
                const idx = this.points.findIndex(p => p[0] === point[0] && p[1] === point[1]);
                if (idx === -1) return false;
                this.points.splice(idx, 1);
                this.root = this.rebuild();
                return true;
            }
            rebuild() {
                if (this.points.length === 0) return null;
                return this.buildRec(this.points, 0);
            }
            buildRec(points, depth) {
                if (points.length === 0) return null;
                const axis = depth % this.k;
                points.sort((a, b) => a[axis] - b[axis]);
                const mid = Math.floor(points.length / 2);
                const node = new KDNode(points[mid], axis, depth);
                node.left = this.buildRec(points.slice(0, mid), depth + 1);
                node.right = this.buildRec(points.slice(mid + 1), depth + 1);
                return node;
            }
            rangeSearch(rect) {
                const [x1, y1, x2, y2] = rect;
                const result = [];
                this.rangeRec(this.root, rect, result);
                return result;
            }
            rangeRec(node, rect, result) {
                if (!node) return;
                const [x, y] = node.point;
                if (x >= rect[0] && x <= rect[2] && y >= rect[1] && y <= rect[3]) {
                    result.push(node.point);
                }
                const axis = node.axis;
                if (axis === 0) {
                    if (rect[0] <= node.point[0]) this.rangeRec(node.left, rect, result);
                    if (rect[2] >= node.point[0]) this.rangeRec(node.right, rect, result);
                } else {
                    if (rect[1] <= node.point[1]) this.rangeRec(node.left, rect, result);
                    if (rect[3] >= node.point[1]) this.rangeRec(node.right, rect, result);
                }
            }
        }
        const tree = new KDTree(2);
        let rangeRect = null;
        let rangePoints = [];

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.3)';
            ctx.lineWidth = 1;
            drawRegions(tree.root, 0, canvas.width, 0, canvas.height);
            drawNodes(tree.root);
            if (rangeRect) {
                const x1 = rangeRect[0] * canvas.width / 100;
                const y1 = (100 - rangeRect[3]) * canvas.height / 100;
                const x2 = rangeRect[2] * canvas.width / 100;
                const y2 = (100 - rangeRect[1]) * canvas.height / 100;
                ctx.fillStyle = 'rgba(255, 0, 255, 0.2)';
                ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 2;
                ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
            }
            updateInfo();
        }

        function drawRegions(node, x1, x2, y1, y2) {
            if (!node) return;
            const axis = node.axis;
            if (axis === 0) {
                const val = node.point[0] * canvas.width / 100;
                ctx.beginPath();
                ctx.moveTo(val, y1);
                ctx.lineTo(val, y2);
                ctx.stroke();
                drawRegions(node.left, x1, val, y1, y2);
                drawRegions(node.right, val, x2, y1, y2);
            } else {
                const y = (100 - node.point[1]) * canvas.height / 100;
                ctx.beginPath();
                ctx.moveTo(x1, y);
                ctx.lineTo(x2, y);
                ctx.stroke();
                drawRegions(node.left, x1, x2, y, y2);
                drawRegions(node.right, x1, x2, y1, y);
            }
        }

        function drawNodes(node) {
            if (!node) return;
            const x = node.point[0] * canvas.width / 100;
            const y = (100 - node.point[1]) * canvas.height / 100;
            const inRange = rangePoints.some(p => p[0] === node.point[0] && p[1] === node.point[1]);
            ctx.beginPath();
            ctx.arc(x, y, inRange ? 10 : 6, 0, Math.PI * 2);
            ctx.fillStyle = inRange ? '#ff00ff' : '#00f3ff';
            ctx.fill();
            ctx.strokeStyle = inRange ? '#ff00ff' : '#00f3ff';
            ctx.lineWidth = 2;
            ctx.shadowColor = inRange ? '#ff00ff' : '#00f3ff';
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
            drawNodes(node.left);
            drawNodes(node.right);
        }

        function updateInfo() {
            document.getElementById('pointCount').textContent = tree.points.length;
            document.getElementById('rangeCount').textContent = rangePoints.length || '-';
        }

        function log(msg) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 10) logBox.removeChild(logBox.lastChild);
        }

        function addPoint() {
            const x = parseInt(document.getElementById('xInput').value);
            const y = parseInt(document.getElementById('yInput').value);
            if (!isNaN(x) && !isNaN(y) && x >= 0 && x <= 100 && y >= 0 && y <= 100) {
                tree.insert([x, y]);
                log(`Added (${x}, ${y})`);
                drawTree();
            }
        }

        function deletePoint() {
            const x = parseInt(document.getElementById('dxInput').value);
            const y = parseInt(document.getElementById('dyInput').value);
            if (!isNaN(x) && !isNaN(y)) {
                if (tree.delete([x, y])) {
                    log(`Deleted (${x}, ${y})`);
                    drawTree();
                } else log(`Point (${x}, ${y}) not found`);
            }
        }

        function rangeSearch() {
            const x1 = parseInt(document.getElementById('x1Input').value);
            const y1 = parseInt(document.getElementById('y1Input').value);
            const x2 = parseInt(document.getElementById('x2Input').value);
            const y2 = parseInt(document.getElementById('y2Input').value);
            if (!isNaN(x1) && !isNaN(y1) && !isNaN(x2) && !isNaN(y2)) {
                rangeRect = [Math.min(x1, x2), Math.min(y1, y2), Math.max(x1, x2), Math.max(y1, y2)];
                rangePoints = tree.rangeSearch(rangeRect);
                log(`Range search: ${rangePoints.length} points found`);
                drawTree();
            }
        }

        function randomPoints() {
            tree.points = [];
            tree.root = null;
            rangeRect = null;
            rangePoints = [];
            for (let i = 0; i < 20; i++) {
                tree.insert([Math.floor(Math.random() * 100), Math.floor(Math.random() * 100)]);
            }
            log('Added 20 random points');
            drawTree();
        }
        randomPoints();
        drawTree();
    </script>
</body>

</html>
