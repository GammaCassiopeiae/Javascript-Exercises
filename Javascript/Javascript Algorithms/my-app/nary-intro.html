<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-ary Tree - Introduction</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            overflow: auto;
        }

        #treeCanvas {
            width: 100%;
            height: 500px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .log-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            border-left: 2px solid var(--neon-secondary);
            padding-left: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">N-ary Tree - Introduction</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Add Child</h3>
                <div class="input-group">
                    <input type="number" id="parentInput" placeholder="Parent ID" min="0" max="99">
                    <input type="number" id="childInput" placeholder="Child Value" min="1" max="999">
                    <button class="btn" onclick="addChild()">Add</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Nodes: <span id="nodeCount">0</span></p>
                    <p>Height: <span id="treeHeight">0</span></p>
                    <p>Max Children: <span id="maxChildren">0</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearTree()" style="width: 100%; margin-bottom: 0.5rem;">Clear</button>
                <button class="btn" onclick="randomTree()" style="width: 100%;">Random Tree</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.max(container.clientWidth, 800);
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class NaryNode {
            constructor(value, id) {
                this.value = value;
                this.id = id;
                this.children = [];
            }
        }
        class NaryTree {
            constructor() {
                this.root = null;
                this.nodes = new Map();
                this.idCounter = 0;
            }
            createRoot(value) {
                this.root = new NaryNode(value, this.idCounter++);
                this.nodes.set(this.root.id, this.root);
            }
            addChild(parentId, value) {
                const parent = this.nodes.get(parentId);
                if (!parent) {
                    log(`Parent ${parentId} not found`);
                    return false;
                }
                const child = new NaryNode(value, this.idCounter++);
                this.nodes.set(child.id, child);
                parent.children.push(child);
                log(`Added child ${value} to parent ${parentId}`);
                return true;
            }
            getHeight() {
                return this.heightRec(this.root);
            }
            heightRec(node) {
                if (!node) return 0;
                if (node.children.length === 0) return 1;
                return 1 + Math.max(...node.children.map(c => this.heightRec(c)));
            }
            getNodeCount() {
                return this.nodes.size;
            }
            getMaxChildren() {
                let max = 0;
                this.nodes.forEach(n => {
                    if (n.children.length > max) max = n.children.length;
                });
                return max;
            }
        }
        const tree = new NaryTree();

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!tree.root) return;
            const nodes = [];
            collectNodes(tree.root, nodes, 0, null);
            const levels = {};
            nodes.forEach(n => {
                if (!levels[n.depth]) levels[n.depth] = [];
                levels[n.depth].push(n);
            });
            const levelHeight = 80;
            Object.keys(levels).sort((a, b) => a - b).forEach((depth) => {
                const levelNodes = levels[depth];
                const spacing = canvas.width / (levelNodes.length + 1);
                levelNodes.forEach((node, i) => {
                    const x = (i + 1) * spacing;
                    const y = 50 + depth * levelHeight;
                    node.x = x;
                    node.y = y;
                    if (node.parent) {
                        ctx.beginPath();
                        ctx.moveTo(node.parent.x, node.parent.y + 20);
                        ctx.lineTo(x, y - 20);
                        ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, 22, 0, Math.PI * 2);
                    ctx.fillStyle = depth === 0 ? 'rgba(255, 0, 255, 0.3)' : 'rgba(0, 243, 255, 0.2)';
                    ctx.fill();
                    ctx.strokeStyle = depth === 0 ? '#ff00ff' : '#00f3ff';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = depth === 0 ? '#ff00ff' : '#00f3ff';
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.value, x, y);
                    ctx.fillStyle = '#ff00ff';
                    ctx.font = '10px system-ui';
                    ctx.fillText(`id:${node.id}`, x, y + 35);
                });
            });
            updateInfo();
        }

        function collectNodes(node, arr, depth, parent) {
            arr.push({
                value: node.value,
                id: node.id,
                depth,
                parent
            });
            node.children.forEach(child => collectNodes(child, arr, depth + 1, arr[arr.length - 1]));
        }

        function updateInfo() {
            document.getElementById('nodeCount').textContent = tree.getNodeCount();
            document.getElementById('treeHeight').textContent = tree.getHeight();
            document.getElementById('maxChildren').textContent = tree.getMaxChildren();
        }

        function log(msg) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 10) logBox.removeChild(logBox.lastChild);
        }

        function addChild() {
            const parentId = parseInt(document.getElementById('parentInput').value);
            const value = parseInt(document.getElementById('childInput').value);
            if (!isNaN(parentId) && !isNaN(value)) {
                if (tree.addChild(parentId, value)) drawTree();
            }
        }

        function clearTree() {
            tree.root = null;
            tree.nodes.clear();
            tree.idCounter = 0;
            document.getElementById('logBox').innerHTML = '';
            log('Tree cleared');
            drawTree();
        }

        function randomTree() {
            clearTree();
            tree.createRoot(1);
            let availableParents = [0];
            for (let i = 0; i < 12; i++) {
                const parentId = availableParents[Math.floor(Math.random() * availableParents.length)];
                const value = Math.floor(Math.random() * 100) + 10;
                if (tree.addChild(parentId, value)) {
                    availableParents.push(tree.idCounter - 1);
                }
            }
            log('Generated random N-ary tree');
            drawTree();
        }
        drawTree();
    </script>
</body>

</html>
