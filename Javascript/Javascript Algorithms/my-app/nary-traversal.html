<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-ary Tree - Traversal</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            overflow: auto;
        }

        #treeCanvas {
            width: 100%;
            height: 400px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .result-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            min-height: 60px;
        }

        .result-label {
            color: var(--neon-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">N-ary Tree - Traversal</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Traversals</h3>
                <button class="btn" onclick="preorder()">Preorder (DFS)</button>
                <button class="btn" onclick="postorder()">Postorder (DFS)</button>
                <button class="btn" onclick="levelorder()">Level Order (BFS)</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="randomTree()">New Random Tree</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Result</h3>
                <div class="result-label" id="traversalType">Select a traversal</div>
                <div class="result-box" id="traversalResult"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.max(container.clientWidth, 800);
            canvas.height = 400;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class NaryNode {
            constructor(value, id) {
                this.value = value;
                this.id = id;
                this.children = [];
            }
        }
        class NaryTree {
            constructor() {
                this.root = null;
                this.nodes = new Map();
                this.idCounter = 0;
            }
            createRoot(value) {
                this.root = new NaryNode(value, this.idCounter++);
                this.nodes.set(this.root.id, this.root);
            }
            addChild(parentId, value) {
                const parent = this.nodes.get(parentId);
                if (!parent) return false;
                const child = new NaryNode(value, this.idCounter++);
                this.nodes.set(child.id, child);
                parent.children.push(child);
                return true;
            }
            preorder(result = [], node = this.root) {
                if (!node) return result;
                result.push(node.value);
                node.children.forEach(child => this.preorder(result, child));
                return result;
            }
            postorder(result = [], node = this.root) {
                if (!node) return result;
                node.children.forEach(child => this.postorder(result, child));
                result.push(node.value);
                return result;
            }
            levelorder() {
                const result = [];
                if (!this.root) return result;
                const queue = [this.root];
                while (queue.length) {
                    const node = queue.shift();
                    result.push(node.value);
                    queue.push(...node.children);
                }
                return result;
            }
        }
        const tree = new NaryTree();
        let animationQueue = [];
        let animationIndex = 0;

        function drawTree(highlightedId = -1) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!tree.root) return;
            const nodes = [];
            collectNodes(tree.root, nodes, 0, null);
            const levels = {};
            nodes.forEach(n => {
                if (!levels[n.depth]) levels[n.depth] = [];
                levels[n.depth].push(n);
            });
            const levelHeight = 80;
            Object.keys(levels).sort((a, b) => a - b).forEach((depth) => {
                const levelNodes = levels[depth];
                const spacing = canvas.width / (levelNodes.length + 1);
                levelNodes.forEach((node, i) => {
                    const x = (i + 1) * spacing;
                    const y = 50 + depth * levelHeight;
                    node.x = x;
                    node.y = y;
                    if (node.parent) {
                        ctx.beginPath();
                        ctx.moveTo(node.parent.x, node.parent.y + 20);
                        ctx.lineTo(x, y - 20);
                        ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    const isHighlighted = node.id === highlightedId;
                    ctx.beginPath();
                    ctx.arc(x, y, 22, 0, Math.PI * 2);
                    ctx.fillStyle = isHighlighted ? 'rgba(255, 255, 0, 0.4)' : (depth === 0 ? 'rgba(255, 0, 255, 0.3)' : 'rgba(0, 243, 255, 0.2)');
                    ctx.fill();
                    ctx.strokeStyle = isHighlighted ? '#ffff00' : (depth === 0 ? '#ff00ff' : '#00f3ff');
                    ctx.lineWidth = 2;
                    ctx.shadowColor = isHighlighted ? '#ffff00' : (depth === 0 ? '#ff00ff' : '#00f3ff');
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.value, x, y);
                });
            });
        }

        function collectNodes(node, arr, depth, parent) {
            arr.push({
                value: node.value,
                id: node.id,
                depth,
                parent
            });
            node.children.forEach(child => collectNodes(child, arr, depth + 1, arr[arr.length - 1]));
        }

        function animateTraversal(order) {
            animationQueue = order.map(v => {
                for (const [id, node] of tree.nodes) {
                    if (node.value === v) return id;
                }
                return -1;
            });
            animationIndex = 0;
            animate();
        }

        function animate() {
            if (animationIndex < animationQueue.length) {
                drawTree(animationQueue[animationIndex]);
                animationIndex++;
                setTimeout(animate, 500);
            }
        }

        function preorder() {
            const result = tree.preorder();
            document.getElementById('traversalType').textContent = 'Preorder (Root → Children)';
            document.getElementById('traversalResult').textContent = result.join(' → ');
            animateTraversal(result);
        }

        function postorder() {
            const result = tree.postorder();
            document.getElementById('traversalType').textContent = 'Postorder (Children → Root)';
            document.getElementById('traversalResult').textContent = result.join(' → ');
            animateTraversal(result);
        }

        function levelorder() {
            const result = tree.levelorder();
            document.getElementById('traversalType').textContent = 'Level Order (BFS)';
            document.getElementById('traversalResult').textContent = result.join(' → ');
            animateTraversal(result);
        }

        function randomTree() {
            tree.root = null;
            tree.nodes.clear();
            tree.idCounter = 0;
            tree.createRoot(1);
            let availableParents = [0];
            for (let i = 0; i < 10; i++) {
                const parentId = availableParents[Math.floor(Math.random() * availableParents.length)];
                const value = Math.floor(Math.random() * 100) + 10;
                if (tree.addChild(parentId, value)) {
                    availableParents.push(tree.idCounter - 1);
                }
            }
            document.getElementById('traversalType').textContent = 'Select a traversal';
            document.getElementById('traversalResult').textContent = '';
            drawTree();
        }
        randomTree();
    </script>
</body>

</html>
