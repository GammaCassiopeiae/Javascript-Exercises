<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red-Black Tree - Introduction</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --rb-red: #ff4444;
            --rb-black: #444444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        #treeCanvas {
            width: 100%;
            height: 500px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .legend__item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .legend__color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">Red-Black Tree - Introduction</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container">
            <canvas id="treeCanvas"></canvas>
        </div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Insert Node</h3>
                <div class="input-group">
                    <input type="number" id="insertInput" placeholder="Value" min="1" max="999">
                    <button class="btn" onclick="insertNode()">Insert</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Tree Info</h3>
                <div class="info-box">
                    <p>Nodes: <span id="nodeCount">0</span></p>
                    <p>Black Height: <span id="blackHeight">0</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearTree()" style="width: 100%; margin-bottom: 0.5rem;">Clear Tree</button>
                <button class="btn" onclick="generateRandom()" style="width: 100%;">Random Tree</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Legend</h3>
                <div class="legend">
                    <div class="legend__item">
                        <div class="legend__color" style="background: var(--rb-red); box-shadow: 0 0 10px var(--rb-red);"></div>
                        <span>Red Node</span>
                    </div>
                    <div class="legend__item">
                        <div class="legend__color" style="background: var(--rb-black); box-shadow: 0 0 10px var(--rb-black);"></div>
                        <span>Black Node</span>
                    </div>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">RB-Tree Properties</h3>
                <p style="font-size: 0.85rem; color: rgba(255,255,255,0.7);">
                    1. Every node is red or black<br>
                    2. Root is black<br>
                    3. Leaves (NIL) are black<br>
                    4. Red nodes have black children<br>
                    5. Same black height on all paths
                </p>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const RED = true,
            BLACK = false;
        class RBNode {
            constructor(value) {
                this.value = value;
                this.color = RED;
                this.left = null;
                this.right = null;
                this.parent = null;
            }
        }
        class RBTree {
            constructor() {
                this.root = null;
            }
            insert(value) {
                const node = new RBNode(value);
                if (!this.root) {
                    this.root = node;
                    this.root.color = BLACK;
                    return;
                }
                let curr = this.root;
                while (true) {
                    if (value < curr.value) {
                        if (!curr.left) {
                            curr.left = node;
                            node.parent = curr;
                            break;
                        }
                        curr = curr.left;
                    } else {
                        if (!curr.right) {
                            curr.right = node;
                            node.parent = curr;
                            break;
                        }
                        curr = curr.right;
                    }
                }
                this.fixInsert(node);
            }
            fixInsert(node) {
                while (node.parent && node.parent.color === RED) {
                    if (node.parent === node.parent.parent.left) {
                        const uncle = node.parent.parent.right;
                        if (uncle && uncle.color === RED) {
                            node.parent.color = BLACK;
                            uncle.color = BLACK;
                            node.parent.parent.color = RED;
                            node = node.parent.parent;
                        } else {
                            if (node === node.parent.right) {
                                node = node.parent;
                                this.rotateLeft(node);
                            }
                            node.parent.color = BLACK;
                            node.parent.parent.color = RED;
                            this.rotateRight(node.parent.parent);
                        }
                    } else {
                        const uncle = node.parent.parent.left;
                        if (uncle && uncle.color === RED) {
                            node.parent.color = BLACK;
                            uncle.color = BLACK;
                            node.parent.parent.color = RED;
                            node = node.parent.parent;
                        } else {
                            if (node === node.parent.left) {
                                node = node.parent;
                                this.rotateRight(node);
                            }
                            node.parent.color = BLACK;
                            node.parent.parent.color = RED;
                            this.rotateLeft(node.parent.parent);
                        }
                    }
                }
                this.root.color = BLACK;
            }
            rotateLeft(x) {
                const y = x.right;
                x.right = y.left;
                if (y.left) y.left.parent = x;
                y.parent = x.parent;
                if (!x.parent) this.root = y;
                else if (x === x.parent.left) x.parent.left = y;
                else x.parent.right = y;
                y.left = x;
                x.parent = y;
            }
            rotateRight(y) {
                const x = y.left;
                y.left = x.right;
                if (x.right) x.right.parent = y;
                x.parent = y.parent;
                if (!y.parent) this.root = x;
                else if (y === y.parent.left) y.parent.left = x;
                else y.parent.right = x;
                x.right = y;
                y.parent = x;
            }
            getNodeCount() {
                return this.countRec(this.root);
            }
            countRec(node) {
                if (!node) return 0;
                return 1 + this.countRec(node.left) + this.countRec(node.right);
            }
            getBlackHeight() {
                return this.bhRec(this.root);
            }
            bhRec(node) {
                if (!node) return 1;
                const left = this.bhRec(node.left);
                const right = this.bhRec(node.right);
                if (left !== right) return -1;
                return left + (node.color === BLACK ? 1 : 0);
            }
        }
        const tree = new RBTree();

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (tree.root) drawNode(tree.root, canvas.width / 2, 50, canvas.width / 4);
            updateInfo();
        }

        function drawNode(node, x, y, offset) {
            if (!node) return;
            if (node.left) {
                ctx.beginPath();
                ctx.moveTo(x, y + 20);
                ctx.lineTo(x - offset, y + 70);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
                drawNode(node.left, x - offset, y + 70, offset / 2);
            }
            if (node.right) {
                ctx.beginPath();
                ctx.moveTo(x, y + 20);
                ctx.lineTo(x + offset, y + 70);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
                drawNode(node.right, x + offset, y + 70, offset / 2);
            }
            const isRed = node.color === RED;
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fillStyle = isRed ? 'rgba(255, 68, 68, 0.5)' : 'rgba(68, 68, 68, 0.8)';
            ctx.fill();
            ctx.strokeStyle = isRed ? '#ff4444' : '#888';
            ctx.lineWidth = 2;
            ctx.shadowColor = isRed ? '#ff4444' : '#666';
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.value, x, y);
        }

        function updateInfo() {
            document.getElementById('nodeCount').textContent = tree.getNodeCount();
            document.getElementById('blackHeight').textContent = tree.getBlackHeight();
        }

        function insertNode() {
            const input = document.getElementById('insertInput');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                tree.insert(value);
                input.value = '';
                drawTree();
            }
        }

        function clearTree() {
            tree.root = null;
            drawTree();
        }

        function generateRandom() {
            clearTree();
            for (let i = 0; i < 7; i++) tree.insert(Math.floor(Math.random() * 100) + 1);
            drawTree();
        }
        document.getElementById('insertInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') insertNode();
        });
        drawTree();
    </script>
</body>

</html>
