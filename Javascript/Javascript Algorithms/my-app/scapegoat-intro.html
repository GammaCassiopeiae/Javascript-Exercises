<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scapegoat Tree - Introduction</title>
    <style>
        :root { --neon-primary: #00f3ff; --neon-secondary: #ff00ff; --bg-dark: #050505; --bg-card: rgba(255,255,255,0.05); --border-neon: 1px solid rgba(0,243,255,0.3); --ease-out: cubic-bezier(0.16,1,0.3,1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg-dark); color: #fff; min-height: 100vh; }
        .l-header { position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: var(--border-neon); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header__title { font-size: 1.5rem; color: var(--neon-primary); text-shadow: 0 0 5px var(--neon-primary); }
        .header__back { color: var(--neon-secondary); text-decoration: none; padding: 0.5rem 1rem; border: var(--border-neon); border-radius: 8px; transition: all 0.3s var(--ease-out); }
        .header__back:hover { box-shadow: 0 0 10px var(--neon-secondary); }
        .l-main { display: grid; grid-template-columns: 1fr 350px; gap: 1rem; padding: 1rem; max-width: 1600px; margin: 0 auto; }
        @media (max-width: 900px) { .l-main { grid-template-columns: 1fr; } }
        .canvas-container { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1rem; backdrop-filter: blur(10px); }
        #treeCanvas { width: 100%; height: 500px; display: block; }
        .controls { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1.5rem; backdrop-filter: blur(10px); }
        .controls__section { margin-bottom: 1.5rem; }
        .controls__title { color: var(--neon-secondary); font-size: 1.1rem; margin-bottom: 1rem; text-shadow: 0 0 5px var(--neon-secondary); }
        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .input-group input { flex: 1; padding: 0.8rem; background: rgba(0,0,0,0.3); border: var(--border-neon); border-radius: 8px; color: #fff; font-size: 1rem; caret-color: var(--neon-primary); }
        .input-group input:focus { outline: none; box-shadow: 0 0 10px var(--neon-primary); }
        .btn { padding: 0.8rem 1.5rem; background: rgba(0,243,255,0.1); border: var(--border-neon); border-radius: 8px; color: var(--neon-primary); cursor: pointer; font-size: 1rem; transition: all 0.3s var(--ease-out); }
        .btn:hover { background: rgba(0,243,255,0.2); box-shadow: 0 0 15px var(--neon-primary); }
        .info-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 1rem; margin-top: 1rem; }
        .info-box p { margin-bottom: 0.5rem; font-size: 0.9rem; }
        .info-box span { color: var(--neon-primary); }
        .log-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 1rem; max-height: 150px; overflow-y: auto; font-size: 0.85rem; font-family: monospace; }
        .log-entry { margin-bottom: 0.5rem; padding: 0.3rem; border-left: 2px solid var(--neon-secondary); padding-left: 0.5rem; }
    </style>
</head>
<body>
    <header class="l-header">
        <h1 class="header__title">Scapegoat Tree - Introduction</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Insert Node</h3>
                <div class="input-group">
                    <input type="number" id="insertInput" placeholder="Value" min="1" max="999">
                    <button class="btn" onclick="insertNode()">Insert</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Tree Info</h3>
                <div class="info-box">
                    <p>Nodes: <span id="nodeCount">0</span></p>
                    <p>Height: <span id="treeHeight">0</span></p>
                    <p>Max Nodes: <span id="maxNodes">0</span></p>
                    <p>Alpha: <span id="alphaVal">0.75</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearTree()" style="width: 100%; margin-bottom: 0.5rem;">Clear Tree</button>
                <button class="btn" onclick="generateRandom()" style="width: 100%;">Random Tree</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Operation Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { const container = canvas.parentElement; canvas.width = container.clientWidth; canvas.height = 500; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const ALPHA = 0.75;
        class SGNode { constructor(value) { this.value = value; this.left = null; this.right = null; } }
        class ScapegoatTree {
            constructor() { this.root = null; this.n = 0; this.maxNodes = 0; }
            insert(value) {
                log(`Inserting ${value}...`);
                if (!this.root) { this.root = new SGNode(value); this.n = 1; this.maxNodes = 1; log(`  Created root`); return; }
                const depth = this.insertRec(this.root, value, 0);
                this.n++;
                this.maxNodes = Math.max(this.maxNodes, this.n);
                if (depth > Math.floor(Math.log(this.n) / Math.log(1/ALPHA))) {
                    log(`  Height violation! Finding scapegoat...`);
                    const scapegoat = this.findScapegoat(value);
                    if (scapegoat) {
                        log(`  Scapegoat found: ${scapegoat.value}. Rebuilding...`);
                        this.rebuildSubtree(scapegoat);
                    }
                }
            }
            insertRec(node, value, depth) {
                if (value < node.value) {
                    if (!node.left) { node.left = new SGNode(value); return depth + 1; }
                    return this.insertRec(node.left, value, depth + 1);
                } else {
                    if (!node.right) { node.right = new SGNode(value); return depth + 1; }
                    return this.insertRec(node.right, value, depth + 1);
                }
            }
            findScapegoat(value) {
                let node = this.root;
                let parent = null;
                let scapegoat = null;
                while (node) {
                    if (this.isBalanced(node)) {
                        parent = node;
                        node = value < node.value ? node.left : node.right;
                    } else {
                        scapegoat = node;
                        parent = node;
                        node = value < node.value ? node.left : node.right;
                    }
                }
                return scapegoat;
            }
            isBalanced(node) {
                const leftSize = this.size(node.left);
                const rightSize = this.size(node.right);
                const total = leftSize + rightSize + 1;
                return leftSize <= ALPHA * total && rightSize <= ALPHA * total;
            }
            size(node) { if (!node) return 0; return 1 + this.size(node.left) + this.size(node.right); }
            rebuildSubtree(node) {
                const values = [];
                this.inorder(node, values);
                const newNode = this.buildBalanced(values, 0, values.length - 1);
                if (node === this.root) { this.root = newNode; return; }
                let parent = this.root;
                while (parent) {
                    if (parent.left === node) { parent.left = newNode; return; }
                    if (parent.right === node) { parent.right = newNode; return; }
                    parent = values[0] < parent.value ? parent.left : parent.right;
                }
            }
            inorder(node, arr) { if (!node) return; this.inorder(node.left, arr); arr.push(node.value); this.inorder(node.right, arr); }
            buildBalanced(arr, lo, hi) {
                if (lo > hi) return null;
                const mid = Math.floor((lo + hi) / 2);
                const node = new SGNode(arr[mid]);
                node.left = this.buildBalanced(arr, lo, mid - 1);
                node.right = this.buildBalanced(arr, mid + 1, hi);
                return node;
            }
            getHeight() { return this.heightRec(this.root); }
            heightRec(node) { if (!node) return 0; return 1 + Math.max(this.heightRec(node.left), this.heightRec(node.right)); }
        }
        const tree = new ScapegoatTree();
        function drawTree() { ctx.clearRect(0, 0, canvas.width, canvas.height); if (tree.root) drawNode(tree.root, canvas.width / 2, 50, canvas.width / 4); updateInfo(); }
        function drawNode(node, x, y, offset) {
            if (!node) return;
            if (node.left) { ctx.beginPath(); ctx.moveTo(x, y + 20); ctx.lineTo(x - offset, y + 70); ctx.strokeStyle = 'rgba(0,243,255,0.5)'; ctx.lineWidth = 2; ctx.stroke(); drawNode(node.left, x - offset, y + 70, offset / 2); }
            if (node.right) { ctx.beginPath(); ctx.moveTo(x, y + 20); ctx.lineTo(x + offset, y + 70); ctx.strokeStyle = 'rgba(0,243,255,0.5)'; ctx.lineWidth = 2; ctx.stroke(); drawNode(node.right, x + offset, y + 70, offset / 2); }
            ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 243, 255, 0.3)'; ctx.fill();
            ctx.strokeStyle = '#00f3ff'; ctx.lineWidth = 2;
            ctx.shadowColor = '#00f3ff'; ctx.shadowBlur = 10; ctx.stroke(); ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(node.value, x, y);
        }
        function updateInfo() { document.getElementById('nodeCount').textContent = tree.n; document.getElementById('treeHeight').textContent = tree.getHeight(); document.getElementById('maxNodes').textContent = tree.maxNodes; }
        function log(msg) { const logBox = document.getElementById('logBox'); const entry = document.createElement('div'); entry.className = 'log-entry'; entry.textContent = msg; logBox.insertBefore(entry, logBox.firstChild); if (logBox.children.length > 15) logBox.removeChild(logBox.lastChild); }
        function insertNode() { const input = document.getElementById('insertInput'); const value = parseInt(input.value); if (!isNaN(value)) { tree.insert(value); input.value = ''; drawTree(); } }
        function clearTree() { tree.root = null; tree.n = 0; tree.maxNodes = 0; document.getElementById('logBox').innerHTML = ''; log('Tree cleared'); drawTree(); }
        function generateRandom() { clearTree(); for (let i = 0; i < 10; i++) { tree.insert(Math.floor(Math.random() * 100) + 1); } drawTree(); }
        document.getElementById('insertInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') insertNode(); });
        drawTree();
    </script>
</body>
</html>
