<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segment Tree - Lazy Propagation</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            overflow-x: auto;
        }

        #treeCanvas {
            width: 100%;
            height: 400px;
            display: block;
        }

        .array-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
        }

        #arrayCanvas {
            width: 100%;
            height: 60px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 80px;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .log-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            border-left: 2px solid var(--neon-secondary);
            padding-left: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">Segment Tree - Lazy Propagation</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div>
            <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
            <div class="array-container"><canvas id="arrayCanvas"></canvas></div>
        </div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Range Update (Add)</h3>
                <div class="input-group">
                    <input type="number" id="leftInput" placeholder="L" min="0" max="7">
                    <input type="number" id="rightInput" placeholder="R" min="0" max="7">
                    <input type="number" id="valInput" placeholder="Value" min="-10" max="10">
                    <button class="btn" onclick="rangeUpdate()">Update</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Range Sum Query</h3>
                <div class="input-group">
                    <input type="number" id="qLeftInput" placeholder="L" min="0" max="7">
                    <input type="number" id="qRightInput" placeholder="R" min="0" max="7">
                    <button class="btn" onclick="queryRange()">Query</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Array Size: <span id="arraySize">8</span></p>
                    <p>Last Result: <span id="lastResult">-</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="randomize()" style="width: 100%;">Random Array</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const treeCanvas = document.getElementById('treeCanvas');
        const treeCtx = treeCanvas.getContext('2d');
        const arrayCanvas = document.getElementById('arrayCanvas');
        const arrayCtx = arrayCanvas.getContext('2d');

        function resizeCanvas() {
            treeCanvas.width = Math.max(treeCanvas.parentElement.clientWidth, 800);
            treeCanvas.height = 400;
            arrayCanvas.width = arrayCanvas.parentElement.clientWidth;
            arrayCanvas.height = 60;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        let arr = [1, 2, 3, 4, 5, 6, 7, 8];
        let tree = [],
            lazy = [];
        let highlightedNodes = new Set();
        class LazySegmentTree {
            constructor(arr) {
                this.n = arr.length;
                this.tree = new Array(4 * this.n).fill(0);
                this.lazy = new Array(4 * this.n).fill(0);
                this.build(arr, 0, 0, this.n - 1);
            }
            build(arr, node, start, end) {
                if (start === end) {
                    this.tree[node] = arr[start];
                    return;
                }
                const mid = Math.floor((start + end) / 2);
                this.build(arr, 2 * node + 1, start, mid);
                this.build(arr, 2 * node + 2, mid + 1, end);
                this.tree[node] = this.tree[2 * node + 1] + this.tree[2 * node + 2];
            }
            push(node, start, end) {
                if (this.lazy[node] !== 0) {
                    this.tree[node] += this.lazy[node] * (end - start + 1);
                    if (start !== end) {
                        this.lazy[2 * node + 1] += this.lazy[node];
                        this.lazy[2 * node + 2] += this.lazy[node];
                    }
                    this.lazy[node] = 0;
                }
            }
            rangeUpdate(l, r, val) {
                log(`Range Update [${l},${r}] += ${val}`);
                this.updateRec(0, 0, this.n - 1, l, r, val);
            }
            updateRec(node, start, end, l, r, val) {
                this.push(node, start, end);
                if (r < start || end < l) return;
                if (l <= start && end <= r) {
                    this.lazy[node] += val;
                    this.push(node, start, end);
                    log(`  Node ${node} updated, lazy pushed`);
                    return;
                }
                const mid = Math.floor((start + end) / 2);
                this.updateRec(2 * node + 1, start, mid, l, r, val);
                this.updateRec(2 * node + 2, mid + 1, end, l, r, val);
                this.tree[node] = this.tree[2 * node + 1] + this.tree[2 * node + 2];
            }
            query(l, r) {
                highlightedNodes.clear();
                return this.queryRec(0, 0, this.n - 1, l, r);
            }
            queryRec(node, start, end, l, r) {
                this.push(node, start, end);
                if (r < start || end < l) return 0;
                if (l <= start && end <= r) {
                    highlightedNodes.add(node);
                    return this.tree[node];
                }
                const mid = Math.floor((start + end) / 2);
                return this.queryRec(2 * node + 1, start, mid, l, r) + this.queryRec(2 * node + 2, mid + 1, end, l, r);
            }
            getTree() {
                return this.tree;
            }
            getLazy() {
                return this.lazy;
            }
            getArray() {
                const result = [];
                for (let i = 0; i < this.n; i++) result.push(this.queryRec(0, 0, this.n - 1, i, i));
                return result;
            }
        }
        let segTree = new LazySegmentTree(arr);

        function drawTree() {
            treeCtx.clearRect(0, 0, treeCanvas.width, treeCanvas.height);
            tree = segTree.getTree();
            lazy = segTree.getLazy();
            drawNode(0, 0, treeCanvas.width / 2, 40, treeCanvas.width / 4, 0);
        }

        function drawNode(node, level, x, y, offset, maxLevel) {
            if (node >= tree.length || (tree[node] === 0 && lazy[node] === 0 && level > maxLevel)) return;
            maxLevel = Math.max(maxLevel, level);
            const isHighlighted = highlightedNodes.has(node);
            const hasLazy = lazy[node] !== 0;
            ctx = treeCtx;
            if (node > 0) {
                ctx.beginPath();
                ctx.moveTo(x + (node % 2 === 0 ? -offset : offset), y - 40);
                ctx.lineTo(x, y - 20);
                ctx.strokeStyle = isHighlighted ? 'rgba(255, 255, 0, 0.8)' : 'rgba(0, 243, 255, 0.5)';
                ctx.lineWidth = isHighlighted ? 3 : 2;
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(x, y, 22, 0, Math.PI * 2);
            ctx.fillStyle = hasLazy ? 'rgba(255, 0, 255, 0.3)' : (isHighlighted ? 'rgba(255, 255, 0, 0.3)' : 'rgba(0, 243, 255, 0.2)');
            ctx.fill();
            ctx.strokeStyle = hasLazy ? '#ff00ff' : (isHighlighted ? '#ffff00' : '#00f3ff');
            ctx.lineWidth = 2;
            ctx.shadowColor = hasLazy ? '#ff00ff' : (isHighlighted ? '#ffff00' : '#00f3ff');
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 11px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(tree[node], x, y - 5);
            if (hasLazy) {
                ctx.fillStyle = '#ff00ff';
                ctx.font = '10px system-ui';
                ctx.fillText(`+${lazy[node]}`, x, y + 10);
            }
            const left = 2 * node + 1,
                right = 2 * node + 2;
            if (left < tree.length && level < 3) {
                drawNode(left, level + 1, x - offset, y + 60, offset / 2, maxLevel);
                drawNode(right, level + 1, x + offset, y + 60, offset / 2, maxLevel);
            }
        }

        function drawArray() {
            arrayCtx.clearRect(0, 0, arrayCanvas.width, arrayCanvas.height);
            const currentArr = segTree.getArray();
            const w = arrayCanvas.width / currentArr.length;
            currentArr.forEach((val, i) => {
                const x = i * w + w / 2;
                const y = arrayCanvas.height / 2;
                arrayCtx.beginPath();
                arrayCtx.rect(i * w + 5, 10, w - 10, 40);
                arrayCtx.fillStyle = 'rgba(0, 243, 255, 0.2)';
                arrayCtx.fill();
                arrayCtx.strokeStyle = '#00f3ff';
                arrayCtx.stroke();
                arrayCtx.fillStyle = '#fff';
                arrayCtx.font = 'bold 14px system-ui';
                arrayCtx.textAlign = 'center';
                arrayCtx.textBaseline = 'middle';
                arrayCtx.fillText(val, x, y);
                arrayCtx.fillStyle = '#ff00ff';
                arrayCtx.font = '10px system-ui';
                arrayCtx.fillText(i, x, y + 25);
            });
        }

        function log(msg) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 10) logBox.removeChild(logBox.lastChild);
        }

        function rangeUpdate() {
            const l = parseInt(document.getElementById('leftInput').value);
            const r = parseInt(document.getElementById('rightInput').value);
            const val = parseInt(document.getElementById('valInput').value);
            if (!isNaN(l) && !isNaN(r) && !isNaN(val) && l >= 0 && r < arr.length && l <= r) {
                segTree.rangeUpdate(l, r, val);
                arr = segTree.getArray();
                drawTree();
                drawArray();
            }
        }

        function queryRange() {
            const l = parseInt(document.getElementById('qLeftInput').value);
            const r = parseInt(document.getElementById('qRightInput').value);
            if (!isNaN(l) && !isNaN(r) && l >= 0 && r < arr.length && l <= r) {
                const result = segTree.query(l, r);
                document.getElementById('lastResult').textContent = `Sum[${l},${r}] = ${result}`;
                drawTree();
            }
        }

        function randomize() {
            arr = Array.from({
                length: 8
            }, () => Math.floor(Math.random() * 10) + 1);
            segTree = new LazySegmentTree(arr);
            highlightedNodes.clear();
            document.getElementById('logBox').innerHTML = '';
            document.getElementById('lastResult').textContent = '-';
            drawTree();
            drawArray();
        }
        drawTree();
        drawArray();
    </script>
</body>

</html>
