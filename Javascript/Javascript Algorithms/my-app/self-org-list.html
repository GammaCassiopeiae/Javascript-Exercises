<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Organizing List</title>
    <style>
        :root { --neon-primary: #00f3ff; --neon-secondary: #ff00ff; --bg-dark: #050505; --bg-card: rgba(255,255,255,0.05); --border-neon: 1px solid rgba(0,243,255,0.3); --ease-out: cubic-bezier(0.16,1,0.3,1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg-dark); color: #fff; min-height: 100vh; }
        .l-header { position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: var(--border-neon); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header__title { font-size: 1.5rem; color: var(--neon-primary); text-shadow: 0 0 5px var(--neon-primary); }
        .header__back { color: var(--neon-secondary); text-decoration: none; padding: 0.5rem 1rem; border: var(--border-neon); border-radius: 8px; transition: all 0.3s var(--ease-out); }
        .header__back:hover { box-shadow: 0 0 10px var(--neon-secondary); }
        .l-main { display: grid; grid-template-columns: 1fr 350px; gap: 1rem; padding: 1rem; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 900px) { .l-main { grid-template-columns: 1fr; } }
        .canvas-container { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1rem; backdrop-filter: blur(10px); }
        #listCanvas { width: 100%; height: 300px; display: block; }
        .controls { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1.5rem; backdrop-filter: blur(10px); }
        .controls__section { margin-bottom: 1.5rem; }
        .controls__title { color: var(--neon-secondary); font-size: 1.1rem; margin-bottom: 1rem; text-shadow: 0 0 5px var(--neon-secondary); }
        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .input-group input { flex: 1; padding: 0.8rem; background: rgba(0,0,0,0.3); border: var(--border-neon); border-radius: 8px; color: #fff; font-size: 1rem; caret-color: var(--neon-primary); }
        .input-group input:focus { outline: none; box-shadow: 0 0 10px var(--neon-primary); }
        .btn { padding: 0.8rem 1.5rem; background: rgba(0,243,255,0.1); border: var(--border-neon); border-radius: 8px; color: var(--neon-primary); cursor: pointer; font-size: 1rem; transition: all 0.3s var(--ease-out); }
        .btn:hover { background: rgba(0,243,255,0.2); box-shadow: 0 0 15px var(--neon-primary); }
        .info-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 1rem; margin-top: 1rem; }
        .info-box p { margin-bottom: 0.5rem; font-size: 0.9rem; }
        .info-box span { color: var(--neon-primary); }
        .strategy-select { width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.3); border: var(--border-neon); border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 1rem; }
        .strategy-select:focus { outline: none; box-shadow: 0 0 10px var(--neon-primary); }
    </style>
</head>
<body>
    <header class="l-header">
        <h1 class="header__title">Self-Organizing List</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="listCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Strategy</h3>
                <select class="strategy-select" id="strategySelect" onchange="changeStrategy()">
                    <option value="mtf">Move-to-Front</option>
                    <option value="transpose">Transpose</option>
                    <option value="count">Count-based</option>
                </select>
                <p style="font-size: 0.85rem; color: rgba(255,255,255,0.7);" id="strategyDesc">Move accessed element to front of list.</p>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Access Element</h3>
                <div class="input-group">
                    <input type="number" id="accessInput" placeholder="Value" min="1" max="99">
                    <button class="btn" onclick="accessElement()">Access</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Elements: <span id="elemCount">0</span></p>
                    <p>Accesses: <span id="accessCount">0</span></p>
                    <p>Cost: <span id="totalCost">0</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="resetList()" style="width: 100%; margin-bottom: 0.5rem;">Reset</button>
                <button class="btn" onclick="randomAccess()" style="width: 100%;">Random Access</button>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('listCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { const container = canvas.parentElement; canvas.width = container.clientWidth; canvas.height = 300; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        let list = [];
        let strategy = 'mtf';
        let accessCount = 0;
        let totalCost = 0;
        let highlightedIndex = -1;
        function initList() {
            list = Array.from({length: 8}, (_, i) => ({ value: i + 1, count: 0 }));
            accessCount = 0;
            totalCost = 0;
            highlightedIndex = -1;
        }
        function changeStrategy() {
            strategy = document.getElementById('strategySelect').value;
            const desc = {
                'mtf': 'Move accessed element to front of list.',
                'transpose': 'Swap accessed element with predecessor.',
                'count': 'Order by access count (descending).'
            };
            document.getElementById('strategyDesc').textContent = desc[strategy];
        }
        function drawList() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const boxWidth = 70;
            const gap = 10;
            const totalWidth = list.length * boxWidth + (list.length - 1) * gap;
            const startX = (canvas.width - totalWidth) / 2;
            list.forEach((elem, i) => {
                const x = startX + i * (boxWidth + gap);
                const y = canvas.height / 2 - 30;
                const isHighlighted = i === highlightedIndex;
                ctx.beginPath();
                ctx.roundRect(x, y, boxWidth, 60, 8);
                ctx.fillStyle = isHighlighted ? 'rgba(255, 255, 0, 0.3)' : 'rgba(0, 243, 255, 0.15)';
                ctx.fill();
                ctx.strokeStyle = isHighlighted ? '#ffff00' : '#00f3ff';
                ctx.lineWidth = 2;
                ctx.shadowColor = isHighlighted ? '#ffff00' : '#00f3ff';
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(elem.value, x + boxWidth / 2, y + 30);
                ctx.fillStyle = '#ff00ff';
                ctx.font = '10px system-ui';
                ctx.fillText(`pos:${i}`, x + boxWidth / 2, y - 12);
                if (strategy === 'count') {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillText(`cnt:${elem.count}`, x + boxWidth / 2, y + 50);
                }
                if (i < list.length - 1) {
                    ctx.beginPath();
                    ctx.moveTo(x + boxWidth, y + 30);
                    ctx.lineTo(x + boxWidth + gap, y + 30);
                    ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + boxWidth + gap - 8, y + 25);
                    ctx.lineTo(x + boxWidth + gap, y + 30);
                    ctx.lineTo(x + boxWidth + gap - 8, y + 35);
                    ctx.stroke();
                }
            });
            updateInfo();
        }
        function updateInfo() {
            document.getElementById('elemCount').textContent = list.length;
            document.getElementById('accessCount').textContent = accessCount;
            document.getElementById('totalCost').textContent = totalCost;
        }
        function accessElement(value) {
            const idx = list.findIndex(e => e.value === value);
            if (idx === -1) return;
            highlightedIndex = idx;
            accessCount++;
            totalCost += idx + 1;
            elem = list[idx];
            elem.count++;
            if (strategy === 'mtf' && idx > 0) {
                list.splice(idx, 1);
                list.unshift(elem);
            } else if (strategy === 'transpose' && idx > 0) {
                [list[idx], list[idx - 1]] = [list[idx - 1], list[idx]];
            } else if (strategy === 'count') {
                list.sort((a, b) => b.count - a.count);
            }
            drawList();
        }
        function accessElement() {
            const input = document.getElementById('accessInput');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                accessElement(value);
                input.value = '';
            }
        }
        function resetList() {
            initList();
            drawList();
        }
        function randomAccess() {
            const elem = list[Math.floor(Math.random() * list.length)];
            accessElement(elem.value);
        }
        initList();
        drawList();
    </script>
</body>
</html>
