<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skip List</title>
    <style>
        :root { --neon-primary: #00f3ff; --neon-secondary: #ff00ff; --bg-dark: #050505; --bg-card: rgba(255,255,255,0.05); --border-neon: 1px solid rgba(0,243,255,0.3); --ease-out: cubic-bezier(0.16,1,0.3,1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg-dark); color: #fff; min-height: 100vh; }
        .l-header { position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: var(--border-neon); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header__title { font-size: 1.5rem; color: var(--neon-primary); text-shadow: 0 0 5px var(--neon-primary); }
        .header__back { color: var(--neon-secondary); text-decoration: none; padding: 0.5rem 1rem; border: var(--border-neon); border-radius: 8px; transition: all 0.3s var(--ease-out); }
        .header__back:hover { box-shadow: 0 0 10px var(--neon-secondary); }
        .l-main { display: grid; grid-template-columns: 1fr 350px; gap: 1rem; padding: 1rem; max-width: 1600px; margin: 0 auto; }
        @media (max-width: 900px) { .l-main { grid-template-columns: 1fr; } }
        .canvas-container { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1rem; backdrop-filter: blur(10px); }
        #listCanvas { width: 100%; height: 400px; display: block; }
        .controls { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1.5rem; backdrop-filter: blur(10px); }
        .controls__section { margin-bottom: 1.5rem; }
        .controls__title { color: var(--neon-secondary); font-size: 1.1rem; margin-bottom: 1rem; text-shadow: 0 0 5px var(--neon-secondary); }
        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .input-group input { flex: 1; padding: 0.8rem; background: rgba(0,0,0,0.3); border: var(--border-neon); border-radius: 8px; color: #fff; font-size: 1rem; caret-color: var(--neon-primary); }
        .input-group input:focus { outline: none; box-shadow: 0 0 10px var(--neon-primary); }
        .btn { padding: 0.8rem 1.5rem; background: rgba(0,243,255,0.1); border: var(--border-neon); border-radius: 8px; color: var(--neon-primary); cursor: pointer; font-size: 1rem; transition: all 0.3s var(--ease-out); }
        .btn:hover { background: rgba(0,243,255,0.2); box-shadow: 0 0 15px var(--neon-primary); }
        .info-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 1rem; margin-top: 1rem; }
        .info-box p { margin-bottom: 0.5rem; font-size: 0.9rem; }
        .info-box span { color: var(--neon-primary); }
        .log-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 1rem; max-height: 100px; overflow-y: auto; font-size: 0.85rem; font-family: monospace; }
        .log-entry { margin-bottom: 0.5rem; padding: 0.3rem; border-left: 2px solid var(--neon-secondary); padding-left: 0.5rem; }
    </style>
</head>
<body>
    <header class="l-header">
        <h1 class="header__title">Skip List</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="listCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Insert Value</h3>
                <div class="input-group">
                    <input type="number" id="insertInput" placeholder="Value" min="1" max="999">
                    <button class="btn" onclick="insertValue()">Insert</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Search Value</h3>
                <div class="input-group">
                    <input type="number" id="searchInput" placeholder="Value" min="1" max="999">
                    <button class="btn" onclick="searchValue()">Search</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Elements: <span id="elemCount">0</span></p>
                    <p>Max Level: <span id="maxLevel">0</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearList()" style="width: 100%; margin-bottom: 0.5rem;">Clear</button>
                <button class="btn" onclick="randomInserts()" style="width: 100%;">Random Inserts</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('listCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { const container = canvas.parentElement; canvas.width = container.clientWidth; canvas.height = 400; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const MAX_LEVEL = 5;
        class SkipNode {
            constructor(value, level) {
                this.value = value;
                this.forward = new Array(level + 1).fill(null);
            }
        }
        class SkipList {
            constructor() {
                this.level = 0;
                this.header = new SkipNode(-Infinity, MAX_LEVEL);
                this.count = 0;
            }
            randomLevel() {
                let lvl = 0;
                while (Math.random() < 0.5 && lvl < MAX_LEVEL) lvl++;
                return lvl;
            }
            insert(value) {
                const update = new Array(MAX_LEVEL + 1).fill(null);
                let current = this.header;
                for (let i = this.level; i >= 0; i--) {
                    while (current.forward[i] && current.forward[i].value < value) {
                        current = current.forward[i];
                    }
                    update[i] = current;
                }
                if (current.forward[0] && current.forward[0].value === value) {
                    log(`Value ${value} already exists`);
                    return;
                }
                const newLevel = this.randomLevel();
                log(`Inserting ${value} at level ${newLevel}`);
                if (newLevel > this.level) {
                    for (let i = this.level + 1; i <= newLevel; i++) update[i] = this.header;
                    this.level = newLevel;
                }
                const newNode = new SkipNode(value, newLevel);
                for (let i = 0; i <= newLevel; i++) {
                    newNode.forward[i] = update[i].forward[i];
                    update[i].forward[i] = newNode;
                }
                this.count++;
            }
            search(value) {
                let current = this.header;
                const path = [];
                for (let i = this.level; i >= 0; i--) {
                    while (current.forward[i] && current.forward[i].value < value) {
                        current = current.forward[i];
                        path.push({ level: i, value: current.value });
                    }
                }
                current = current.forward[0];
                if (current && current.value === value) {
                    log(`Found ${value}`);
                    return { found: true, path };
                }
                log(`Value ${value} not found`);
                return { found: false, path };
            }
            getNodes() {
                const nodes = [];
                const levels = [];
                for (let lvl = 0; lvl <= this.level; lvl++) {
                    const levelNodes = [];
                    let curr = this.header.forward[lvl];
                    while (curr) {
                        levelNodes.push(curr.value);
                        curr = curr.forward[lvl];
                    }
                    levels[lvl] = levelNodes;
                }
                return { levels, count: this.count, maxLevel: this.level };
            }
        }
        const skipList = new SkipList();
        let searchPath = [];
        function drawList() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const { levels, count, maxLevel } = skipList.getNodes();
            const nodeWidth = 60;
            const levelHeight = 50;
            const allValues = new Set();
            levels.forEach(lvl => lvl.forEach(v => allValues.add(v)));
            const values = [-Infinity, ...Array.from(allValues).sort((a,b) => a-b)];
            const spacing = (canvas.width - 100) / Math.max(values.length - 1, 1);
            const valueIndex = new Map();
            values.forEach((v, i) => valueIndex.set(v, i));
            levels.forEach((levelNodes, lvl) => {
                const y = 50 + (maxLevel - lvl) * levelHeight;
                let prevX = 30;
                ctx.beginPath();
                ctx.moveTo(30, y);
                ctx.lineTo(canvas.width - 30, y);
                ctx.strokeStyle = 'rgba(0, 243, 255, 0.2)';
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                levelNodes.forEach((val, i) => {
                    const x = valueIndex.has(val) ? valueIndex.get(val) * spacing + 30 : prevX + spacing;
                    const isOnPath = searchPath.some(p => p.value === val && p.level === lvl);
                    ctx.beginPath();
                    ctx.moveTo(prevX, y);
                    ctx.lineTo(x, y);
                    ctx.strokeStyle = isOnPath ? 'rgba(255, 255, 0, 0.8)' : `rgba(0, 243, 255, ${0.3 + lvl * 0.15})`;
                    ctx.lineWidth = isOnPath ? 3 : 2;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(x, y, 18, 0, Math.PI * 2);
                    ctx.fillStyle = isOnPath ? 'rgba(255, 255, 0, 0.3)' : 'rgba(0, 243, 255, 0.2)';
                    ctx.fill();
                    ctx.strokeStyle = isOnPath ? '#ffff00' : '#00f3ff';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = isOnPath ? '#ffff00' : '#00f3ff';
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = val === -Infinity || val === Infinity ? '10px system-ui' : 'bold 12px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(val === -Infinity ? '-∞' : val, x, y);
                    prevX = x;
                });
            });
            updateInfo();
        }
        function updateInfo() {
            const { count, maxLevel } = skipList.getNodes();
            document.getElementById('elemCount').textContent = count;
            document.getElementById('maxLevel').textContent = maxLevel + 1;
        }
        function log(msg) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 10) logBox.removeChild(logBox.lastChild);
        }
        function insertValue() {
            const input = document.getElementById('insertInput');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                skipList.insert(value);
                input.value = '';
                searchPath = [];
                drawList();
            }
        }
        function searchValue() {
            const input = document.getElementById('searchInput');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                const result = skipList.search(value);
                searchPath = result.path;
                drawList();
            }
        }
        function clearList() {
            skipList.level = 0;
            skipList.header = new SkipNode(-Infinity, MAX_LEVEL);
            skipList.count = 0;
            searchPath = [];
            document.getElementById('logBox').innerHTML = '';
            log('List cleared');
            drawList();
        }
        function randomInserts() {
            clearList();
            for (let i = 0; i < 10; i++) {
                skipList.insert(Math.floor(Math.random() * 100) + 1);
            }
            log('Inserted 10 random values');
            drawList();
        }
        drawList();
    </script>
</body>
</html>
