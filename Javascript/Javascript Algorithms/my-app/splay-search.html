<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splay Tree - Search</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        #treeCanvas {
            width: 100%;
            height: 500px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .log-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            border-left: 2px solid var(--neon-secondary);
            padding-left: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">Splay Tree - Search</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container">
            <canvas id="treeCanvas"></canvas>
        </div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Search Node</h3>
                <div class="input-group">
                    <input type="number" id="searchInput" placeholder="Value" min="1" max="999">
                    <button class="btn" onclick="searchNode()">Search</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Tree Info</h3>
                <div class="info-box">
                    <p>Nodes: <span id="nodeCount">0</span></p>
                    <p>Root: <span id="rootValue">-</span></p>
                    <p>Last Search: <span id="lastSearch">-</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearTree()" style="width: 100%; margin-bottom: 0.5rem;">Clear Tree</button>
                <button class="btn" onclick="generateRandom()" style="width: 100%;">Random Tree</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Operation Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        let highlightedNode = null;

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class SplayNode {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }
        class SplayTree {
            constructor() {
                this.root = null;
            }
            rotateRight(y) {
                const x = y.left;
                y.left = x.right;
                x.right = y;
                return x;
            }
            rotateLeft(x) {
                const y = x.right;
                x.right = y.left;
                y.left = x;
                return y;
            }
            splay(node, value) {
                if (!node || node.value === value) {
                    highlightedNode = node;
                    return node;
                }
                if (value < node.value) {
                    if (!node.left) {
                        highlightedNode = node;
                        return node;
                    }
                    if (value < node.left.value) {
                        node.left.left = this.splay(node.left.left, value);
                        node = this.rotateRight(node);
                    } else if (value > node.left.value) {
                        node.left.right = this.splay(node.left.right, value);
                        if (node.left.right) node.left = this.rotateLeft(node.left);
                    }
                    return node.left ? this.rotateRight(node) : node;
                } else {
                    if (!node.right) {
                        highlightedNode = node;
                        return node;
                    }
                    if (value > node.right.value) {
                        node.right.right = this.splay(node.right.right, value);
                        node = this.rotateLeft(node);
                    } else if (value < node.right.value) {
                        node.right.left = this.splay(node.right.left, value);
                        if (node.right.left) node.right = this.rotateRight(node.right);
                    }
                    return node.right ? this.rotateLeft(node) : node;
                }
            }
            search(value) {
                log(`Searching for ${value}...`);
                if (!this.root) {
                    log(`  Tree is empty`);
                    highlightedNode = null;
                    return null;
                }
                this.root = this.splay(this.root, value);
                if (this.root.value === value) {
                    log(`  Found ${value}! Splayed to root.`);
                    highlightedNode = this.root;
                    return this.root;
                } else {
                    log(`  ${value} not found. Last accessed splayed.`);
                    return null;
                }
            }
            insert(value) {
                if (!this.root) {
                    this.root = new SplayNode(value);
                    return;
                }
                this.root = this.splay(this.root, value);
                if (this.root.value === value) return;
                const node = new SplayNode(value);
                if (value < this.root.value) {
                    node.left = this.root.left;
                    node.right = this.root;
                    this.root.left = null;
                } else {
                    node.right = this.root.right;
                    node.left = this.root;
                    this.root.right = null;
                }
                this.root = node;
            }
            getNodeCount() {
                return this.countRec(this.root);
            }
            countRec(node) {
                if (!node) return 0;
                return 1 + this.countRec(node.left) + this.countRec(node.right);
            }
        }
        const tree = new SplayTree();

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (tree.root) {
                drawNode(tree.root, canvas.width / 2, 50, canvas.width / 4);
            }
            updateInfo();
        }

        function drawNode(node, x, y, offset) {
            if (!node) return;
            if (node.left) {
                ctx.beginPath();
                ctx.moveTo(x, y + 20);
                ctx.lineTo(x - offset, y + 70);
                ctx.strokeStyle = 'rgba(0,243,255,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                drawNode(node.left, x - offset, y + 70, offset / 2);
            }
            if (node.right) {
                ctx.beginPath();
                ctx.moveTo(x, y + 20);
                ctx.lineTo(x + offset, y + 70);
                ctx.strokeStyle = 'rgba(0,243,255,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                drawNode(node.right, x + offset, y + 70, offset / 2);
            }
            const isRoot = node === tree.root;
            const isHighlighted = node === highlightedNode;
            ctx.beginPath();
            ctx.arc(x, y, isRoot ? 25 : 20, 0, Math.PI * 2);
            if (isHighlighted) {
                ctx.fillStyle = 'rgba(255,255,0,0.4)';
                ctx.strokeStyle = '#ffff00';
                ctx.shadowColor = '#ffff00';
            } else if (isRoot) {
                ctx.fillStyle = 'rgba(255,0,255,0.3)';
                ctx.strokeStyle = '#ff00ff';
                ctx.shadowColor = '#ff00ff';
            } else {
                ctx.fillStyle = 'rgba(0,243,255,0.3)';
                ctx.strokeStyle = '#00f3ff';
                ctx.shadowColor = '#00f3ff';
            }
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.value, x, y);
            if (isRoot) {
                ctx.fillStyle = '#ff00ff';
                ctx.font = '10px system-ui';
                ctx.fillText('ROOT', x, y + 40);
            }
        }

        function updateInfo() {
            document.getElementById('nodeCount').textContent = tree.getNodeCount();
            document.getElementById('rootValue').textContent = tree.root ? tree.root.value : '-';
            document.getElementById('lastSearch').textContent = highlightedNode ? highlightedNode.value : '-';
        }

        function log(msg) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 15) logBox.removeChild(logBox.lastChild);
        }

        function searchNode() {
            const input = document.getElementById('searchInput');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                tree.search(value);
                input.value = '';
                drawTree();
            }
        }

        function clearTree() {
            tree.root = null;
            highlightedNode = null;
            document.getElementById('logBox').innerHTML = '';
            log('Tree cleared');
            drawTree();
        }

        function generateRandom() {
            clearTree();
            for (let i = 0; i < 7; i++) {
                tree.insert(Math.floor(Math.random() * 100) + 1);
            }
            log('Generated random tree');
            drawTree();
        }
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchNode();
        });
        generateRandom();
        drawTree();
    </script>
</body>

</html>
