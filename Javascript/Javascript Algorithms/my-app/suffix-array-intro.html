<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suffix Array - Introduction</title>
    <style>
        :root { --neon-primary: #00f3ff; --neon-secondary: #ff00ff; --bg-dark: #050505; --bg-card: rgba(255,255,255,0.05); --border-neon: 1px solid rgba(0,243,255,0.3); --ease-out: cubic-bezier(0.16,1,0.3,1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg-dark); color: #fff; min-height: 100vh; }
        .l-header { position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: var(--border-neon); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header__title { font-size: 1.5rem; color: var(--neon-primary); text-shadow: 0 0 5px var(--neon-primary); }
        .header__back { color: var(--neon-secondary); text-decoration: none; padding: 0.5rem 1rem; border: var(--border-neon); border-radius: 8px; transition: all 0.3s var(--ease-out); }
        .header__back:hover { box-shadow: 0 0 10px var(--neon-secondary); }
        .l-main { padding: 1rem; max-width: 1200px; margin: 0 auto; }
        .input-section { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; backdrop-filter: blur(10px); }
        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .input-group input { flex: 1; padding: 0.8rem; background: rgba(0,0,0,0.3); border: var(--border-neon); border-radius: 8px; color: #fff; font-size: 1rem; caret-color: var(--neon-primary); }
        .input-group input:focus { outline: none; box-shadow: 0 0 10px var(--neon-primary); }
        .btn { padding: 0.8rem 1.5rem; background: rgba(0,243,255,0.1); border: var(--border-neon); border-radius: 8px; color: var(--neon-primary); cursor: pointer; font-size: 1rem; transition: all 0.3s var(--ease-out); }
        .btn:hover { background: rgba(0,243,255,0.2); box-shadow: 0 0 15px var(--neon-primary); }
        .table-container { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1.5rem; backdrop-filter: blur(10px); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.8rem; text-align: left; border-bottom: 1px solid rgba(0,243,255,0.2); }
        th { color: var(--neon-secondary); text-shadow: 0 0 5px var(--neon-secondary); }
        td { font-family: monospace; }
        tr:hover td { background: rgba(0,243,255,0.1); }
        .rank-cell { color: var(--neon-primary); font-weight: bold; }
        .suffix-cell { color: #fff; }
        .lcp-cell { color: var(--neon-secondary); }
        h3 { color: var(--neon-secondary); margin-bottom: 1rem; text-shadow: 0 0 5px var(--neon-secondary); }
        p { color: rgba(255,255,255,0.7); margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header class="l-header">
        <h1 class="header__title">Suffix Array - Introduction</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <section class="input-section">
            <h3>Build Suffix Array</h3>
            <p>Enter a string to build its suffix array. The suffix array contains starting indices of all suffixes sorted lexicographically.</p>
            <div class="input-group">
                <input type="text" id="stringInput" placeholder="Enter string (e.g., banana)" value="banana">
                <button class="btn" onclick="buildSuffixArray()">Build</button>
            </div>
        </section>
        <section class="table-container">
            <h3>Suffix Array</h3>
            <table>
                <thead>
                    <tr>
                        <th>i</th>
                        <th>SA[i]</th>
                        <th>Suffix</th>
                        <th>LCP</th>
                    </tr>
                </thead>
                <tbody id="suffixTable"></tbody>
            </table>
        </section>
    </main>
    <script>
        function buildSuffixArray() {
            const text = document.getElementById('stringInput').value;
            if (!text) return;
            const suffixes = [];
            for (let i = 0; i < text.length; i++) {
                suffixes.push({ index: i, suffix: text.substring(i) });
            }
            suffixes.sort((a, b) => a.suffix.localeCompare(b.suffix));
            const sa = suffixes.map(s => s.index);
            const lcp = computeLCP(text, sa);
            renderTable(suffixes, lcp);
        }
        function computeLCP(text, sa) {
            const n = text.length;
            const rank = new Array(n);
            for (let i = 0; i < n; i++) rank[sa[i]] = i;
            const lcp = new Array(n).fill(0);
            let k = 0;
            for (let i = 0; i < n; i++) {
                if (rank[i] === n - 1) { k = 0; continue; }
                const j = sa[rank[i] + 1];
                while (i + k < n && j + k < n && text[i + k] === text[j + k]) k++;
                lcp[rank[i]] = k;
                if (k > 0) k--;
            }
            return lcp;
        }
        function renderTable(suffixes, lcp) {
            const tbody = document.getElementById('suffixTable');
            tbody.innerHTML = suffixes.map((s, i) => `
                <tr>
                    <td class="rank-cell">${i}</td>
                    <td class="rank-cell">${s.index}</td>
                    <td class="suffix-cell">${s.suffix}</td>
                    <td class="lcp-cell">${lcp[i]}</td>
                </tr>
            `).join('');
        }
        buildSuffixArray();
    </script>
</body>
</html>
