<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suffix Tree - Introduction</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            overflow: auto;
        }

        #treeCanvas {
            width: 100%;
            height: 500px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">Suffix Tree - Introduction</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Build Tree</h3>
                <div class="input-group">
                    <input type="text" id="stringInput" placeholder="String" value="abcab">
                    <button class="btn" onclick="buildTree()">Build</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Search Pattern</h3>
                <div class="input-group">
                    <input type="text" id="patternInput" placeholder="Pattern" maxlength="5">
                    <button class="btn" onclick="searchPattern()">Search</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>String: <span id="textDisplay">abcab$</span></p>
                    <p>Nodes: <span id="nodeCount">0</span></p>
                    <p>Search Result: <span id="searchResult">-</span></p>
                </div>
            </div>
            <div class="controls__section">
                <p>A suffix tree is a compressed trie of all suffixes of a string. It enables efficient string operations like pattern matching in O(m) time.</p>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.max(container.clientWidth, 800);
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class SuffixTreeNode {
            constructor() {
                this.children = {};
                this.start = 0;
                this.end = -1;
                this.suffixLink = null;
            }
        }
        class SuffixTree {
            constructor(text) {
                this.text = text + '$';
                this.root = new SuffixTreeNode();
                this.build();
            }
            build() {
                const n = this.text.length;
                for (let i = 0; i < n; i++) {
                    this.insertSuffix(i);
                }
            }
            insertSuffix(start) {
                let node = this.root;
                for (let i = start; i < this.text.length; i++) {
                    const char = this.text[i];
                    if (!node.children[char]) {
                        node.children[char] = new SuffixTreeNode();
                        node.children[char].start = i;
                        node.children[char].end = this.text.length;
                    }
                    node = node.children[char];
                }
            }
            search(pattern) {
                let node = this.root;
                let i = 0;
                while (i < pattern.length) {
                    const char = pattern[i];
                    if (!node.children[char]) return false;
                    node = node.children[char];
                    i++;
                }
                return true;
            }
            countNodes() {
                return this.countRec(this.root);
            }
            countRec(node) {
                let count = 1;
                for (const key in node.children) count += this.countRec(node.children[key]);
                return count;
            }
        }
        let tree = null;
        let highlightedPath = [];

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!tree) return;
            const nodes = [];
            collectNodes(tree.root, '', nodes, 0, null);
            const levels = {};
            nodes.forEach(n => {
                if (!levels[n.depth]) levels[n.depth] = [];
                levels[n.depth].push(n);
            });
            const levelHeight = 80;
            Object.keys(levels).sort((a, b) => a - b).forEach((depth) => {
                const levelNodes = levels[depth];
                const spacing = canvas.width / (levelNodes.length + 1);
                levelNodes.forEach((node, i) => {
                    const x = (i + 1) * spacing;
                    const y = 50 + depth * levelHeight;
                    node.x = x;
                    node.y = y;
                    if (node.parent) {
                        ctx.beginPath();
                        ctx.moveTo(node.parent.x, node.parent.y + 15);
                        ctx.lineTo(x, y - 15);
                        const isHighlighted = highlightedPath.some(h => h.x === node.x && h.y === node.y);
                        ctx.strokeStyle = isHighlighted ? 'rgba(255, 255, 0, 0.8)' : 'rgba(0, 243, 255, 0.5)';
                        ctx.lineWidth = isHighlighted ? 3 : 2;
                        ctx.stroke();
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, 20, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 243, 255, 0.2)';
                    ctx.fill();
                    ctx.strokeStyle = '#00f3ff';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = '#00f3ff';
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 11px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const label = tree.text.substring(node.start, Math.min(node.start + 3, node.end));
                    ctx.fillText(node.start === 0 ? 'root' : label, x, y);
                });
            });
        }

        function collectNodes(node, edgeLabel, arr, depth, parent) {
            arr.push({
                start: node.start,
                end: node.end,
                depth,
                parent,
                label: edgeLabel
            });
            for (const key in node.children) {
                collectNodes(node.children[key], key, arr, depth + 1, arr[arr.length - 1]);
            }
        }

        function buildTree() {
            const text = document.getElementById('stringInput').value;
            if (text) {
                tree = new SuffixTree(text);
                highlightedPath = [];
                document.getElementById('textDisplay').textContent = tree.text;
                document.getElementById('nodeCount').textContent = tree.countNodes();
                drawTree();
            }
        }

        function searchPattern() {
            if (!tree) return;
            const pattern = document.getElementById('patternInput').value;
            const found = tree.search(pattern);
            document.getElementById('searchResult').textContent = found ? `Found "${pattern}"` : `Not found`;
            document.getElementById('searchResult').style.color = found ? '#00f3ff' : '#ff00ff';
        }
        buildTree();
    </script>
</body>

</html>
