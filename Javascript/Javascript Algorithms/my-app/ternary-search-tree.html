<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ternary Search Tree</title>
    <style>
        :root { --neon-primary: #00f3ff; --neon-secondary: #ff00ff; --bg-dark: #050505; --bg-card: rgba(255,255,255,0.05); --border-neon: 1px solid rgba(0,243,255,0.3); --ease-out: cubic-bezier(0.16,1,0.3,1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg-dark); color: #fff; min-height: 100vh; }
        .l-header { position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: var(--border-neon); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header__title { font-size: 1.5rem; color: var(--neon-primary); text-shadow: 0 0 5px var(--neon-primary); }
        .header__back { color: var(--neon-secondary); text-decoration: none; padding: 0.5rem 1rem; border: var(--border-neon); border-radius: 8px; transition: all 0.3s var(--ease-out); }
        .header__back:hover { box-shadow: 0 0 10px var(--neon-secondary); }
        .l-main { display: grid; grid-template-columns: 1fr 350px; gap: 1rem; padding: 1rem; max-width: 1600px; margin: 0 auto; }
        @media (max-width: 900px) { .l-main { grid-template-columns: 1fr; } }
        .canvas-container { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1rem; backdrop-filter: blur(10px); overflow: auto; }
        #treeCanvas { width: 100%; height: 500px; display: block; }
        .controls { background: var(--bg-card); border: var(--border-neon); border-radius: 12px; padding: 1.5rem; backdrop-filter: blur(10px); }
        .controls__section { margin-bottom: 1.5rem; }
        .controls__title { color: var(--neon-secondary); font-size: 1.1rem; margin-bottom: 1rem; text-shadow: 0 0 5px var(--neon-secondary); }
        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .input-group input { flex: 1; padding: 0.8rem; background: rgba(0,0,0,0.3); border: var(--border-neon); border-radius: 8px; color: #fff; font-size: 1rem; caret-color: var(--neon-primary); text-transform: uppercase; }
        .input-group input:focus { outline: none; box-shadow: 0 0 10px var(--neon-primary); }
        .btn { padding: 0.8rem 1.5rem; background: rgba(0,243,255,0.1); border: var(--border-neon); border-radius: 8px; color: var(--neon-primary); cursor: pointer; font-size: 1rem; transition: all 0.3s var(--ease-out); }
        .btn:hover { background: rgba(0,243,255,0.2); box-shadow: 0 0 15px var(--neon-primary); }
        .info-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 1rem; margin-top: 1rem; }
        .info-box p { margin-bottom: 0.5rem; font-size: 0.9rem; }
        .info-box span { color: var(--neon-primary); }
    </style>
</head>
<body>
    <header class="l-header">
        <h1 class="header__title">Ternary Search Tree</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Insert Word</h3>
                <div class="input-group">
                    <input type="text" id="wordInput" placeholder="Word" maxlength="8">
                    <button class="btn" onclick="insertWord()">Insert</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Search Word</h3>
                <div class="input-group">
                    <input type="text" id="searchInput" placeholder="Word" maxlength="8">
                    <button class="btn" onclick="searchWord()">Search</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Nodes: <span id="nodeCount">0</span></p>
                    <p>Words: <span id="wordCount">0</span></p>
                    <p>Search Result: <span id="searchResult">-</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearTree()" style="width: 100%; margin-bottom: 0.5rem;">Clear</button>
                <button class="btn" onclick="addSample()" style="width: 100%;">Add Sample Words</button>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { const container = canvas.parentElement; canvas.width = Math.max(container.clientWidth, 800); canvas.height = 500; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class TSTNode {
            constructor(char) {
                this.char = char;
                this.left = null;
                this.middle = null;
                this.right = null;
                this.isEnd = false;
            }
        }
        class TST {
            constructor() { this.root = null; this.nodeCount = 0; this.wordCount = 0; }
            insert(word) {
                this.root = this.insertRec(this.root, word, 0);
            }
            insertRec(node, word, index) {
                const char = word[index].toUpperCase();
                if (!node) { node = new TSTNode(char); this.nodeCount++; }
                if (char < node.char) node.left = this.insertRec(node.left, word, index);
                else if (char > node.char) node.right = this.insertRec(node.right, word, index);
                else if (index < word.length - 1) node.middle = this.insertRec(node.middle, word, index + 1);
                else {
                    if (!node.isEnd) { node.isEnd = true; this.wordCount++; }
                }
                return node;
            }
            search(word) { return this.searchRec(this.root, word, 0); }
            searchRec(node, word, index) {
                if (!node) return false;
                const char = word[index].toUpperCase();
                if (char < node.char) return this.searchRec(node.left, word, index);
                if (char > node.char) return this.searchRec(node.right, word, index);
                if (index < word.length - 1) return this.searchRec(node.middle, word, index + 1);
                return node.isEnd;
            }
            collectNodes(node, arr, x, y, depth) {
                if (!node) return;
                node.x = x; node.y = y;
                arr.push({ ...node, depth });
                if (node.left) this.collectNodes(node.left, arr, x - 50 * (3 - Math.min(depth, 2)), y + 60, depth + 1);
                if (node.middle) this.collectNodes(node.middle, arr, x, y + 60, depth + 1);
                if (node.right) this.collectNodes(node.right, arr, x + 50 * (3 - Math.min(depth, 2)), y + 60, depth + 1);
            }
        }
        const tst = new TST();
        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const nodes = [];
            tst.collectNodes(tst.root, nodes, canvas.width / 2, 50, 0);
            nodes.forEach(node => {
                if (node.left) {
                    ctx.beginPath(); ctx.moveTo(node.x, node.y + 15); ctx.lineTo(node.left.x, node.left.y - 15);
                    ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)'; ctx.lineWidth = 2; ctx.stroke();
                }
                if (node.middle) {
                    ctx.beginPath(); ctx.moveTo(node.x, node.y + 15); ctx.lineTo(node.middle.x, node.middle.y - 15);
                    ctx.strokeStyle = 'rgba(255, 0, 255, 0.5)'; ctx.lineWidth = 2; ctx.setLineDash([5, 3]); ctx.stroke(); ctx.setLineDash([]);
                }
                if (node.right) {
                    ctx.beginPath(); ctx.moveTo(node.x, node.y + 15); ctx.lineTo(node.right.x, node.right.y - 15);
                    ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)'; ctx.lineWidth = 2; ctx.stroke();
                }
            });
            nodes.forEach(node => {
                ctx.beginPath(); ctx.arc(node.x, node.y, 18, 0, Math.PI * 2);
                ctx.fillStyle = node.isEnd ? 'rgba(255, 0, 255, 0.3)' : 'rgba(0, 243, 255, 0.2)'; ctx.fill();
                ctx.strokeStyle = node.isEnd ? '#ff00ff' : '#00f3ff'; ctx.lineWidth = 2;
                ctx.shadowColor = node.isEnd ? '#ff00ff' : '#00f3ff'; ctx.shadowBlur = 10; ctx.stroke(); ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff'; ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(node.char, node.x, node.y);
            });
            updateInfo();
        }
        function updateInfo() {
            document.getElementById('nodeCount').textContent = tst.nodeCount;
            document.getElementById('wordCount').textContent = tst.wordCount;
        }
        function insertWord() {
            const input = document.getElementById('wordInput');
            const word = input.value.trim().toUpperCase();
            if (word && /^[A-Z]+$/.test(word)) { tst.insert(word); input.value = ''; drawTree(); }
        }
        function searchWord() {
            const input = document.getElementById('searchInput');
            const word = input.value.trim().toUpperCase();
            if (word && /^[A-Z]+$/.test(word)) {
                const found = tst.search(word);
                document.getElementById('searchResult').textContent = found ? 'Found!' : 'Not found';
                document.getElementById('searchResult').style.color = found ? '#00f3ff' : '#ff00ff';
            }
        }
        function clearTree() { tst.root = null; tst.nodeCount = 0; tst.wordCount = 0; document.getElementById('searchResult').textContent = '-'; drawTree(); }
        function addSample() { clearTree(); ['CAT', 'CAR', 'CARD', 'DOG', 'DOES'].forEach(w => tst.insert(w)); drawTree(); }
        drawTree();
    </script>
</body>
</html>
