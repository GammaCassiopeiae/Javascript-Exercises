<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trie - Insert & Search</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            overflow: auto;
        }

        #treeCanvas {
            width: 100%;
            height: 500px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
            text-transform: uppercase;
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }

        .log-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            border-left: 2px solid var(--neon-secondary);
            padding-left: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">Trie - Insert & Search</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="treeCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Insert Word</h3>
                <div class="input-group">
                    <input type="text" id="wordInput" placeholder="Word" maxlength="8" pattern="[a-zA-Z]+">
                    <button class="btn" onclick="insertWord()">Insert</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Search Word</h3>
                <div class="input-group">
                    <input type="text" id="searchInput" placeholder="Word" maxlength="8" pattern="[a-zA-Z]+">
                    <button class="btn" onclick="searchWord()">Search</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Nodes: <span id="nodeCount">1</span></p>
                    <p>Words: <span id="wordCount">0</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearTrie()" style="width: 100%; margin-bottom: 0.5rem;">Clear Trie</button>
                <button class="btn" onclick="addSample()" style="width: 100%;">Add Sample Words</button>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Operation Log</h3>
                <div class="log-box" id="logBox"></div>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        let searchPath = [];

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.max(container.clientWidth, 800);
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        class TrieNode {
            constructor() {
                this.children = {};
                this.isEnd = false;
            }
        }
        class Trie {
            constructor() {
                this.root = new TrieNode();
                this.wordCount = 0;
            }
            insert(word) {
                log(`Inserting "${word}"...`);
                let node = this.root;
                for (const char of word.toUpperCase()) {
                    if (!node.children[char]) {
                        node.children[char] = new TrieNode();
                        log(`  Created node for '${char}'`);
                    }
                    node = node.children[char];
                }
                if (!node.isEnd) {
                    node.isEnd = true;
                    this.wordCount++;
                    log(`  Marked end of word`);
                } else log(`  Word already exists`);
            }
            search(word) {
                log(`Searching "${word}"...`);
                searchPath = [];
                let node = this.root;
                searchPath.push('root');
                for (const char of word.toUpperCase()) {
                    if (!node.children[char]) {
                        log(`  Not found (missing '${char}')`);
                        searchPath = [];
                        return false;
                    }
                    node = node.children[char];
                    searchPath.push(char);
                }
                const found = node.isEnd;
                log(found ? `  Found!` : `  Not a complete word`);
                return found;
            }
            countNodes() {
                return this.countRec(this.root);
            }
            countRec(node) {
                let count = 1;
                for (const key in node.children) count += this.countRec(node.children[key]);
                return count;
            }
        }
        const trie = new Trie();

        function drawTrie() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const nodes = [];
            collectNodes(trie.root, '', nodes, 0);
            const levels = {};
            nodes.forEach(n => {
                if (!levels[n.depth]) levels[n.depth] = [];
                levels[n.depth].push(n);
            });
            const levelHeight = 70;
            Object.keys(levels).sort((a, b) => a - b).forEach((depth, di) => {
                const levelNodes = levels[depth];
                const spacing = canvas.width / (levelNodes.length + 1);
                levelNodes.forEach((node, i) => {
                    const x = (i + 1) * spacing;
                    const y = 50 + depth * levelHeight;
                    node.x = x;
                    node.y = y;
                    if (node.parent) {
                        ctx.beginPath();
                        ctx.moveTo(node.parent.x, node.parent.y + 15);
                        ctx.lineTo(x, y - 15);
                        const isSearchEdge = searchPath.includes(node.parent.char) && searchPath.includes(node.char);
                        ctx.strokeStyle = isSearchEdge ? 'rgba(255, 255, 0, 0.8)' : 'rgba(0, 243, 255, 0.5)';
                        ctx.lineWidth = isSearchEdge ? 3 : 2;
                        ctx.stroke();
                    }
                    const isSearchNode = searchPath.includes(node.char);
                    ctx.beginPath();
                    ctx.arc(x, y, 18, 0, Math.PI * 2);
                    ctx.fillStyle = node.isEnd ? (isSearchNode ? 'rgba(255, 255, 0, 0.4)' : 'rgba(255, 0, 255, 0.3)') : (isSearchNode ? 'rgba(255, 255, 0, 0.3)' : 'rgba(0, 243, 255, 0.3)');
                    ctx.fill();
                    ctx.strokeStyle = node.isEnd ? (isSearchNode ? '#ffff00' : '#ff00ff') : (isSearchNode ? '#ffff00' : '#00f3ff');
                    ctx.lineWidth = 2;
                    ctx.shadowColor = node.isEnd ? (isSearchNode ? '#ffff00' : '#ff00ff') : (isSearchNode ? '#ffff00' : '#00f3ff');
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.char || '●', x, y);
                });
            });
            updateInfo();
        }

        function collectNodes(node, char, arr, depth, parent = null) {
            arr.push({
                char,
                depth,
                isEnd: node.isEnd,
                parent
            });
            let i = 0;
            for (const key in node.children) {
                if (i < 8) collectNodes(node.children[key], key, arr, depth + 1, arr[arr.length - 1]);
                i++;
            }
        }

        function updateInfo() {
            document.getElementById('nodeCount').textContent = trie.countNodes();
            document.getElementById('wordCount').textContent = trie.wordCount;
        }

        function log(msg) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 15) logBox.removeChild(logBox.lastChild);
        }

        function insertWord() {
            const input = document.getElementById('wordInput');
            const word = input.value.trim();
            if (word && /^[a-zA-Z]+$/.test(word)) {
                trie.insert(word);
                input.value = '';
                searchPath = [];
                drawTrie();
            }
        }

        function searchWord() {
            const input = document.getElementById('searchInput');
            const word = input.value.trim();
            if (word && /^[a-zA-Z]+$/.test(word)) {
                trie.search(word);
                drawTrie();
            }
        }

        function clearTrie() {
            trie.root = new TrieNode();
            trie.wordCount = 0;
            searchPath = [];
            document.getElementById('logBox').innerHTML = '';
            log('Trie cleared');
            drawTrie();
        }

        function addSample() {
            clearTrie();
            ['CAT', 'CAR', 'CARD', 'DOG', 'DOES'].forEach(w => trie.insert(w));
            drawTrie();
        }
        drawTrie();
    </script>
</body>

</html>
