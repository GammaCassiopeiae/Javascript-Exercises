<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unrolled Linked List</title>
    <style>
        :root {
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00ff;
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.05);
            --border-neon: 1px solid rgba(0, 243, 255, 0.3);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
        }

        .l-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: var(--border-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__title {
            font-size: 1.5rem;
            color: var(--neon-primary);
            text-shadow: 0 0 5px var(--neon-primary);
        }

        .header__back {
            color: var(--neon-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: var(--border-neon);
            border-radius: 8px;
            transition: all 0.3s var(--ease-out);
        }

        .header__back:hover {
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .l-main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .l-main {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            overflow-x: auto;
        }

        #listCanvas {
            width: 100%;
            height: 350px;
            display: block;
        }

        .controls {
            background: var(--bg-card);
            border: var(--border-neon);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .controls__section {
            margin-bottom: 1.5rem;
        }

        .controls__title {
            color: var(--neon-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px var(--neon-secondary);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: var(--border-neon);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            caret-color: var(--neon-primary);
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-neon);
            border-radius: 8px;
            color: var(--neon-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s var(--ease-out);
        }

        .btn:hover {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-box span {
            color: var(--neon-primary);
        }
    </style>
</head>

<body>
    <header class="l-header">
        <h1 class="header__title">Unrolled Linked List</h1>
        <a href="index.html" class="header__back">← Back to Index</a>
    </header>
    <main class="l-main">
        <div class="canvas-container"><canvas id="listCanvas"></canvas></div>
        <aside class="controls">
            <div class="controls__section">
                <h3 class="controls__title">Insert Value</h3>
                <div class="input-group">
                    <input type="number" id="insertInput" placeholder="Value" min="1" max="999">
                    <button class="btn" onclick="insertValue()">Insert</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Search Value</h3>
                <div class="input-group">
                    <input type="number" id="searchInput" placeholder="Value" min="1" max="999">
                    <button class="btn" onclick="searchValue()">Search</button>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Info</h3>
                <div class="info-box">
                    <p>Nodes: <span id="nodeCount">0</span></p>
                    <p>Elements: <span id="elemCount">0</span></p>
                    <p>Capacity/Node: <span id="capacity">4</span></p>
                    <p>Search Result: <span id="searchResult">-</span></p>
                </div>
            </div>
            <div class="controls__section">
                <h3 class="controls__title">Actions</h3>
                <button class="btn" onclick="clearList()" style="width: 100%; margin-bottom: 0.5rem;">Clear</button>
                <button class="btn" onclick="randomInserts()" style="width: 100%;">Random Inserts</button>
            </div>
        </aside>
    </main>
    <script>
        const canvas = document.getElementById('listCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.max(container.clientWidth, 800);
            canvas.height = 350;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const NODE_CAPACITY = 4;
        class UnrolledNode {
            constructor(capacity) {
                this.elements = new Array(capacity).fill(null);
                this.count = 0;
                this.next = null;
            }
        }
        class UnrolledList {
            constructor(capacity) {
                this.capacity = capacity;
                this.head = null;
                this.tail = null;
                this.elemCount = 0;
            }
            insert(value) {
                if (!this.tail || this.tail.count === this.capacity) {
                    const newNode = new UnrolledNode(this.capacity);
                    if (!this.head) this.head = newNode;
                    if (this.tail) this.tail.next = newNode;
                    this.tail = newNode;
                }
                this.tail.elements[this.tail.count++] = value;
                this.elemCount++;
            }
            search(value) {
                let nodeIdx = 0,
                    elemIdx = 0;
                let curr = this.head;
                while (curr) {
                    for (let i = 0; i < curr.count; i++) {
                        if (curr.elements[i] === value) return {
                            found: true,
                            node: nodeIdx,
                            elem: i
                        };
                        elemIdx++;
                    }
                    curr = curr.next;
                    nodeIdx++;
                }
                return {
                    found: false
                };
            }
            getNodes() {
                const nodes = [];
                let curr = this.head;
                while (curr) {
                    nodes.push({
                        elements: curr.elements.slice(0, curr.count),
                        count: curr.count
                    });
                    curr = curr.next;
                }
                return nodes;
            }
        }
        const list = new UnrolledList(NODE_CAPACITY);
        let highlightedPos = null;

        function drawList() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const nodes = list.getNodes();
            const nodeWidth = 200;
            const elemHeight = 35;
            const gap = 30;
            let x = 20;
            nodes.forEach((node, nodeIdx) => {
                const nodeHeight = node.count * elemHeight + 20;
                ctx.beginPath();
                ctx.roundRect(x, 10, nodeWidth, nodeHeight, 8);
                ctx.fillStyle = 'rgba(0, 243, 255, 0.1)';
                ctx.fill();
                ctx.strokeStyle = '#00f3ff';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#00f3ff';
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ff00ff';
                ctx.font = 'bold 12px system-ui';
                ctx.textAlign = 'left';
                ctx.fillText(`Node ${nodeIdx}`, x + 10, 28);
                node.elements.forEach((elem, elemIdx) => {
                    const y = 40 + elemIdx * elemHeight;
                    const isHighlighted = highlightedPos && highlightedPos.node === nodeIdx && highlightedPos.elem === elemIdx;
                    ctx.beginPath();
                    ctx.roundRect(x + 10, y, nodeWidth - 20, elemHeight - 5, 4);
                    ctx.fillStyle = isHighlighted ? 'rgba(255, 255, 0, 0.3)' : 'rgba(0, 0, 0, 0.3)';
                    ctx.fill();
                    ctx.strokeStyle = isHighlighted ? '#ffff00' : 'rgba(0, 243, 255, 0.3)';
                    ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(elem, x + nodeWidth / 2, y + elemHeight / 2);
                });
                if (nodeIdx < nodes.length - 1) {
                    ctx.beginPath();
                    ctx.moveTo(x + nodeWidth, 10 + nodeHeight / 2);
                    ctx.lineTo(x + nodeWidth + gap, 10 + nodeHeight / 2);
                    ctx.strokeStyle = 'rgba(0, 243, 255, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + nodeWidth + gap - 8, 10 + nodeHeight / 2 - 6);
                    ctx.lineTo(x + nodeWidth + gap, 10 + nodeHeight / 2);
                    ctx.lineTo(x + nodeWidth + gap - 8, 10 + nodeHeight / 2 + 6);
                    ctx.stroke();
                }
                x += nodeWidth + gap;
            });
            updateInfo();
        }

        function updateInfo() {
            const nodes = list.getNodes();
            document.getElementById('nodeCount').textContent = nodes.length;
            document.getElementById('elemCount').textContent = list.elemCount;
            document.getElementById('capacity').textContent = NODE_CAPACITY;
        }

        function insertValue() {
            const input = document.getElementById('insertInput');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                list.insert(value);
                input.value = '';
                highlightedPos = null;
                document.getElementById('searchResult').textContent = '-';
                drawList();
            }
        }

        function searchValue() {
            const input = document.getElementById('searchInput');
            const value = parseInt(input.value);
            if (!isNaN(value)) {
                const result = list.search(value);
                if (result.found) {
                    highlightedPos = {
                        node: result.node,
                        elem: result.elem
                    };
                    document.getElementById('searchResult').textContent = `Found at Node ${result.node}, Pos ${result.elem}`;
                    document.getElementById('searchResult').style.color = '#00f3ff';
                } else {
                    highlightedPos = null;
                    document.getElementById('searchResult').textContent = 'Not found';
                    document.getElementById('searchResult').style.color = '#ff00ff';
                }
                drawList();
            }
        }

        function clearList() {
            list.head = null;
            list.tail = null;
            list.elemCount = 0;
            highlightedPos = null;
            document.getElementById('searchResult').textContent = '-';
            drawList();
        }

        function randomInserts() {
            clearList();
            for (let i = 0; i < 15; i++) {
                list.insert(Math.floor(Math.random() * 100) + 1);
            }
            drawList();
        }
        drawList();
    </script>
</body>

</html>
