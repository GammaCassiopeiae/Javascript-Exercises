<!DOCTYPE html>
<html>

<body><canvas id="c" width="400" height="200" style="border:1px solid"></canvas>
    <script>
        const canvas = document.getElementById('c'),
            ctx = canvas.getContext('2d');
        let arr = Array.from({
            length: 40
        }, (_, i) => i * 4 + 20);
        let target = arr[Math.floor(Math.random() * 40)];
        async function search() {
            let l = 0,
                r = 39;
            while (l <= r) {
                let m = Math.floor((l + r) / 2);
                draw(l, m, r);
                await new Promise(res => setTimeout(res, 600));
                if (arr[m] == target) return alert('Found!');
                if (arr[m] < target) l = m + 1;
                else r = m - 1;
            }
        }

        function draw(l, m, r) {
            ctx.clearRect(0, 0, 400, 200);
            arr.forEach((v, i) => {
                ctx.fillStyle = i == m ? 'green' : (i >= l && i <= r) ? 'yellow' : 'blue';
                ctx.fillRect(i * 10, 200 - v, 8, v);
            });
        }
        search();
    </script>
</body>

</html>
