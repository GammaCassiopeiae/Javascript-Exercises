<!DOCTYPE html>
<html>

<body><canvas id="c" width="400" height="200" style="border:1px solid"></canvas>
    <script>
        const canvas = document.getElementById('c'),
            ctx = canvas.getContext('2d');
        let arr = Array.from({
            length: 40
        }, () => Math.random() * 180 + 10);
        async function sort() {
            for (let i = 1; i < arr.length; i++) {
                let key = arr[i],
                    j = i - 1;
                while (j >= 0 && arr[j] > key) {
                    arr[j + 1] = arr[j];
                    j--;
                    draw(j);
                    await new Promise(r => setTimeout(r, 20));
                }
                arr[j + 1] = key;
            }
            draw();
        }

        function draw(idx) {
            ctx.clearRect(0, 0, 400, 200);
            arr.forEach((v, i) => {
                ctx.fillStyle = i == idx ? 'red' : 'green';
                ctx.fillRect(i * 10, 200 - v, 8, v);
            });
        }
        sort();
    </script>
</body>

</html>
