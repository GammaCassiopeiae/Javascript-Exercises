<!DOCTYPE html>
<html>

<body><canvas id="c" width="400" height="200" style="border:1px solid"></canvas>
    <script>
        const canvas = document.getElementById('c'),
            ctx = canvas.getContext('2d');
        let arr = Array.from({
            length: 40
        }, () => Math.random() * 180 + 10);
        let target = arr[Math.floor(Math.random() * 40)];
        async function search() {
            for (let i = 0; i < arr.length; i++) {
                draw(i);
                await new Promise(r => setTimeout(r, 100));
                if (arr[i] == target) {
                    alert('Found at index ' + i);
                    break;
                }
            }
        }

        function draw(idx) {
            ctx.clearRect(0, 0, 400, 200);
            arr.forEach((v, i) => {
                ctx.fillStyle = i == idx ? 'red' : 'grey';
                ctx.fillRect(i * 10, 200 - v, 8, v);
            });
        }
        search();
    </script>
</body>

</html>
