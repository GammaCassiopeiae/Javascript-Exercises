<!DOCTYPE html>
<html>

<body><canvas id="c" width="400" height="200" style="border:1px solid"></canvas>
    <script>
        const canvas = document.getElementById('c'),
            ctx = canvas.getContext('2d');
        let arr = Array.from({
            length: 40
        }, () => Math.random() * 180 + 10);
        async function sort() {
            for (let i = 0; i < arr.length; i++) {
                let min = i;
                for (let j = i + 1; j < arr.length; j++)
                    if (arr[j] < arr[min]) min = j;
                [arr[i], arr[min]] = [arr[min], arr[i]];
                draw(i);
                await new Promise(r => setTimeout(r, 50));
            }
            draw();
        }

        function draw(idx) {
            ctx.clearRect(0, 0, 400, 200);
            arr.forEach((v, i) => {
                ctx.fillStyle = i == idx ? 'red' : 'purple';
                ctx.fillRect(i * 10, 200 - v, 8, v);
            });
        }
        sort();
    </script>
</body>

</html>
