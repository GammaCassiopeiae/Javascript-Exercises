<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <title>Preverjanje Palindroma</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }

        .is-palindrome {
            background: #dcfce7;
            color: #166534;
            border: 1px solid var(--success);
        }

        .not-palindrome {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid var(--error);
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Iskalnik Palindromov</h2>
        <p>Vnesi besedo ali niz (npr. <code>aabbccbbaa</code>):</p>

        <input type="text" id="textInput" placeholder="Vnesi besedilo..." value="aabbccbbaa">
        <button onclick="checkPalindrome()">Preveri niz</button>

        <div id="resultBox" class="result"></div>
    </div>

    <script>
        function checkPalindrome() {
            // 1. DOM API: Pridobivanje elementov
            const input = document.getElementById('textInput');
            const resultBox = document.getElementById('resultBox');

            // 2. Čiščenje niza (odstranimo presledke in male/velike črke)
            const originalStr = input.value;
            const cleanStr = originalStr.toLowerCase().replace(/[^a-z0-9]/g, '');

            if (cleanStr.length === 0) return;

            // 3. Algoritem: Primerjava niza z njegovo obrnjeno različico
            const reversedStr = cleanStr.split('').reverse().join('');
            const isPalindrome = cleanStr === reversedStr;

            // 4. DOM API: Prikaz rezultata
            resultBox.style.display = 'block';
            if (isPalindrome) {
                resultBox.innerText = `✅ "${originalStr}" JE palindrom!`;
                resultBox.className = 'result is-palindrome';
            } else {
                resultBox.innerText = `❌ "${originalStr}" NI palindrom.`;
                resultBox.className = 'result not-palindrome';
            }
        }

        // Zaženemo ob nalaganju za tvoj primer
        window.onload = checkPalindrome;
    </script>

</body>

</html>
