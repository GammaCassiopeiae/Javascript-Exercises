<!DOCTYPE html>
<html lang="sl">

<head>
    <meta charset="UTF-8">
    <title>Preprosta Snake Igra</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }

        canvas {
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background-color: #000;
        }

        h1 {
            margin-bottom: 10px;
        }

        .score {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h1>Snake Igra</h1>
    <div class="score">Rezultat: <span id="scoreVal">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        const box = 20; // Velikost kvadratka
        let score = 0;
        let gameSpeed = 100;

        // Kača - začne se kot polje objektov
        let snake = [{
            x: 10 * box,
            y: 10 * box
        }];

        // Hrana
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };

        let d; // Smer

        // Poslušanje tipk
        document.addEventListener("keydown", direction);

        function direction(event) {
            let key = event.keyCode;
            // Preprečimo obračanje za 180 stopinj v trenutno smer
            if (key == 37 && d != "RIGHT") d = "LEFT";
            else if (key == 38 && d != "DOWN") d = "UP";
            else if (key == 39 && d != "LEFT") d = "RIGHT";
            else if (key == 40 && d != "UP") d = "DOWN";
        }

        // Preverjanje trka s samim seboj
        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            // Počisti platno
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Izriši kačo
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#2ecc71" : "#27ae60";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Izriši hrano
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);

            // Trenutna pozicija glave
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Premik v smeri
            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // Če kača poje hrano
            if (snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                // Odstrani rep (če ne jé)
                snake.pop();
            }

            // Nova glava
            let newHead = {
                x: snakeX,
                y: snakeY
            };

            // Pravila za poraz (trki s stenami ali samim seboj)
            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Konec igre! Vaš rezultat: " + score);
                location.reload(); // Ponovni zagon
            }

            snake.unshift(newHead);
        }

        // Sproži izrisovanje vsakih 100ms
        let game = setInterval(draw, gameSpeed);
    </script>

</body>

</html>
