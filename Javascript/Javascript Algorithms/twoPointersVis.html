<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Two Pointers Vizualizacija</title>
    <style>
        :root { --bg: #0f172a; --primary: #38bdf8; --left: #f87171; --right: #fbbf24; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        canvas { background: #1e293b; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; display: flex; gap: 10px; align-items: center; background: #334155; padding: 15px 25px; border-radius: 50px; }
        input { background: #0f172a; border: 1px solid var(--primary); color: white; padding: 8px; border-radius: 5px; width: 60px; text-align: center; font-weight: bold; }
        button { background: var(--primary); border: none; padding: 10px 20px; color: #0f172a; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        button:hover:not(:disabled) { background: #7dd3fc; transform: scale(1.05); }
        button:disabled { background: #475569; cursor: not-allowed; }
        #status { font-family: monospace; font-size: 1.2rem; color: #94a3b8; margin-bottom: 10px; height: 1.5em; }
        .legend { display: flex; gap: 20px; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>Two Pointers Method</h1>
    <div class="legend">
        <span style="color: var(--left)">● Levo (L)</span>
        <span style="color: var(--right)">● Desno (R)</span>
        <span style="color: var(--success)">● Vsota najdena</span>
    </div>
    <div id="status">Vnesite ciljno vsoto in začnite</div>
    
    <canvas id="pointerCanvas" width="800" height="350"></canvas>
    
    <div class="controls">
        <button id="resetBtn">Novo polje</button>
        <label>Ciljna vsota:</label>
        <input type="number" id="targetSum" value="100">
        <button id="startBtn">Najdi par</button>
    </div>

    <script>
        /** 
         * VIZUALIZACIJA METODE DVEH KAZALCEV 
         * Iskanje para (a + b = target) v urejenem polju.
         */
        const canvas = document.getElementById('pointerCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const targetInput = document.getElementById('targetSum');

        const COUNT = 30;
        const BAR_WIDTH = canvas.width / COUNT;
        let array = [];

        function init() {
            // Ustvari unikatno urejeno polje (Two Pointers zahteva red)
            array = Array.from({ length: COUNT }, () => Math.floor(Math.random() * 80) + 5)
                         .sort((a, b) => a - b);
            draw();
            startBtn.disabled = false;
            statusEl.innerText = "Polje je pripravljeno.";
            statusEl.style.color = "#94a3b8";
        }

        function draw(left = -1, right = -1, found = false) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            array.forEach((val, i) => {
                ctx.fillStyle = "#334155"; // Osnovna barva (neaktivno)
                
                if (i === left) ctx.fillStyle = "var(--left)";
                if (i === right) ctx.fillStyle = "var(--right)";
                if (found && (i === left || i === right)) ctx.fillStyle = "var(--success)";

                const barHeight = (val / 100) * (canvas.height - 100);
                const x = i * BAR_WIDTH;
                const y = canvas.height - barHeight - 40;

                ctx.fillRect(x + 2, y, BAR_WIDTH - 4, barHeight);
                
                // Izpis vrednosti nad stolpcem
                ctx.fillStyle = "white";
                ctx.font = "12px Arial";
                ctx.textAlign = "center";
                ctx.fillText(val, x + BAR_WIDTH / 2, y - 10);

                // Oznake L in R pod stolpci
                if (i === left) ctx.fillText("L", x + BAR_WIDTH / 2, canvas.height - 15);
                if (i === right) ctx.fillText("R", x + BAR_WIDTH / 2, canvas.height - 15);
            });
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        async function twoPointersSearch() {
            const target = parseInt(targetInput.value);
            startBtn.disabled = true;
            resetBtn.disabled = true;

            let left = 0;
            let right = array.length - 1;
            let found = false;

            while (left < right) {
                let currentSum = array[left] + array[right];
                statusEl.innerText = `L(${array[left]}) + R(${array[right]}) = ${currentSum}`;
                draw(left, right);
                await sleep(600);

                if (currentSum === target) {
                    statusEl.innerText = `Najden par: ${array[left]} + ${array[right]} = ${target}`;
                    statusEl.style.color = "var(--success)";
                    draw(left, right, true);
                    found = true;
                    break;
                } else if (currentSum < target) {
                    statusEl.innerText = `${currentSum} < ${target} (Premikamo L v desno)`;
                    left++;
                } else {
                    statusEl.innerText = `${currentSum} > ${target} (Premikamo R v levo)`;
                    right--;
                }
                draw(left, right);
                await sleep(400);
            }

            if (!found) {
                statusEl.innerText = `Par z vsoto ${target} ne obstaja.`;
                statusEl.style.color = "#f87171";
                draw();
            }

            resetBtn.disabled = false;
        }

        startBtn.addEventListener('click', twoPointersSearch);
        resetBtn.addEventListener('click', init);

        init();
    </script>
</body>
</html>
