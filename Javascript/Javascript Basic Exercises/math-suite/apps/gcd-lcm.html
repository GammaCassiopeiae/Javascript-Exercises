<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCD & LCM | MathSuite</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body class="l-layout u-bg-gradient">
    <header class="header">
        <div class="l-container header__nav">
            <a href="../index.html" class="header__logo">MathSuite</a>
            <a href="../index.html" class="header__link">← Back to Dashboard</a>
        </div>
    </header>
    <main class="l-container">
        <section class="hero">
            <h1 class="hero__title">GCD & LCM</h1>
            <p class="hero__subtitle">Calculate the Greatest Common Divisor and Least Common Multiple of two numbers.</p>
        </section>
        <form id="app-form" class="c-form">
            <div class="c-form__group">
                <label for="number-input" class="c-form__label">Number 1</label>
                <input type="number" id="number-input" class="c-form__input" required>
            </div>
            <div class="c-form__group">
                <label for="number-input-2" class="c-form__label">Number 2</label>
                <input type="number" id="number-input-2" class="c-form__input" required data-second>
            </div>
            <button type="submit" class="c-form__button">Calculate</button>
        </form>
        <div id="result-box" class="c-result">
            <h3 class="c-result__title">Analysis Result</h3>
            <div id="result-content" class="c-result__content"></div>
        </div>
    </main>
    <script src="../scripts/math-logic.js"></script>
    <script>
        UI.handleForm('app-form', (a, b) => {
            const gcd = MathSuite.getGCD(a, b);
            const lcm = MathSuite.getLCM(a, b);
            UI.showResult(`GCD: ${gcd}, LCM: ${lcm}`);
        });
    </script>
</body>
</html>
