<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Count Bits</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #000000;
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --neon-lime: #39FF14;
            --glow-lime: 0 0 5px var(--neon-lime), 0 0 10px rgba(57, 255, 20, 0.2);
            --font-main: 'Rajdhani', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }
        body { background: var(--bg-deep); color: var(--neon-cyan); font-family: var(--font-main); margin: 0; padding: 2rem; overflow-x: hidden; }
        .c-header { border-bottom: 1px solid var(--neon-cyan); padding-bottom: 1rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end; }
        .c-title { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 10px var(--neon-cyan); margin: 0; }
        .c-cat { font-family: var(--font-mono); color: var(--neon-magenta); font-size: 0.9rem; }
        .l-main-container { display: flex; flex-direction: column; gap: 2rem; max-width: 1200px; margin: 0 auto; }
        .c-code-wrapper { background: rgba(10, 11, 16, 0.95); border: 1px solid rgba(57, 255, 20, 0.3); position: relative; }
        .c-code-wrapper::before { content: 'SOURCE_CODE.js'; position: absolute; top: -10px; left: 15px; font-size: 0.6rem; background: var(--neon-lime); color: #000; padding: 2px 8px; font-family: var(--font-mono); }
        .c-code { margin: 0; padding: 2rem; font-family: var(--font-mono); font-size: 1rem; color: var(--neon-lime); text-shadow: var(--glow-lime); line-height: 1.6; overflow-x: auto; white-space: pre; }
        .c-viz-wrapper { background: rgba(0, 243, 255, 0.03); border: 1px solid rgba(0, 243, 255, 0.2); padding: 1.5rem; position: relative; }
        .c-viz-wrapper::before { content: 'VISUALIZATION_GRAPH'; position: absolute; top: -10px; left: 15px; font-size: 0.6rem; background: var(--neon-cyan); color: #000; padding: 2px 8px; font-family: var(--font-mono); }
        .c-visualizer { height: 250px; display: flex; align-items: flex-end; justify-content: center; gap: 4px; padding: 1rem; overflow: hidden; }
        .c-btn { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 0.8rem 2rem; cursor: pointer; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; margin-top: 1.5rem; }
        .c-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }
        .c-back { color: rgba(255, 255, 255, 0.4); text-decoration: none; font-family: var(--font-mono); font-size: 0.8rem; display: block; margin-top: 3rem; }
        .bar { background: var(--neon-cyan); flex-grow: 1; max-width: 30px; transition: height 0.3s, background 0.3s; }
        .bar.active { background: var(--neon-magenta); box-shadow: 0 0 15px var(--neon-magenta); }
    </style>
</head>
<body>
    <header class="c-header">
        <div><div class="c-cat">[ SYS_CATEGORY: BIT ]</div><h1 class="c-title">Count Bits</h1></div>
        <div style="text-align: right; font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-magenta);">NODE_STATE: ACTIVE<br>THROUGHPUT: 1.2 GB/s</div>
    </header>
    <div class="l-main-container">
        <div class="c-code-wrapper"><pre class="c-code"><code>function countBits(n) {
    let res = [0];
    for (let i = 1; i <= n; i++) res[i] = res[i >> 1] + (i & 1);
    return res;
}</code></pre></div>
        <div class="c-viz-wrapper"><div class="c-visualizer" id="viz"></div><button class="c-btn" id="run-btn">Initialize Execution</button></div>
    </div>
    <a href="index.html" class="c-back">< [RE_ROUTE] BACK_TO_DASHBOARD</a>
    <script>
        const viz = document.getElementById('viz');
        const runBtn = document.getElementById('run-btn');
        let data = Array.from({length: 25}, () => Math.floor(Math.random() * 85) + 5);
        function render() {
            viz.innerHTML = '';
            data.forEach(val => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${val}%`;
                viz.appendChild(bar);
            });
        }
        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            runBtn.textContent = 'RUNNING...';
            for(let i = 0; i < 8; i++) {
                data = data.map(v => Math.min(100, Math.max(5, v + (Math.random() * 20 - 10))));
                const bars = document.querySelectorAll('.bar');
                const randomIdx = Math.floor(Math.random() * bars.length);
                bars[randomIdx].classList.add('active');
                render();
                await new Promise(r => setTimeout(r, 150));
                bars[randomIdx].classList.remove('active');
            }
            runBtn.disabled = false;
            runBtn.textContent = 'Initialize Execution';
        });
        render();
    </script>
</body>
</html>
