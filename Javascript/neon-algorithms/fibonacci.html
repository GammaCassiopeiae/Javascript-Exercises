<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Fibonacci DP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">
    <style>
        .c-dp-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .c-dp-cell { 
            width: 80px; height: 80px; 
            border: 1px solid var(--neon-primary); 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: var(--font-mono); font-size: 0.8rem;
            background: rgba(0, 243, 255, 0.05);
            transition: all 0.3s;
        }
        .c-dp-cell.is-active { border-color: var(--neon-secondary); box-shadow: var(--glow-secondary); background: rgba(255, 0, 255, 0.1); }
        .c-dp-cell__val { font-size: 1.2rem; font-weight: 700; color: var(--neon-secondary); }
    </style>

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: DP_ENGINE // ALGO: FIBONACCI_MEMO
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Calculate F(10)</button>
                <button class="c-btn c-btn--secondary" id="reset-btn">Reset</button>
            </div>
            <div class="c-viz-display" id="viz-container" style="display: block; padding-top: 4rem;">
                <div class="c-dp-grid" id="dp-grid"></div>
            </div>
            <div class="c-code-block">
<pre><code>function fib(n) {
    let dp = new Array(n + 1).fill(0);
    dp[0] = 0; dp[1] = 1;
    for (let i = 2; i <= n; i++) {
        dp[i] = dp[i-1] + dp[i-2];
    }
    return dp[n];
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class FibonacciVisualizer extends NeonEngine.SortingVisualizer {
            async calculate(n) {
                this.isRunning = true;
                const grid = document.getElementById('dp-grid');
                grid.innerHTML = '';
                const cells = [];
                
                for(let i=0; i<=n; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'c-dp-cell';
                    cell.innerHTML = `<span style="font-size: 0.6rem; opacity: 0.5;">F(${i})</span><span class="c-dp-cell__val" id="fib-${i}">?</span>`;
                    grid.appendChild(cell);
                    cells.push(cell);
                }

                try {
                    let dp = new Array(n + 1).fill(0);
                    dp[0] = 0; 
                    document.getElementById(`fib-0`).textContent = '0';
                    cells[0].classList.add('is-active');
                    await this.sleep(500);
                    
                    dp[1] = 1;
                    document.getElementById(`fib-1`).textContent = '1';
                    cells[1].classList.add('is-active');
                    await this.sleep(500);

                    for (let i = 2; i <= n; i++) {
                        cells[i].classList.add('is-active');
                        // Highlight dependencies
                        cells[i-1].style.borderColor = 'var(--neon-success)';
                        cells[i-2].style.borderColor = 'var(--neon-success)';
                        
                        await this.sleep(800);
                        dp[i] = dp[i-1] + dp[i-2];
                        document.getElementById(`fib-${i}`).textContent = dp[i];
                        
                        cells[i-1].style.borderColor = '';
                        cells[i-2].style.borderColor = '';
                        await this.sleep(200);
                    }
                } catch (e) {}
                this.isRunning = false;
            }
        }
        const visualizer = new FibonacciVisualizer('viz-container');
        document.getElementById('run-btn').addEventListener('click', () => visualizer.calculate(10));
        document.getElementById('reset-btn').addEventListener('click', () => {
            document.getElementById('dp-grid').innerHTML = '';
            visualizer.stop();
        });
    </script>
</body>
</html>
