<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] GCD Euclidean</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">
    <style>
        .c-math-viz { display: flex; flex-direction: column; gap: 15px; font-family: var(--font-mono); font-size: 0.9rem; }
        .c-step { 
            padding: 10px; border-left: 2px solid var(--neon-primary); 
            background: rgba(0, 243, 255, 0.05); transition: all 0.3s;
        }
        .c-step.is-active { border-left-color: var(--neon-secondary); background: rgba(255, 0, 255, 0.1); }
        .u-highlight { color: var(--neon-secondary); font-weight: 700; }
    </style>

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: MATH_ENGINE // ALGO: EUCLIDEAN_GCD
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Find GCD(48, 18)</button>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; margin-left: 2rem;">
                    LOGIC: <span style="color:var(--neon-secondary)">gcd(a, b) = gcd(b, a % b)</span>
                </div>
            </div>
            <div class="c-viz-display" id="viz-container" style="display: flex; align-items: center; justify-content: center;">
                <div class="c-math-viz" id="math-container"></div>
            </div>
            <div class="c-code-block">
<pre><code>function gcd(a, b) {
    while (b) {
        a %= b;
        [a, b] = [b, a];
    }
    return a;
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class MathVisualizer extends NeonEngine.AlgorithmVisualizer {
            async findGcd(a, b) {
                this.isRunning = true;
                const container = document.getElementById('math-container');
                container.innerHTML = '';

                try {
                    while (b) {
                        const step = document.createElement('div');
                        step.className = 'c-step is-active';
                        step.innerHTML = `gcd(<span class="u-highlight">${a}</span>, <span class="u-highlight">${b}</span>) ➔ ${a} % ${b} = <span class="u-highlight">${a % b}</span>`;
                        container.appendChild(step);
                        await this.sleep(1000);
                        
                        a %= b;
                        [a, b] = [b, a];
                        step.classList.remove('is-active');
                    }
                    
                    container.innerHTML += `<div style="color:var(--neon-success); text-align:center; margin-top:20px; font-weight:700; font-size: 1.2rem;">[ RESULT: ${a} ]</div>`;
                } catch (e) {}
                this.isRunning = false;
            }
        }

        const visualizer = new MathVisualizer('viz-container');
        document.getElementById('run-btn').addEventListener('click', () => {
            if (visualizer.isRunning) return;
            visualizer.findGcd(48, 18);
        });
    </script>
</body>
</html>
