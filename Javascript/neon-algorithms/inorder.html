<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Inorder Traversal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: TREE_ENGINE // ALGO: INORDER_DFS
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Start Traversal</button>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; margin-left: 2rem;">
                    VISITED: [ <span id="visited-nodes" style="color:var(--neon-success)"></span> ]
                </div>
            </div>
            <div class="c-viz-display" id="viz-container" style="display: block;"></div>
            <div class="c-code-block">
<pre><code>function inorder(node) {
    if (!node) return;
    inorder(node.left);
    visit(node);
    inorder(node.right);
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class InorderVisualizer extends NeonEngine.TreeVisualizer {
            async traverse() {
                this.isRunning = true;
                const visited = [];
                const visitedEl = document.getElementById('visited-nodes');
                visitedEl.textContent = '';
                
                try {
                    await this.dfs(this.root, visited, visitedEl);
                } catch (e) {}
                this.isRunning = false;
            }

            async dfs(node, visited, el) {
                if (!node) return;
                
                await this.dfs(node.left, visited, el);
                
                this.render(node.val, visited);
                await this.sleep(800);
                visited.push(node.val);
                el.textContent = visited.join(', ');
                this.render(null, visited);
                await this.sleep(200);

                await this.dfs(node.right, visited, el);
            }
        }

        const visualizer = new InorderVisualizer('viz-container');
        document.getElementById('run-btn').addEventListener('click', () => {
            if (visualizer.isRunning) return;
            visualizer.traverse();
        });
    </script>
</body>
</html>
