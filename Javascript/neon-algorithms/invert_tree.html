<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Invert Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: TREE_ENGINE // ALGO: INVERT_BINARY_TREE
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Execute Inversion</button>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; margin-left: 2rem;">
                    LOGIC: <span style="color:var(--neon-secondary)">swap(left, right) recursively</span>
                </div>
            </div>
            <div class="c-viz-display" id="viz-container" style="display: block;"></div>
            <div class="c-code-block">
<pre><code>function invertTree(root) {
    if (!root) return null;
    let temp = root.left;
    root.left = invertTree(root.right);
    root.right = invertTree(temp);
    return root;
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class InvertTreeVisualizer extends NeonEngine.TreeVisualizer {
            async invert() {
                this.isRunning = true;
                try {
                    await this.executeInversion(this.root);
                } catch (e) {}
                this.isRunning = false;
            }

            async executeInversion(node) {
                if (!node) return;
                
                this.render(node.val);
                await this.sleep(800);

                // Swap
                let temp = node.left;
                node.left = node.right;
                node.right = temp;

                this.render(node.val);
                await this.sleep(800);

                await this.executeInversion(node.left);
                await this.executeInversion(node.right);
            }
        }

        const visualizer = new InvertTreeVisualizer('viz-container');
        document.getElementById('run-btn').addEventListener('click', () => {
            if (visualizer.isRunning) return;
            visualizer.invert();
        });
    </script>
</body>
</html>
