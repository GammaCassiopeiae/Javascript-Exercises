<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Kruskal MST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: GRAPH_ENGINE // ALGO: KRUSKAL_MST
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Execute Kruskal</button>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; margin-left: 2rem;">
                    MST WEIGHT: <span id="mst-weight" style="color:var(--neon-success)">0</span>
                </div>
            </div>
            <div class="c-viz-display" id="viz-container" style="display: block; height: 400px;"></div>
            <div class="c-code-block">
<pre><code>function kruskal(edges) {
    edges.sort((a, b) => a.w - b.w);
    for (let e of edges) {
        if (find(e.u) != find(e.v)) {
            union(e.u, e.v);
            mst.push(e);
        }
    }
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class KruskalVisualizer extends NeonEngine.GraphVisualizer {
            constructor(containerId) {
                super(containerId);
                this.edges = [
                    {u: 1, v: 2, weight: 4}, {u: 1, v: 3, weight: 2},
                    {u: 2, v: 3, weight: 1}, {u: 2, v: 4, weight: 5},
                    {u: 3, v: 5, weight: 8}, {u: 3, v: 6, weight: 10},
                    {u: 4, v: 5, weight: 2}, {u: 5, v: 6, weight: 3}
                ];
                // Map to parent-child structure for engine
                this.adj = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
                this.edges.forEach(e => {
                    this.adj[e.u].push({to: e.v, weight: e.weight});
                });
                this.render();
            }

            async execute() {
                this.isRunning = true;
                const sortedEdges = [...this.edges].sort((a, b) => a.weight - b.weight);
                const parent = {};
                const nodes = Object.keys(this.positions).map(Number);
                nodes.forEach(n => parent[n] = n);

                const find = (i) => {
                    if (parent[i] === i) return i;
                    return find(parent[i]);
                };

                const union = (i, j) => {
                    const rootI = find(i);
                    const rootJ = find(j);
                    if (rootI !== rootJ) {
                        parent[rootI] = rootJ;
                        return true;
                    }
                    return false;
                };

                let mstWeight = 0;
                const mstEdges = {}; // Track edges in MST for rendering

                try {
                    for (let edge of sortedEdges) {
                        // Highlight edge being considered
                        this.render(null, [], [], {}, mstEdges);
                        await this.sleep(600);

                        if (union(edge.u, edge.v)) {
                            mstWeight += edge.weight;
                            mstEdges[edge.v] = edge.u; // Simple parent tracking for rendering
                            document.getElementById('mst-weight').textContent = mstWeight;
                            this.render(null, [], [], {}, mstEdges);
                            await this.sleep(800);
                        }
                    }
                } catch (e) {}
                this.isRunning = false;
            }
        }

        const visualizer = new KruskalVisualizer('viz-container');
        document.getElementById('run-btn').addEventListener('click', () => {
            if (visualizer.isRunning) return;
            visualizer.execute();
        });
    </script>
</body>
</html>
