<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Linear Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: SEARCH_ENGINE // ALGO: LINEAR_SEARCH
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Search Target</button>
                <button class="c-btn c-btn--secondary" id="reset-btn">New Data</button>
                <div style="display: flex; align-items: center; gap: 15px; margin-left: auto; font-family: var(--font-mono); font-size: 0.8rem;">
                    TARGET: <span id="target-val" style="color: var(--neon-secondary);">--</span>
                </div>
            </div>
            <div class="c-viz-display" id="viz-container"></div>
            <div class="c-code-block">
<pre><code>async function linearSearch(arr, target) {
    for (let i = 0; i < arr.length; i++) {
        await highlight([i]);
        if (arr[i] === target) return i;
    }
    return -1;
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class LinearSearchVisualizer extends NeonEngine.SearchVisualizer {
            async search() {
                this.isRunning = true;
                try {
                    for (let i = 0; i < this.data.length; i++) {
                        await this.highlight([i]);
                        if (this.data[i] === this.target) {
                            await this.highlight([i], 'sorted');
                            break;
                        }
                    }
                } catch (e) {}
                this.isRunning = false;
            }
        }
        const visualizer = new LinearSearchVisualizer('viz-container');
        const targetLabel = document.getElementById('target-val');

        function init() {
            const target = visualizer.data[Math.floor(Math.random() * visualizer.data.length)];
            visualizer.setTarget(target);
            targetLabel.textContent = target;
        }

        document.getElementById('run-btn').addEventListener('click', () => visualizer.search());
        document.getElementById('reset-btn').addEventListener('click', () => {
            visualizer.generateRandomData();
            init();
        });
        init();
    </script>
</body>
</html>
