<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Max Tree Depth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: TREE_ENGINE // ALGO: MAX_DEPTH_DFS
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Find Max Depth</button>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; margin-left: 2rem;">
                    MAX DEPTH: <span id="depth-val" style="color:var(--neon-secondary)">0</span>
                </div>
            </div>
            <div class="c-viz-display" id="viz-container" style="display: block;"></div>
            <div class="c-code-block">
<pre><code>function maxDepth(node) {
    if (!node) return 0;
    let l = maxDepth(node.left);
    let r = maxDepth(node.right);
    return Math.max(l, r) + 1;
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class DepthVisualizer extends NeonEngine.TreeVisualizer {
            async findDepth() {
                this.isRunning = true;
                const depthEl = document.getElementById('depth-val');
                try {
                    const depth = await this.executeDepth(this.root, 1, depthEl);
                    depthEl.textContent = depth;
                } catch (e) {}
                this.isRunning = false;
            }

            async executeDepth(node, currentDepth, el) {
                if (!node) return 0;
                
                this.render(node.val);
                await this.sleep(600);

                let left = await this.executeDepth(node.left, currentDepth + 1, el);
                let right = await this.executeDepth(node.right, currentDepth + 1, el);
                
                let res = Math.max(left, right) + 1;
                el.textContent = res;
                this.render(node.val, [node.val]); // Mark as computed
                await this.sleep(400);
                
                return res;
            }
        }

        const visualizer = new DepthVisualizer('viz-container');
        document.getElementById('run-btn').addEventListener('click', () => {
            if (visualizer.isRunning) return;
            visualizer.findDepth();
        });
    </script>
</body>
</html>
