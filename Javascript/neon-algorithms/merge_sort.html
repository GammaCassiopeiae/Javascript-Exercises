<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Merge Sort</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: SORT_ENGINE // ALGO: MERGE_SORT
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Execute Algorithm</button>
                <button class="c-btn c-btn--secondary" id="reset-btn">Reset Data</button>
            </div>
            <div class="c-viz-display" id="viz-container"></div>
            <div class="c-code-block">
<pre><code>async function mergeSort(arr, l, r) {
    if (l >= r) return;
    let m = l + Math.floor((r - l) / 2);
    await mergeSort(arr, l, m);
    await mergeSort(arr, m + 1, r);
    await merge(arr, l, m, r);
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class MergeSortVisualizer extends NeonEngine.SortingVisualizer {
            async sort() {
                this.isRunning = true;
                try {
                    await this.mergeSort(0, this.data.length - 1);
                    this.render([], Array.from({length: this.data.length}, (_, i) => i));
                } catch (e) {}
                this.isRunning = false;
            }

            async mergeSort(l, r) {
                if (l >= r) return;
                let m = l + Math.floor((r - l) / 2);
                await this.mergeSort(l, m);
                await this.mergeSort(m + 1, r);
                await this.merge(l, m, r);
            }

            async merge(l, m, r) {
                let n1 = m - l + 1;
                let n2 = r - m;
                let L = this.data.slice(l, m + 1);
                let R = this.data.slice(m + 1, r + 1);
                let i = 0, j = 0, k = l;

                while (i < n1 && j < n2) {
                    await this.highlight([l + i, m + 1 + j]);
                    if (L[i] <= R[j]) {
                        this.data[k] = L[i];
                        i++;
                    } else {
                        this.data[k] = R[j];
                        j++;
                    }
                    k++;
                    this.render([k-1]);
                }
                while (i < n1) {
                    this.data[k] = L[i];
                    i++; k++;
                    this.render([k-1]);
                    await this.sleep();
                }
                while (j < n2) {
                    this.data[k] = R[j];
                    j++; k++;
                    this.render([k-1]);
                    await this.sleep();
                }
            }
        }
        const visualizer = new MergeSortVisualizer('viz-container');
        document.getElementById('run-btn').addEventListener('click', () => visualizer.sort());
        document.getElementById('reset-btn').addEventListener('click', () => visualizer.generateRandomData());
    </script>
</body>
</html>
