<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Power of Two</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">
    <style>
        .c-bit-viz { display: flex; flex-direction: column; gap: 20px; font-family: var(--font-mono); }
        .c-bit-row { display: flex; gap: 5px; align-items: center; }
        .c-bit { 
            width: 30px; height: 30px; border: 1px solid rgba(0, 243, 255, 0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
        }
        .c-bit.is-on { background: rgba(0, 243, 255, 0.1); color: var(--neon-primary); border-color: var(--neon-primary); box-shadow: var(--glow-primary); }
        .c-bit.is-highlight { border-color: var(--neon-secondary); color: var(--neon-secondary); }
    </style>

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: BIT_ENGINE // ALGO: IS_POWER_OF_TWO
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Check N=16</button>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; margin-left: 2rem;">
                    LOGIC: <span style="color:var(--neon-secondary)">n & (n-1) == 0</span>
                </div>
            </div>
            <div class="c-viz-display" id="viz-container" style="display: flex; align-items: center; justify-content: center;">
                <div class="c-bit-viz" id="bit-container"></div>
            </div>
            <div class="c-code-block">
<pre><code>function isPowerOfTwo(n) {
    if (n <= 0) return false;
    return (n & (n - 1)) === 0;
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class BitVisualizer extends NeonEngine.AlgorithmVisualizer {
            async check(n) {
                this.isRunning = true;
                const container = document.getElementById('bit-container');
                container.innerHTML = '';

                try {
                    await this.showNumber(n, "n", container);
                    await this.sleep(1000);
                    await this.showNumber(n - 1, "n - 1", container);
                    await this.sleep(1000);
                    
                    const result = n & (n - 1);
                    await this.showNumber(result, "n & (n-1)", container, true);
                    
                    if (result === 0) {
                        container.innerHTML += `<div style="color:var(--neon-success); text-align:center; margin-top:20px; font-weight:700;">[ SUCCESS: POWER OF TWO ]</div>`;
                    } else {
                        container.innerHTML += `<div style="color:var(--neon-danger); text-align:center; margin-top:20px; font-weight:700;">[ FAIL: NOT POWER OF TWO ]</div>`;
                    }
                } catch (e) {}
                this.isRunning = false;
            }

            async showNumber(num, label, container, isFinal = false) {
                const row = document.createElement('div');
                row.className = 'c-bit-row';
                row.innerHTML = `<span style="width: 80px; font-size: 0.7rem; opacity: 0.6;">${label} (${num})</span>`;
                
                const bits = num.toString(2).padStart(8, '0').split('');
                bits.forEach(b => {
                    const bit = document.createElement('div');
                    bit.className = `c-bit ${b === '1' ? 'is-on' : ''}`;
                    if (isFinal) bit.classList.add('is-highlight');
                    bit.textContent = b;
                    row.appendChild(bit);
                });
                
                container.appendChild(row);
            }
        }

        const visualizer = new BitVisualizer('viz-container');
        document.getElementById('run-btn').addEventListener('click', () => {
            if (visualizer.isRunning) return;
            visualizer.check(16);
        });
    </script>
</body>
</html>
