<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Radix Sort</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: SORT_ENGINE // ALGO: RADIX_SORT
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Execute Radix Sort</button>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; margin-left: 2rem;">
                    EXPONENT: <span id="exp-val" style="color:var(--neon-secondary)">1</span>
                </div>
            </div>
            <div class="c-viz-display" id="viz-container"></div>
            <div class="c-code-block">
<pre><code>async function radixSort(arr) {
    let max = Math.max(...arr);
    for (let exp = 1; Math.floor(max / exp) > 0; exp *= 10) {
        await countingSort(arr, exp);
    }
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class RadixSortVisualizer extends NeonEngine.SortingVisualizer {
            async sort() {
                this.isRunning = true;
                try {
                    let max = Math.max(...this.data);
                    const expEl = document.getElementById('exp-val');
                    for (let exp = 1; Math.floor(max / exp) > 0; exp *= 10) {
                        expEl.textContent = exp;
                        await this.countingSort(exp);
                    }
                    this.render([], Array.from({length: this.data.length}, (_, i) => i));
                } catch (e) {}
                this.isRunning = false;
            }

            async countingSort(exp) {
                let n = this.data.length;
                let output = new Array(n);
                let count = new Array(10).fill(0);

                for (let i = 0; i < n; i++) {
                    count[Math.floor(this.data[i] / exp) % 10]++;
                }

                for (let i = 1; i < 10; i++) count[i] += count[i - 1];

                for (let i = n - 1; i >= 0; i--) {
                    let digit = Math.floor(this.data[i] / exp) % 10;
                    output[count[digit] - 1] = this.data[i];
                    count[digit]--;
                }

                for (let i = 0; i < n; i++) {
                    this.data[i] = output[i];
                    this.render([i]);
                    await this.sleep(100);
                }
            }
        }
        const visualizer = new RadixSortVisualizer('viz-container', { size: 40 });
        document.getElementById('run-btn').addEventListener('click', () => visualizer.sort());
    </script>
</body>
</html>
