<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ALGO] Subsets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/neon-core.css">
    <style>
        .c-res-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 2rem; }
        .c-res-item { 
            padding: 5px 10px; border: 1px solid var(--neon-primary); 
            font-family: var(--font-mono); font-size: 0.8rem; color: var(--neon-secondary);
            background: rgba(0, 243, 255, 0.05);
        }
        .c-node { 
            width: 50px; height: 50px; border: 1px solid var(--neon-primary); 
            display: flex; align-items: center; justify-content: center; 
            font-family: var(--font-mono); background: rgba(0, 243, 255, 0.05);
        }
        .c-node.is-included { border-color: var(--neon-success); box-shadow: var(--glow-success); }
        .c-node.is-excluded { opacity: 0.3; }
    </style>

    <style>
        /* [SYSTEM_FIX] REMOVED_VISUALIZERS_PER_USER_REQUEST */
        .c-viz-display, .c-viz-wrapper, .c-visualizer, #viz, #viz-container, .c-controls button:not(#run-btn) { 
            display: none !important; 
        }
        .c-code-block, .c-code, .c-code-wrapper, pre code { 
            color: #39FF14 !important; 
            font-size: 1.5rem !important; 
            line-height: 1.4 !important; 
            background: #000 !important;
            display: block !important;
            padding: 2rem !important;
            border-left: 5px solid #39FF14 !important;
        }
    </style>
</head>
<body class="l-body">
    <header class="c-header">
        <div class="l-container c-header__content">
            <a href="index.html" class="c-logo u-text-neon">&lt; SYSTEM_DASHBOARD</a>
            <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon-secondary);">
                MODULE: BACKTRACK_ENGINE // ALGO: POWER_SET_SUBSETS
            </div>
        </div>
    </header>

    <main class="l-main u-mt-2">
        <div class="l-container">
            <div class="c-controls">
                <button class="c-btn" id="run-btn">Generate Subsets</button>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; margin-left: 2rem;">
                    INPUT: <span style="color:var(--neon-secondary)">[1, 2, 3]</span>
                </div>
            </div>
            <div class="c-viz-display" id="viz-container" style="flex-direction: column;">
                <div id="active-subset" style="display: flex; gap: 10px;"></div>
                <div id="res-list" class="c-res-list"></div>
            </div>
            <div class="c-code-block">
<pre><code>function subsets(nums) {
    let res = [[]];
    for (let num of nums) {
        let size = res.length;
        for (let i = 0; i < size; i++) {
            res.push([...res[i], num]);
        }
    }
}</code></pre>
            </div>
        </div>
    </main>

    <script src="js/neon-engine.js"></script>
    <script>
        class SubsetVisualizer extends NeonEngine.AlgorithmVisualizer {
            constructor(containerId) {
                super(containerId);
                this.data = [1, 2, 3];
                this.render();
            }

            render(includedIndices = [], currentIndex = -1) {
                const container = document.getElementById('active-subset');
                container.innerHTML = '';
                this.data.forEach((val, idx) => {
                    const node = document.createElement('div');
                    node.className = 'c-node';
                    if (includedIndices.includes(idx)) node.classList.add('is-included');
                    else if (idx < currentIndex) node.classList.add('is-excluded');
                    node.textContent = val;
                    container.appendChild(node);
                });
            }

            async generate() {
                this.isRunning = true;
                const results = [];
                const resList = document.getElementById('res-list');
                resList.innerHTML = '';

                try {
                    await this.backtrack(0, [], resList);
                } catch (e) {}
                this.isRunning = false;
            }

            async backtrack(idx, current, resList) {
                if (idx === this.data.length) {
                    const res = `[${current.join(',')}]`;
                    const item = document.createElement('div');
                    item.className = 'c-res-item';
                    item.textContent = res;
                    resList.appendChild(item);
                    return;
                }

                // Include
                this.render([...current.map(v => this.data.indexOf(v)), idx], idx + 1);
                await this.sleep(400);
                await this.backtrack(idx + 1, [...current, this.data[idx]], resList);

                // Exclude
                this.render(current.map(v => this.data.indexOf(v)), idx + 1);
                await this.sleep(400);
                await this.backtrack(idx + 1, current, resList);
            }
        }

        const visualizer = new SubsetVisualizer('viz-container');
        document.getElementById('run-btn').addEventListener('click', () => {
            if (visualizer.isRunning) return;
            visualizer.generate();
        });
    </script>
</body>
</html>
